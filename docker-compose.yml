version: '3.8'

services:
  yqad-app:
    image: yqad:latest
    container_name: yqad-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: "production"
      MYSQL_HOST: "192.168.50.50"
      MYSQL_PORT: "3306"
      MYSQL_USER: "root"
      MYSQL_PASSWORD: "Wfw7539148@"
      MYSQL_DATABASE: "yqad_prod_db"
      REDIS_HOST: "192.168.50.50"
      REDIS_PORT: "6379"
      REDIS_DB: "1"
      REDIS_KEY_PREFIX: "prod:"
      CHROMADB_URL: "http://192.168.50.50:8000"
      WEB_PORT: "3000"
      TZ: "Asia/Shanghai"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/auth/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 使用宿主机网络模式，避免容器间通信问题
    network_mode: "bridge"
