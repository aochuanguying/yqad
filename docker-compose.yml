version: '3.8'

services:
  yqad:
    build: .
    container_name: yqad-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DISPLAY=:99
      # MySQL 配置
      - MYSQL_HOST=192.168.50.50
      - MYSQL_USER=root
      - MYSQL_PASSWORD=Wfw7539148@
      - MYSQL_DATABASE=yqad_db
    volumes:
      # 挂载配置目录
      - ./config:/app/config
      # 挂载数据目录（二维码截图等）
      - ./data:/app/data
      # 挂载日志
      - ./logs:/app/logs
      # 共享 X11 socket（用于虚拟显示）
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    # 增加共享内存（浏览器需要）
    shm_size: '2gb'
    # 安全选项（允许无沙盒运行）
    security_opt:
      - seccomp:unconfined
