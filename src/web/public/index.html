    /**
     * 加载指定目录内容
     */
    async function pickerLoadDir(dir) {
      pickerCurrentDir = dir;
      const body = document.getElementById('picker-body');
      const backBtn = document.getElementById('picker-back-btn');
      const dirLabel = document.getElementById('picker-dir-label');
      const breadcrumb = document.getElementById('picker-breadcrumb');
      const selectDirCheckbox = document.getElementById('picker-select-dir');

      if (body) body.innerHTML = '<p class="text-gray-400 text-sm text-center py-8">加载中...</p>';

      // 更新导航状态
      if (backBtn) backBtn.classList.toggle('hidden', !dir);
      if (dirLabel) dirLabel.textContent = dir ? dir : '根目录';
      if (breadcrumb) breadcrumb.textContent = dir ? `/ ${dir}` : '';

      // 目录整选复选框：反映当前目录是否已被整选
      if (selectDirCheckbox) {
        selectDirCheckbox.checked = dir ? pickerChecked.has(dir) : false;
        selectDirCheckbox.disabled = !dir; // 根目录不支持整选
      }

      try {
        const url = dir ? `/api/materials/browser?dir=${encodeURIComponent(dir)}` : '/api/materials/browser';
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('请求失败 ' + resp.status);
        const data = await resp.json();
        renderPickerBody(data.entries || []);
      } catch (e) {
        if (body) body.innerHTML =
          `<p class="text-red-500 text-sm text-center py-6">加载失败：${escapeHtml(e.message)}</p>`;
      }

      updatePickerCount();
    }

    /**
     * 返回上级目录
     */
    function pickerGoUp() {
      const parts = pickerCurrentDir.split('/').filter(Boolean);
      parts.pop();
      pickerLoadDir(parts.join('/'));
    }

    /**
     * 渲染浏览器内容（文件+目录网格）
     */
    function renderPickerBody(entries) {
      const body = document.getElementById('picker-body');
      if (!body) return;

      if (entries.length === 0) {
        body.innerHTML = `<p class="text-gray-400 text-sm text-center py-8">
          ${pickerCurrentDir ? '此目录下暂无图片文件' : '素材库为空，请将图片放入宿主机映射目录中'}
        </p>`;
        return;
      }

      const dirs = entries.filter(e => e.type === 'dir');
      const files = entries.filter(e => e.type === 'file');

      let html = '';

      // 目录列表
      if (dirs.length > 0) {
        html += '<div class="mb-4">';
        html += '<p class="text-xs text-gray-400 mb-2 font-medium">📁 目录</p>';
        html += '<div class="grid grid-cols-3 gap-2">';
        for (const dir of dirs) {
          const isChecked = pickerChecked.has(dir.path);
          html += `<div class="relative border rounded-lg p-3 hover:border-blue-300 hover:bg-blue-50 cursor-pointer transition-colors ${isChecked ? 'border-blue-400 bg-blue-50' : 'border-gray-200 bg-white'}">
            <div class="flex items-start gap-2">
              <input type="checkbox" value="${escapeHtml(dir.path)}" data-type="dir" ${isChecked ? 'checked' : ''}
                onchange="togglePickerEntry(this.value, 'dir', this.checked)"
                onclick="event.stopPropagation()"
                class="w-4 h-4 mt-0.5 flex-shrink-0 text-blue-600" />
              <div class="min-w-0 flex-1" onclick="pickerLoadDir('${escapeHtml(dir.path)}')" title="进入 ${escapeHtml(dir.name)}">
                <span class="text-2xl block mb-1">📁</span>
                <p class="text-xs text-gray-700 truncate font-medium">${escapeHtml(dir.name)}</p>
                <p class="text-xs text-blue-500 hover:underline">点击进入</p>
              </div>
            </div>
          </div>`;
        }
        html += '</div></div>';
      }

      // 图片文件网格
      if (files.length > 0) {
        html += '<div>';
        html += `<p class="text-xs text-gray-400 mb-2 font-medium">🖼 图片文件（${files.length} 张）</p>`;
        html += '<div class="grid grid-cols-4 gap-2">';
        for (const file of files) {
          const isChecked = pickerChecked.has(file.path);
          const sizeKb = ((file.size || 0) / 1024).toFixed(0);
          html += `<label class="relative border rounded-lg overflow-hidden cursor-pointer hover:border-blue-400 transition-colors ${isChecked ? 'border-blue-500 ring-2 ring-blue-200' : 'border-gray-200'}">
            <input type="checkbox" value="${escapeHtml(file.path)}" data-type="file" ${isChecked ? 'checked' : ''}
              onchange="togglePickerEntry(this.value, 'file', this.checked)"
              class="sr-only" />
            <div class="relative">
              <img src="/api/materials/file/${file.path}" alt="${escapeHtml(file.name)}"
                class="w-full h-20 object-cover bg-gray-100"
                loading="lazy"
                onerror="this.parentNode.innerHTML='<div class=\\'w-full h-20 bg-gray-100 flex items-center justify-center text-2xl\\'>🖼</div>'" />
              ${isChecked ? '<div class="absolute inset-0 bg-blue-500 bg-opacity-20 flex items-center justify-center"><span class="w-6 h-6 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs">✓</span></div>' : ''}
            </div>
            <div class="p-1.5">
              <p class="text-xs text-gray-700 truncate" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</p>
              <p class="text-xs text-gray-400">${sizeKb} KB</p>
            </div>
          </label>`;
        }
        html += '</div></div>';
      }

      body.innerHTML = html;
    }

    /**
     * 勾选/取消文件或目录
     */
    function togglePickerEntry(entryPath, type, checked) {
      if (checked) {
        pickerChecked.add(entryPath);
      } else {
        pickerChecked.delete(entryPath);
      }
      // 同步刷新当前格子的选中样式（避免整页重绘）
      const input = document.querySelector(`input[value="${CSS.escape(entryPath)}"]`);
      if (input) {
        const card = input.closest('label, div.relative');
        if (card) {
          if (type === 'file') {
            card.classList.toggle('border-blue-500', checked);
            card.classList.toggle('ring-2', checked);
            card.classList.toggle('ring-blue-200', checked);
            card.classList.toggle('border-gray-200', !checked);
            // 更新打勾浮层
            const imgWrap = card.querySelector('.relative');
            if (imgWrap) {
              const mark = imgWrap.querySelector('.bg-blue-500.bg-opacity-20');
              if (checked && !mark) {
                imgWrap.insertAdjacentHTML('beforeend', '<div class="absolute inset-0 bg-blue-500 bg-opacity-20 flex items-center justify-center"><span class="w-6 h-6 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs">✓</span></div>');
              } else if (!checked && mark) {
                mark.remove();
              }
            }
          } else {
            card.classList.toggle('border-blue-400', checked);
            card.classList.toggle('bg-blue-50', checked);
            card.classList.toggle('border-gray-200', !checked);
          }
        }
      }
      updatePickerCount();
    }

    /**
     * 整选/取消整选当前目录
     */
    function toggleSelectDir(checked) {
      if (!pickerCurrentDir) return;
      if (checked) {
        pickerChecked.add(pickerCurrentDir);
      } else {
        pickerChecked.delete(pickerCurrentDir);
      }
      updatePickerCount();
    }

    /**
     * 更新底栏计数
     */
    function updatePickerCount() {
      const el = document.getElementById('picker-selected-count');
      if (el) el.textContent = `已选 ${pickerChecked.size} 项`;
    }

    /**
     * 确认选择
     */
    function confirmMaterialPicker() {
      selectedMaterialPaths = Array.from(pickerChecked);
      closeMaterialPicker();
      updateSelectedMaterialsDisplay();
    }

    /**
     * 关闭弹窗
     */
    function closeMaterialPicker() {
      const overlay = document.getElementById('material-picker-overlay');
      if (overlay) overlay.remove();
    }

    /**
     * 更新已选素材展示区（缩略图网格，包括展开文件夹内的图片）
     */
    async function updateSelectedMaterialsDisplay() {
      const display = document.getElementById('selected-materials-display');
      if (!display) return;

      if (selectedMaterialPaths.length === 0) {
        display.innerHTML = '<span class="text-xs text-gray-400">未选择素材</span>';
        return;
      }

      // 先渲染加载中状态
      display.innerHTML = '<span class="text-xs text-gray-400">加载缩略图...</span>';

      // 收集所有需要展示的图片（文件直接展示，目录展开直属图片）
      const previewItems = []; // { path, name, isFromDir, dirName }

      for (const p of selectedMaterialPaths) {
        const name = p.split('/').pop() || p;
        const hasExt = /\.\w+$/.test(name);

        if (hasExt) {
          // 单文件
          previewItems.push({ path: p, name, isFromDir: false, dirName: '' });
        } else {
          // 目录：请求其直属图片
          try {
            const resp = await fetch(`/api/materials/browser?dir=${encodeURIComponent(p)}`);
            if (resp.ok) {
              const data = await resp.json();
              const files = (data.entries || []).filter(e => e.type === 'file');
              if (files.length === 0) {
                previewItems.push({ path: null, name, isFromDir: true, dirName: name, placeholder: true });
              } else {
                for (const f of files) {
                  previewItems.push({ path: f.path, name: f.name, isFromDir: true, dirName: name });
                }
              }
            }
          } catch {
            previewItems.push({ path: null, name, isFromDir: true, dirName: name, placeholder: true });
          }
        }
      }

      if (previewItems.length === 0) {
        display.innerHTML = '<span class="text-xs text-gray-400">选中的目录下暂无图片</span>';
        return;
      }

      // 分组渲染：先展示单文件，再按目录分组
      const singles = previewItems.filter(i => !i.isFromDir);
      const dirGroups = {};
      for (const item of previewItems.filter(i => i.isFromDir)) {
        if (!dirGroups[item.dirName]) dirGroups[item.dirName] = [];
        dirGroups[item.dirName].push(item);
      }

      let html = '<div class="w-full">';

      // 单文件
      if (singles.length > 0) {
        html += '<div class="grid grid-cols-5 gap-2 mb-2">';
        for (const item of singles) {
          html += renderPreviewThumb(item);
        }
        html += '</div>';
      }

      // 目录分组
      for (const [dirName, items] of Object.entries(dirGroups)) {
        const dirPath = selectedMaterialPaths.find(p => (p.split('/').pop() || p) === dirName && !/\.\w+$/.test(p.split('/').pop() || p));
        html += `<div class="mb-2">
          <div class="flex items-center gap-1 mb-1">
            <span class="text-xs text-gray-500 font-medium">📁 ${escapeHtml(dirName)}</span>
            <span class="text-xs text-gray-400">(${items.length} 张)</span>
            <button type="button" onclick="removeMaterialPath('${escapeHtml(dirPath || dirName)}')" class="text-xs text-red-400 hover:text-red-600 ml-1">移除</button>
          </div>`;
        html += '<div class="grid grid-cols-5 gap-2">';
        for (const item of items) {
          html += renderPreviewThumb(item);
        }
        html += '</div></div>';
      }

      // 单文件移除按钮在每张图上
      html += '</div>';
      display.innerHTML = html;
    }

    /**
     * 渲染单张缩略图
     */
    function renderPreviewThumb(item) {
      if (item.placeholder) {
        return `<div class="w-full h-14 rounded border border-dashed border-gray-300 flex items-center justify-center text-xs text-gray-400">空目录</div>`;
      }

      const removeBtn = !item.isFromDir
        ? `<button type="button" onclick="event.stopPropagation();removeMaterialPath('${escapeHtml(item.path)}')"
             class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white rounded-full text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity leading-none">&times;</button>`
        : '';

      return `<div class="relative group">
        <img src="/api/materials/file/${item.path}" alt="${escapeHtml(item.name)}"
          class="w-full h-14 object-cover rounded border border-gray-200 bg-gray-100"
          loading="lazy"
          onerror="this.src='';this.className='w-full h-14 rounded border border-gray-200 bg-gray-100 flex items-center justify-center';this.outerHTML='<div class=\\'w-full h-14 rounded border border-gray-200 bg-gray-100 flex items-center justify-center text-lg\\'>🖼</div>'" />
        ${removeBtn}
        <p class="text-xs text-gray-500 truncate mt-0.5 text-center" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</p>
      </div>`;
    }

    /**
     * 从已选列表移除单项
     */
    function removeMaterialPath(filePath) {
      selectedMaterialPaths = selectedMaterialPaths.filter(p => p !== filePath);
      updateSelectedMaterialsDisplay();
    }

    // ========== 登录功能 ==========

    /**
     * 格式化时间戳为 YYYY-MM-DD HH:mm:ss
     */
    function formatTokenExpiresAt(timestamp) {
      if (!timestamp) return '--';
      const d = new Date(timestamp);
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    /**
     * 确定 Token 状态颜色编码
     * green: valid=true, remainingHours > 24
     * yellow: valid=true, 6 <= remainingHours < 24
     * red: valid=true, remainingHours < 6 OR valid=false
     */
    function getTokenColorConfig(tokenStatus) {
      if (!tokenStatus || !tokenStatus.valid) {
        return { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-800', subtext: 'text-red-600', indicator: 'bg-red-500', icon: '❌' };
      }
      const hours = tokenStatus.remainingHours || 0;
      if (hours > 24) {
        return { bg: 'bg-green-50', border: 'border-green-200', text: 'text-green-800', subtext: 'text-green-600', indicator: 'bg-green-500', icon: '✅' };
      }
      if (hours >= 6) {
        return { bg: 'bg-yellow-50', border: 'border-yellow-200', text: 'text-yellow-800', subtext: 'text-yellow-600', indicator: 'bg-yellow-500', icon: '⚠️' };
      }
      return { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-800', subtext: 'text-red-600', indicator: 'bg-red-500', icon: '🔴' };
    }

    /**
     * 构建 Token 状态区 HTML
     */
    function buildTokenStatusSection(tokenStatus, error) {
      // Error state with retry button
      if (error) {
        return `<div id="token-status-section" class="mb-6 p-4 bg-gray-50 border border-gray-300 rounded-lg">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="text-lg">⚠️</span>
              <p class="font-medium text-gray-700">Token 状态获取失败</p>
            </div>
            <button onclick="refreshTokenStatus()" class="px-3 py-1.5 bg-gray-600 text-white text-sm rounded-md hover:bg-gray-700">🔄 重试</button>
          </div>
          <p class="text-sm text-gray-500 mt-1">${escapeHtml(error)}</p>
        </div>`;
      }

      // Loading state
      if (!tokenStatus) {
        return `<div id="token-status-section" class="mb-6 p-4 bg-gray-50 border border-gray-200 rounded-lg">
          <div class="flex items-center gap-2">
            <span class="text-lg">⏳</span>
            <p class="font-medium text-gray-500">加载 Token 状态...</p>
          </div>
        </div>`;
      }

      const c = getTokenColorConfig(tokenStatus);

      // Valid token state
      if (tokenStatus.valid) {
        const expiresAtStr = formatTokenExpiresAt(tokenStatus.expiresAt);
        const remainingHours = tokenStatus.remainingHours || 0;
        return `<div id="token-status-section" class="mb-6 p-4 ${c.bg} border ${c.border} rounded-lg">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 rounded-full ${c.indicator} inline-block"></span>
              <span class="text-lg">${c.icon}</span>
              <p class="font-medium ${c.text}">Token 有效</p>
            </div>
            <div class="flex gap-2">
              <button onclick="refreshTokenStatus()" class="px-3 py-1.5 bg-white border border-gray-300 text-gray-700 text-sm rounded-md hover:bg-gray-100">🔄 刷新</button>
              <button onclick="verifyTokenOnline()" id="verify-online-btn" class="px-3 py-1.5 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700">在线验证</button>
            </div>
          </div>
          <div class="mt-2 grid grid-cols-1 sm:grid-cols-3 gap-2 text-sm">
            <div>
              <span class="text-gray-500">状态：</span>
              <span class="${c.text} font-medium">有效</span>
            </div>
            <div>
              <span class="text-gray-500">剩余：</span>
              <span class="${c.text} font-medium">${remainingHours} 小时</span>
            </div>
            <div>
              <span class="text-gray-500">过期时间：</span>
              <span class="${c.subtext}">${expiresAtStr}</span>
            </div>
          </div>
          <div id="verify-result" class="mt-2 hidden"></div>
        </div>`;
      }

      // Invalid/expired token state
      return `<div id="token-status-section" class="mb-6 p-4 ${c.bg} border ${c.border} rounded-lg">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full ${c.indicator} inline-block"></span>
            <span class="text-lg">${c.icon}</span>
            <p class="font-medium ${c.text}">Token 已过期或不存在，请重新登录</p>
          </div>
          <div class="flex gap-2">
            <button onclick="refreshTokenStatus()" class="px-3 py-1.5 bg-white border border-gray-300 text-gray-700 text-sm rounded-md hover:bg-gray-100">🔄 刷新</button>
            <button onclick="verifyTokenOnline()" id="verify-online-btn" class="px-3 py-1.5 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700">在线验证</button>
          </div>
        </div>
        <div id="verify-result" class="mt-2 hidden"></div>
      </div>`;
    }

    /**
     * 刷新 Token 状态区（不重渲染整个 Login Tab）
     */
    async function refreshTokenStatus() {
      const container = document.getElementById('token-status-section');
      if (container) {
        container.outerHTML = buildTokenStatusSection(null, null);
      }

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        // 获取 APP Token 状态（用于调用一汽奥迪 API）
        const resp = await fetch('/api/auth/token-status', {
          signal: controller.signal,
          credentials: 'include',  // 携带 Cookie
        });
        clearTimeout(timeoutId);
        const result = await resp.json();
        
        // 转换为 buildTokenStatusSection 期望的格式
        let tokenStatus = null;
        if (result.code === 'SUCCESS' && result.data) {
          const tokenData = result.data;
          tokenStatus = {
            valid: tokenData.valid,
            expiresAt: tokenData.expiresAt || null,
            remainingHours: tokenData.remainingHours || 0,
          };
        } else {
          tokenStatus = { valid: false };
        }
        
        const el = document.getElementById('token-status-section');
        if (el) el.outerHTML = buildTokenStatusSection(tokenStatus, null);
      } catch (e) {
        const errMsg = e.name === 'AbortError' ? '请求超时' : (e.message || '网络错误');
        const el = document.getElementById('token-status-section');
        if (el) el.outerHTML = buildTokenStatusSection(null, errMsg);
      }
    }

    // ========== AI 模型管理 ==========
    let aiFallbackFollowsProviderOrder;

    function arrayEquals(a, b) {
      if (a === b) return true;
      if (!Array.isArray(a) || !Array.isArray(b)) return false;
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) {
        if (a[i] !== b[i]) return false;
      }
      return true;
    }

    function dedupeArray(arr) {
      const seen = new Set();
      const out = [];
      for (const x of (arr || [])) {
        if (!seen.has(x)) {
          seen.add(x);
          out.push(x);
        }
      }
      return out;
    }

    function normalizeOrder(order, providerNames) {
      const names = providerNames || [];
      const nameSet = new Set(names);
      const out = [];
      const seen = new Set();
      for (const n of (order || [])) {
        if (nameSet.has(n) && !seen.has(n)) {
          seen.add(n);
          out.push(n);
        }
      }
      for (const n of names) {
        if (!seen.has(n)) {
          seen.add(n);
          out.push(n);
        }
      }
      return out;
    }

    function filterOrder(order, providerNames) {
      const names = providerNames || [];
      const nameSet = new Set(names);
      const out = [];
      const seen = new Set();
      for (const n of (order || [])) {
        if (nameSet.has(n) && !seen.has(n)) {
          seen.add(n);
          out.push(n);
        }
      }
      return out;
    }

    function ensureAiFallbackObject() {
      if (!configData.ai) configData.ai = {};
      if (!configData.ai.fallback) configData.ai.fallback = {};
    }

    function getAiProviderNames() {
      const providers = (configData.ai && configData.ai.providers) ? configData.ai.providers : [];
      return providers.map(p => p.name);
    }

    function computeAiFallbackFollowsProviderOrder(providerOrder, providerNames) {
      const fp = configData.ai && configData.ai.fallback ? configData.ai.fallback.providerOrder : undefined;
      if (!fp || fp.length === 0) return true;
      const nameSet = new Set(providerNames || []);
      for (const n of fp) {
        if (!nameSet.has(n)) return true;
      }
      return arrayEquals(dedupeArray(fp), dedupeArray(providerOrder));
    }

    function syncFallbackOrderIfFollowing() {
      if (!aiFallbackFollowsProviderOrder) return;
      ensureAiFallbackObject();
      const order = configData.ai.providerOrder || getAiProviderNames();
      configData.ai.fallback.providerOrder = [...order];
    }

    function ensureAiConfigConsistency() {
      if (!configData.ai) configData.ai = {};
      const providerNames = getAiProviderNames();
      configData.ai.providerOrder = normalizeOrder(configData.ai.providerOrder || [], providerNames);
      aiFallbackFollowsProviderOrder = computeAiFallbackFollowsProviderOrder(configData.ai.providerOrder, providerNames);
      if (aiFallbackFollowsProviderOrder) {
        syncFallbackOrderIfFollowing();
      } else if (configData.ai.fallback && Array.isArray(configData.ai.fallback.providerOrder)) {
        configData.ai.fallback.providerOrder = filterOrder(configData.ai.fallback.providerOrder, providerNames);
      }
    }

    function renderAITab() {
      const container = document.getElementById('main-content-area');
      const aiConfig = configData.ai || {};
      const providers = aiConfig.providers || [];
      const providerOrder = normalizeOrder(aiConfig.providerOrder || [], providers.map(p => p.name));
      if (!configData.ai) configData.ai = {};
      configData.ai.providerOrder = providerOrder;
      aiFallbackFollowsProviderOrder = computeAiFallbackFollowsProviderOrder(providerOrder, providers.map(p => p.name));
      syncFallbackOrderIfFollowing();

      let html = '';

      // 说明
      html += `<div class="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-4 text-sm text-blue-700">
        💡 拖拽模型卡片可调整调用优先级（从上到下依次尝试）。每个模型可独立配置超时时间。
      </div>`;

      // 模型列表
      html += `<div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold text-gray-800">🤖 模型列表 <span class="text-xs text-gray-400 font-normal">（拖拽排序）</span></h3>
        <button onclick="addAIProvider()" class="px-3 py-1.5 bg-blue-600 text-white rounded text-sm hover:bg-blue-700">+ 添加模型</button>
      </div>`;

      html += '<div id="ai-provider-form-area"></div>';

      if (providers.length === 0) {
        html += '<p class="text-gray-500 text-center py-8">暂无模型配置，请点击"添加模型"。</p>';
      } else {
        // 按 providerOrder 排序显示
        const sortedProviders = sortProvidersByOrder(providers, providerOrder);

        html += '<div class="space-y-2" id="ai-providers-list">';
        sortedProviders.forEach((provider, displayIdx) => {
          const originalIdx = providers.indexOf(provider);
          const timeout = provider.requestTimeout || aiConfig.requestTimeout || 30000;

          html += `<div class="border rounded-lg p-4 bg-white cursor-move ai-provider-card" draggable="true" data-provider-name="${escapeHtml(provider.name)}" data-idx="${originalIdx}">
            <div class="flex items-start justify-between mb-2">
              <div class="flex items-center gap-2">
                <span class="text-gray-400 cursor-grab text-lg" title="拖拽排序">⠿</span>
                <h4 class="font-medium text-gray-800">${escapeHtml(provider.name)}</h4>
                <span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded text-xs">#${displayIdx + 1}</span>
              </div>
              <div class="flex gap-1">
                <button onclick="editAIProvider(${originalIdx})" class="px-2 py-1 text-xs bg-white border rounded hover:bg-gray-50">编辑</button>
                <button onclick="deleteAIProvider(${originalIdx})" class="px-2 py-1 text-xs bg-white border border-red-200 text-red-600 rounded hover:bg-red-50">删除</button>
              </div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-x-4 gap-y-1 text-sm text-gray-600">
              <p>模型: <span class="text-gray-800">${escapeHtml(provider.model)}</span></p>
              <p>温度: <span class="text-gray-800">${provider.temperature ?? 0.7}</span></p>
              <p>Max Tokens: <span class="text-gray-800">${provider.maxTokens || '默认'}</span></p>
              <p>超时: <span class="text-gray-800">${(timeout / 1000).toFixed(0)}s</span></p>
            </div>
            <p class="text-xs text-gray-400 mt-1">URL: ${escapeHtml(provider.baseUrl)}</p>
            <div id="ai-edit-form-${originalIdx}" class="hidden mt-3 border-t pt-3"></div>
          </div>`;
        });
        html += '</div>';
      }

      container.innerHTML = html;

      // 绑定拖拽事件
      initDragSort();
    }

    function sortProvidersByOrder(providers, order) {
      if (!order || order.length === 0) return [...providers];
      const sorted = [];
      for (const name of order) {
        const found = providers.find(p => p.name === name);
        if (found) sorted.push(found);
      }
      // 未在 order 中的追加末尾
      for (const p of providers) {
        if (!sorted.includes(p)) sorted.push(p);
      }
      return sorted;
    }

    // ========== 拖拽排序 ==========
    let dragSrcEl = null;

    function initDragSort() {
      const list = document.getElementById('ai-providers-list');
      if (!list) return;

      const cards = list.querySelectorAll('.ai-provider-card');
      cards.forEach(card => {
        card.addEventListener('dragstart', handleDragStart);
        card.addEventListener('dragover', handleDragOver);
        card.addEventListener('dragenter', handleDragEnter);
        card.addEventListener('dragleave', handleDragLeave);
        card.addEventListener('drop', handleDrop);
        card.addEventListener('dragend', handleDragEnd);
      });
    }

    function handleDragStart(e) {
      dragSrcEl = this;
      this.style.opacity = '0.4';
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', this.dataset.providerName);
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      return false;
    }

    function handleDragEnter(e) {
      this.classList.add('border-blue-400', 'bg-blue-50');
    }

    function handleDragLeave(e) {
      this.classList.remove('border-blue-400', 'bg-blue-50');
    }

    function handleDrop(e) {
      e.stopPropagation();
      e.preventDefault();

      this.classList.remove('border-blue-400', 'bg-blue-50');

      if (dragSrcEl === this) return;

      const srcName = dragSrcEl.dataset.providerName;
      const targetName = this.dataset.providerName;

      // 更新 providerOrder
      const order = configData.ai.providerOrder || configData.ai.providers.map(p => p.name);
      const srcIdx = order.indexOf(srcName);
      const targetIdx = order.indexOf(targetName);

      if (srcIdx >= 0 && targetIdx >= 0) {
        order.splice(srcIdx, 1);
        const newTargetIdx = order.indexOf(targetName);
        order.splice(newTargetIdx, 0, srcName);
        configData.ai.providerOrder = order;
        syncFallbackOrderIfFollowing();
      }

      renderAITab();
      showToast('调用顺序已更新（记得保存）', 'success');

      return false;
    }

    function handleDragEnd(e) {
      this.style.opacity = '1';
      document.querySelectorAll('.ai-provider-card').forEach(card => {
        card.classList.remove('border-blue-400', 'bg-blue-50');
      });
    }

    function addAIProvider() {
      const area = document.getElementById('ai-provider-form-area');
      if (!area) return;
      area.innerHTML = `<div class="border rounded-lg p-4 mb-3 bg-white">
        <h4 class="font-medium mb-3">添加新模型</h4>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-600 mb-1">名称 *</label>
            <input id="new-ai-name" type="text" class="w-full px-2 py-1.5 border rounded text-sm" placeholder="如: claude" />

          </div>

    function cancelNewAIProvider() {
      const area = document.getElementById('ai-provider-form-area');
      if (area) area.innerHTML = '';
    }

    function submitNewAIProvider() {
      const name = document.getElementById('new-ai-name').value.trim();
      const model = document.getElementById('new-ai-model').value.trim();
      const baseUrl = document.getElementById('new-ai-baseUrl').value.trim();
      const apiKey = document.getElementById('new-ai-apiKey').value.trim();
      const temperature = parseFloat(document.getElementById('new-ai-temperature').value) || 0.7;
      const maxTokens = parseInt(document.getElementById('new-ai-maxTokens').value) || 4000;
      const requestTimeout = parseInt(document.getElementById('new-ai-requestTimeout').value) || 30000;

      if (!name || !model || !baseUrl || !apiKey) {
        showToast('名称、模型、Base URL、API Key 为必填', 'error');
        return;
      }

      if (!configData.ai) configData.ai = {};
      if (!configData.ai.providers) configData.ai.providers = [];

      configData.ai.providers.push({ name, model, baseUrl, apiKey, temperature, maxTokens, requestTimeout });

      // 自动加入调用顺序末尾
      if (!configData.ai.providerOrder) configData.ai.providerOrder = [];

      syncFallbackOrderIfFollowing();

      renderAITab();
      showToast(`模型 "${name}" 已添加（记得保存）`, 'success');

      providers.splice(idx, 1);

      // 从调用顺序中移除
      if (configData.ai.providerOrder) {
        configData.ai.providerOrder = configData.ai.providerOrder.filter(n => n !== name);

      if (configData.ai.fallback && Array.isArray(configData.ai.fallback.providerOrder)) {
        configData.ai.fallback.providerOrder = configData.ai.fallback.providerOrder.filter(n => n !== name);

      showToast(`模型 "${name}" 已移除（记得保存）`, 'success');

    function saveEditAIProvider(idx) {
      const providers = configData.ai.providers || [];
      const oldName = providers[idx].name;

      const name = document.getElementById('edit-ai-name-' + idx).value.trim();
      const model = document.getElementById('edit-ai-model-' + idx).value.trim();
      const baseUrl = document.getElementById('edit-ai-baseUrl-' + idx).value.trim();
      const apiKey = document.getElementById('edit-ai-apiKey-' + idx).value.trim();
      const temperature = parseFloat(document.getElementById('edit-ai-temperature-' + idx).value) || 0.7;
      const maxTokens = parseInt(document.getElementById('edit-ai-maxTokens-' + idx).value) || 4000;
      const requestTimeout = parseInt(document.getElementById('edit-ai-requestTimeout-' + idx).value) || 30000;

      if (!name || !model || !baseUrl || !apiKey) {
        showToast('名称、模型、Base URL、API Key 为必填', 'error');
        return;
      }

      providers[idx] = { name, model, baseUrl, apiKey, temperature, maxTokens, requestTimeout };

      // 更新调用顺序中的名称
      if (configData.ai.providerOrder && oldName !== name) {
        const orderIdx = configData.ai.providerOrder.indexOf(oldName);
        if (orderIdx >= 0) configData.ai.providerOrder[orderIdx] = name;
      }
      if (configData.ai.fallback && Array.isArray(configData.ai.fallback.providerOrder) && oldName !== name) {
        configData.ai.fallback.providerOrder = configData.ai.fallback.providerOrder.map(n => n === oldName ? name : n);
      }
      syncFallbackOrderIfFollowing();

      renderAITab();
      showToast(`模型 "${name}" 已更新（记得保存）`, 'success');
    }

    // ========== 会员信息获取 ==========
    let memberInfoAbortController = null;

    /**
     * 获取并展示会员信息
     * - 10s 超时 (AbortController)
     * - 401 错误: 显示 "请先登录" 无重试按钮
     * - 非 401 错误: 显示错误信息 + 重试按钮
     */
    async function fetchMemberInfo() {
      const contentEl = document.getElementById('member-info-content');
      if (!contentEl) return;

      // 取消之前的请求
      if (memberInfoAbortController) {
        memberInfoAbortController.abort();
      }
      memberInfoAbortController = new AbortController();
      const signal = memberInfoAbortController.signal;

      // 显示加载状态
      contentEl.innerHTML = `<div class="p-3 bg-gray-50 border border-gray-200 rounded-lg">
        <div class="flex items-center gap-2">
          <svg class="animate-spin h-4 w-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <span class="text-sm text-gray-500">正在获取会员信息...</span>
        </div>
      </div>`;

      // 10 秒超时
      const timeoutId = setTimeout(() => memberInfoAbortController.abort(), 10000);

      try {
        const resp = await fetch('/api/member/info', { 
          signal,
          credentials: 'include',  // 携带 Cookie
        });
        clearTimeout(timeoutId);

        if (resp.ok) {
          const result = await resp.json();
          const data = result.data || result;
          renderMemberInfoSuccess(contentEl, data);
        } else if (resp.status === 401) {
          renderMemberInfo401(contentEl);
        } else {
          const errData = await resp.json().catch(() => ({}));
          const errMsg = errData.error || `请求失败 (HTTP ${resp.status})`;
          renderMemberInfoError(contentEl, errMsg);
        }
      } catch (e) {
        clearTimeout(timeoutId);
        if (e.name === 'AbortError') {
          renderMemberInfoError(contentEl, '请求超时，请稍后重试');
        } else {
          renderMemberInfoError(contentEl, '网络错误: ' + (e.message || '无法连接服务器'));
        }

    async function loginSendCode() {
      const phone = document.getElementById('login-phone').value.trim();
      if (!phone || phone.length !== 11) {
        showLoginError('请输入11位手机号');
        return;
      }

      // 检查腾讯验证码 SDK
      if (typeof TencentCaptcha === 'undefined') {
        showLoginError('腾讯验证码 SDK 未加载，请确保页面可访问 turing.captcha.qcloud.com');
        return;
      }

      const btn = document.getElementById('login-send-btn');
      btn.disabled = true;
      btn.textContent = '验证中...';
      hideLoginError();

      try {
        // 触发滑块验证
        const ticket = await new Promise((resolve, reject) => {
          const captcha = new TencentCaptcha('198705236', (res) => {
            if (res.ret === 0) resolve(res.ticket);
            else reject(new Error('滑块验证未完成'));
          }, { needFeedBack: false });
          captcha.show();
        });

        btn.textContent = '发送中...';

        // 调用后端 API 发送验证码
        const resp = await fetch('/api/auth/send-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, ticket }),
        });
        const data = await resp.json();

        if (data.code === 0) {
          document.getElementById('login-step1').classList.add('hidden');
          document.getElementById('login-step2').classList.remove('hidden');
          document.getElementById('login-msg').textContent = `验证码已发送到 ${phone}`;
        } else {
          showLoginError(data.message || '发送失败');
        }
      } catch (e) {
        showLoginError(e.message || '操作取消');
      } finally {
        btn.disabled = false;
        btn.textContent = '发送验证码';
      }
    }

    async function loginSubmit() {
      const phone = document.getElementById('login-phone').value.trim();
      const code = document.getElementById('login-code').value.trim();
      if (!code || code.length !== 6) {
        showLoginError('请输入6位验证码');
        return;
      }

      const btn = document.getElementById('login-submit-btn');
      btn.disabled = true;
      btn.textContent = '登录中...';
      hideLoginError();

      try {
        const resp = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, code }),
        });
        const data = await resp.json();

        if (data.code === 0) {
          document.getElementById('login-step2').classList.add('hidden');
          document.getElementById('login-step3').classList.remove('hidden');
          showToast('登录成功！Token 已保存', 'success');

          showLoginError(data.message || '登录失败');

      } catch (e) {
        showLoginError(e.message || '请求失败');
      } finally {
        btn.disabled = false;
        btn.textContent = '登录';
      }
    }

    // ========== Token 在线验证 ==========
    async function verifyTokenOnline() {
      const btn = document.getElementById('verify-online-btn');
      const resultDiv = document.getElementById('verify-result');
      if (!btn || !resultDiv) return;

      btn.disabled = true;
      btn.textContent = '验证中...';
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = '<p class="text-sm text-gray-500">正在远端验证...</p>';

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        const resp = await fetch('/api/auth/verify', {
          method: 'POST',
          signal: controller.signal,
        });
        clearTimeout(timeoutId);

        const data = await resp.json();

        if (resp.status === 401) {
          resultDiv.innerHTML = `<p class="text-sm text-red-600">❌ ${escapeHtml(data.message || '无可用Token进行验证')}</p>`;
        } else if (data.data && data.data.remoteValid) {
          resultDiv.innerHTML = `<p class="text-sm text-green-700">✅ 远端验证通过，会员等级: ${escapeHtml(data.data.memberLevel || '未知')}</p>`;
        } else if (data.data && !data.data.remoteValid) {
          resultDiv.innerHTML = `<p class="text-sm text-red-600">❌ ${escapeHtml(data.data.message || '远端验证失败')}</p>`;
        } else {
          resultDiv.innerHTML = `<p class="text-sm text-red-600">❌ 验证响应异常</p>`;
        }
      } catch (e) {
        if (e.name === 'AbortError') {
          resultDiv.innerHTML = `<p class="text-sm text-red-600">❌ 验证超时，请稍后重试</p>`;
        } else {
          resultDiv.innerHTML = `<p class="text-sm text-red-600">❌ 验证失败: ${escapeHtml(e.message)}</p>`;
        }
      } finally {
        btn.disabled = false;
        btn.textContent = '在线验证';
      }
    }

    /**
     * 复制 Token 到剪贴板
     */
    async function copyToken() {
      try {
        const resp = await fetch('/api/token');
        const result = await resp.json();
        
        if (!result.success || !result.data.token) {
          alert('当前没有 Token，请先设置 Token 或登录');
          return;
        }
        
        const token = result.data.token;
        await navigator.clipboard.writeText(token);
        alert('✅ Token 已复制到剪贴板！');
      } catch (error) {
        console.error('复制 Token 失败:', error);
        alert('复制失败：' + error.message);
      }
    }

    /**
     * 保存 Token
     */
    async function saveToken() {
      const input = document.getElementById('set-token-input');
      if (!input) return;
      
      const token = input.value.trim();
      if (!token) {
        alert('Token 不能为空');
        return;
      }
      
      // 验证 Token 格式
      if (!token.startsWith('eyJ')) {
        alert('Token 格式不正确，JWT Token 通常以 eyJ 开头');
        return;
      }
      
      try {
        const resp = await fetch('/api/token', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ token }),
        });
        
        const result = await resp.json();
        
        if (result.success) {
          alert('✅ Token 已保存！');
          hideSetTokenModal();
          // 刷新 Token 状态
          if (typeof refreshTokenStatus === 'function') {
            refreshTokenStatus();
          }
        } else {
          alert('保存失败：' + result.error);
        }
      } catch (error) {
        console.error('保存 Token 失败:', error);
        alert('保存失败：' + error.message);
      }
    }

    // 当前短信分页状态
    let smsCurrentPage = 1;
    const smsPageSize = 20; // 每页 20 条
    let smsTotalCount = 0;

    // 加载短信列表
    async function loadSmsList(page = 1) {
      const container = document.getElementById('sms-list-container');
      
      try {
        const offset = (page - 1) * smsPageSize;
        const resp = await fetch(`/api/posts/mobile/sms?limit=${smsPageSize}&offset=${offset}`);
        const result = await resp.json();
        
        if (result.success && result.data) {
          smsTotalCount = result.pagination?.total || result.data.length;
          smsCurrentPage = page;
          
          if (result.data.length === 0) {
            container.innerHTML = `
              <div class="flex items-center justify-center py-12">
                <span class="text-gray-500">暂无短信记录</span>
              </div>
            `;
          } else {
            const totalPages = Math.ceil(smsTotalCount / smsPageSize);
            container.innerHTML = `
              <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                  <thead class="bg-gray-50">
                    <tr>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">电话号码</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">短信内容</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">接收时间</th>
                    </tr>
                  </thead>
                  <tbody class="bg-white divide-y divide-gray-200">
                    ${result.data.map(sms => `
                      <tr>
                        <td class="px-4 py-3 text-sm text-gray-900">${sms.phoneNumber}</td>
                        <td class="px-4 py-3 text-sm text-gray-900 max-w-md truncate cursor-pointer text-blue-600 hover:text-blue-800" 
                            onclick="showSmsContent('${sms.content.replace(/'/g, "\\'")}')"
                            title="点击查看详情">
                          ${sms.content.length > 50 ? sms.content.substring(0, 50) + '...' : sms.content}
                        </td>
                        <td class="px-4 py-3 text-sm text-gray-500">${new Date(sms.receivedAt).toLocaleString('zh-CN')}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
              <div class="px-4 py-3 border-t bg-gray-50 flex items-center justify-between">
                <div class="text-sm text-gray-600">
                  共 ${smsTotalCount} 条记录，第 ${smsCurrentPage} 页 / 共 ${totalPages} 页
                </div>
                <div class="flex gap-2">
                  <button 
                    onclick="loadSmsList(${smsCurrentPage - 1})" 
                    ${smsCurrentPage === 1 ? 'disabled class="px-3 py-1 bg-gray-200 text-gray-400 rounded cursor-not-allowed"' : 'class="px-3 py-1 bg-white border border-gray-300 text-gray-700 rounded hover:bg-gray-50"'}>
                    上一页
                  </button>
                  <button 
                    onclick="loadSmsList(${smsCurrentPage + 1})" 
                    ${smsCurrentPage >= totalPages ? 'disabled class="px-3 py-1 bg-gray-200 text-gray-400 rounded cursor-not-allowed"' : 'class="px-3 py-1 bg-white border border-gray-300 text-gray-700 rounded hover:bg-gray-50"'}>
                    下一页
                  </button>
                </div>
              </div>
            `;
          }
        } else {
          container.innerHTML = `<div class="p-4 text-red-500">加载失败：${result.error || '未知错误'}</div>`;
        }
      } catch (error) {
        container.innerHTML = `<div class="p-4 text-red-500">加载失败：${error.message}</div>`;
      }
    }

      if (!phoneInput) return;
      
      const phoneNumber = phoneInput.value.trim();
      
      if (!phoneNumber) {
        showToast('❌ 请输入电话号码', 'error');
        return;

      try {
        const resp = await fetch('/api/posts/mobile/call', {
          method: 'POST',

          },
          body: JSON.stringify({
            phone_number: phoneNumber,
            received_at: new Date().toISOString()

        const result = await resp.json();
        
        if (result.success) {
          showToast('✅ 电话拨打成功', 'success');
          closeMakeCallModal();
          loadMissedCallsList(); // 刷新列表
        } else {
          showToast('❌ 拨打失败：' + (result.error || '未知错误'), 'error');
        }
      } catch (error) {
        console.error('拨打电话失败:', error);
        showToast('❌ 拨打失败：' + error.message, 'error');
      }
    }

    // 渲染未接电话列表
    function renderMissedCallsList() {
      const container = document.getElementById('main-content-area');
      container.innerHTML = `
        <div class="space-y-6">
          <div class="flex items-center justify-between">
            <h3 class="text-lg font-semibold text-gray-800">📞 未接电话记录</h3>
            <div class="flex gap-2">
              <button onclick="showMakeCallModal()" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition-colors flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                </svg>
                拨打电话
              </button>
              <button onclick="loadMissedCallsList()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                刷新
              </button>
            </div>
          </div>
          
          <div id="missed-calls-list-container" class="bg-white border rounded-lg">
            <div class="flex items-center justify-center py-12">
              <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
              <span class="ml-3 text-gray-600">加载中...</span>
            </div>
          </div>
        </div>
      `;
      loadMissedCallsList();
    }

    // 当前未接电话分页状态
    let missedCallsCurrentPage = 1;
    const missedCallsPageSize = 20; // 每页 20 条
    let missedCallsTotalCount = 0;

    // 加载未接电话列表
    async function loadMissedCallsList(page = 1) {
      const container = document.getElementById('missed-calls-list-container');
      
      try {
        const offset = (page - 1) * missedCallsPageSize;
        const resp = await fetch(`/api/posts/mobile/missed-calls?limit=${missedCallsPageSize}&offset=${offset}`);
        const result = await resp.json();
        
        if (result.success && result.data) {
          missedCallsTotalCount = result.pagination?.total || result.data.length;
          missedCallsCurrentPage = page;
          
          if (result.data.length === 0) {
            container.innerHTML = `
              <div class="flex items-center justify-center py-12">
                <span class="text-gray-500">暂无未接电话记录</span>
              </div>
            `;
          } else {
            const totalPages = Math.ceil(missedCallsTotalCount / missedCallsPageSize);
            container.innerHTML = `
              <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                  <thead class="bg-gray-50">
                    <tr>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">电话号码</th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">接收时间</th>
                    </tr>
                  </thead>
                  <tbody class="bg-white divide-y divide-gray-200">
                    ${result.data.map(call => `
                      <tr>
                        <td class="px-4 py-3 text-sm text-gray-900">${call.phoneNumber}</td>
                        <td class="px-4 py-3 text-sm text-gray-500">${new Date(call.receivedAt).toLocaleString('zh-CN')}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
              <div class="px-4 py-3 border-t bg-gray-50 flex items-center justify-between">
                <div class="text-sm text-gray-600">
                  共 ${missedCallsTotalCount} 条记录，第 ${missedCallsCurrentPage} 页 / 共 ${totalPages} 页
                </div>
                <div class="flex gap-2">
                  <button 
                    onclick="loadMissedCallsList(${missedCallsCurrentPage - 1})" 
                    ${missedCallsCurrentPage === 1 ? 'disabled class="px-3 py-1 bg-gray-200 text-gray-400 rounded cursor-not-allowed"' : 'class="px-3 py-1 bg-white border border-gray-300 text-gray-700 rounded hover:bg-gray-50"'}>
                    上一页
                  </button>
                  <button 
                    onclick="loadMissedCallsList(${missedCallsCurrentPage + 1})" 
                    ${missedCallsCurrentPage >= totalPages ? 'disabled class="px-3 py-1 bg-gray-200 text-gray-400 rounded cursor-not-allowed"' : 'class="px-3 py-1 bg-white border border-gray-300 text-gray-700 rounded hover:bg-gray-50"'}>
                    下一页
                  </button>
                </div>
              </div>
            `;
          }
        } else {
          container.innerHTML = `<div class="p-4 text-red-500">加载失败：${result.error || '未知错误'}</div>`;
        }
      } catch (error) {
        container.innerHTML = `<div class="p-4 text-red-500">加载失败：${error.message}</div>`;
      }
    }
  </script>
  <script src="https://turing.captcha.qcloud.com/TJCaptcha.js" async></script>
  
  <!-- 设置 Token 弹窗 -->
  <div id="set-token-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-semibold text-gray-800">✏️ 设置 Token</h3>
        <button onclick="hideSetTokenModal()" class="text-gray-400 hover:text-gray-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">从其他环境复制的 Token</label>
        <textarea id="set-token-input" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-mono text-sm" placeholder="请粘贴从其他环境复制的 Token..."></textarea>
        <p class="text-xs text-gray-500 mt-1">💡 JWT Token 通常以 eyJ 开头</p>
      </div>
      <div class="flex gap-2">
        <button onclick="hideSetTokenModal()" class="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200">
          取消
        </button>
        <button onclick="saveToken()" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
          保存
        </button>
      </div>
    </div>
  </div>
</body>
</html>
