<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一汽奥迪 APP - 配置管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 高德地图 JS API -->
  <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=dacf436680aad0a1920cd1b95eb7ce2b"></script>
  <style>
    .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
    .toast { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    /* 地图容器样式 */
    .map-container {
      width: 100%;
      height: 400px;
      border-radius: 0.5rem;
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }
    #vehicle-map {
      width: 100%;
      height: 100%;
    }
    .address-text {
      font-size: 0.875rem;
      color: #6b7280;
      margin-top: 0.75rem;
      line-height: 1.5;
    }
    
    /* 图片懒加载渐显效果 */
    .lazy-image {
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }
    .lazy-image.loaded {
      opacity: 1;
    }
    
    /* 二级菜单样式 */
    .submenu-item {
      padding: 8px 12px;
      margin-bottom: 4px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    .submenu-item:hover {
      background-color: #f3f4f6;
    }
    .submenu-item-active {
      background-color: #eff6ff;
      color: #2563eb;
      font-weight: 500;
    }
    .submenu-item-active:hover {
      background-color: #dbeafe;
    }
    
    .status-healthy { border-color: #22c55e; }
    .status-warning { border-color: #f97316; }
    .status-critical { border-color: #ef4444; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

        <button class="tab-btn px-4 py-3 text-sm whitespace-nowrap hover:bg-gray-50" data-group="forum-settings">💬 论坛设置</button>

      <!-- Form content with submenu layout -->

        <!-- Left submenu for Token Settings -->
        <div class="w-48 border-r bg-gray-50 p-4 hidden" id="token-submenu">

    let currentGroup = 'api';
    let configData = {};
    let isInAiModelManagement = false;

    // 初始化
    async function init() {
      await checkAuthStatus();
      await loadConfig();
      setupTabs();
      switchTab('token-settings');
      setupLogout();
    }

    // 检查登录状态
    async function checkAuthStatus() {
      try {
        const resp = await fetch('/api/auth/status');
        const data = await resp.json();
        
        if (data.data && data.data.authenticated) {
          // 已登录，显示用户信息和登出按钮
          const userInfo = document.getElementById('user-info');
          const logoutBtn = document.getElementById('logout-btn');
          
          if (userInfo && logoutBtn) {
            userInfo.textContent = `欢迎，${data.data.username || '管理员'}`;
            userInfo.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');
          }
        } else {
          // 未登录，跳转到登录页
          window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
        }
      } catch (e) {
        console.error('检查登录状态失败:', e);
        window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
      }
    }

    // 设置登出功能
    function setupLogout() {
      const logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', async () => {
          try {
            const resp = await fetch('/api/auth/logout', { method: 'POST' });
            if (resp.ok) {
              showToast('已退出登录', 'success');
              setTimeout(() => {
                window.location.href = '/login.html';
              }, 500);
            } else {
              showToast('退出登录失败', 'error');
            }
          } catch (e) {
            console.error('退出登录失败:', e);
            showToast('退出登录失败', 'error');
          }
        });
      }
    }

    // 加载配置
    async function loadConfig() {
      try {
        const resp = await fetch('/api/config');
        if (!resp.ok) {
          if (resp.status === 401) {
            window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
            return;
          }
          throw new Error(`HTTP ${resp.status}`);
        }
        configData = await resp.json();
        document.getElementById('status-text').textContent = '已连接';
      } catch (e) {
        document.getElementById('status-text').textContent = '连接失败';
        showToast('无法加载配置：' + e.message, 'error');
      }
    }

    // 开始 AI 健康监控自动刷新
    function startAiHealthRefresh() {
      aiHealthRefreshTimer = setInterval(loadAiHealthData, AI_HEALTH_REFRESH_INTERVAL);
    }

    // 停止 AI 健康监控自动刷新
    function stopAiHealthRefresh() {
      if (aiHealthRefreshTimer) {
        clearInterval(aiHealthRefreshTimer);
        aiHealthRefreshTimer = null;
      }
    }

    // 加载 AI 健康数据
    async function loadAiHealthData() {
      const loadingState = document.getElementById('ai-loading-state');
      const errorState = document.getElementById('ai-error-state');
      const providerGrid = document.getElementById('ai-provider-grid');
      const refreshBtn = document.getElementById('ai-refresh-btn');

      try {
        const response = await fetch('/api/ai/health');
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const result = await response.json();
        
        if (!result.success) {
          throw new Error(result.error || '未知错误');
        }

        // 只在第一次加载时隐藏加载状态
        if (providerGrid.classList.contains('hidden')) {
          loadingState.classList.add('hidden');
          providerGrid.classList.remove('hidden');
        }

        // 增量更新卡片
        updateAiProviderCards(result.data);
        
        // 更新最后更新时间
        document.getElementById('ai-last-updated').textContent = 
          `最后更新：${new Date(result.timestamp).toLocaleTimeString('zh-CN')}`;

      } catch (error) {
        console.error('加载健康状态失败:', error);
        if (!providerGrid.classList.contains('hidden')) {
          errorState.classList.remove('hidden');
          document.getElementById('ai-error-message').textContent = error.message;
        }
      } finally {
        if (refreshBtn) {
          refreshBtn.disabled = false;
          refreshBtn.classList.remove('opacity-50');
        }
      }
    }

    // 更新 AI Provider 卡片（增量更新，避免闪烁）
    function updateAiProviderCards(providers) {
      const grid = document.getElementById('ai-provider-grid');
      
      if (!grid) return;
      
      // 获取现有卡片
      const existingCards = grid.querySelectorAll('.provider-card');
      
      // 如果卡片数量不匹配，重新渲染
      if (existingCards.length !== providers.length) {
        renderAiProviderCards(providers);
        return;
      }

      // 增量更新现有卡片内容
      providers.forEach((provider, index) => {
        const card = existingCards[index];
        if (!card) return;

        // 更新状态类名
        card.className = `bg-white rounded-lg border-2 p-6 shadow-sm ${getAiStatusClass(provider.status)} provider-card`;
        
        // 更新状态徽章
        const badge = card.querySelector('.status-badge');
        if (badge) {
          badge.className = `px-3 py-1 rounded-full text-xs font-semibold ${getAiStatusBadgeClass(provider.status)}`;
          badge.textContent = getAiStatusText(provider.status);
        }

        // 更新名称
        const nameEl = card.querySelector('.provider-name');
        if (nameEl) nameEl.textContent = provider.name;

        // 更新时间
        const timeEl = card.querySelector('.provider-time');
        if (timeEl) timeEl.textContent = `更新于 ${new Date(provider.lastUpdated).toLocaleTimeString('zh-CN')}`;

        // 更新熔断器状态
        const circuitEl = card.querySelector('.circuit-state');
        if (circuitEl) {
          circuitEl.className = `text-sm font-semibold ${getAiCircuitClass(provider.circuitState)}`;
          circuitEl.textContent = getAiCircuitText(provider.circuitState);
        }

        // 更新成功率
        const rateEl = card.querySelector('.success-rate');
        if (rateEl) {
          rateEl.className = `text-sm font-semibold ${getAiSuccessRateClass(provider.successRate)}`;
          rateEl.textContent = `${provider.successRate.toFixed(2)}%`;
        }

        // 更新响应时间
        const timeEl2 = card.querySelector('.response-time');
        if (timeEl2) timeEl2.textContent = `${provider.avgResponseTime} ms`;

        // 更新请求统计
        const stats = card.querySelectorAll('.stat-value');
        if (stats.length >= 3) {
          stats[0].textContent = provider.totalRequests;
          stats[1].textContent = provider.successfulRequests;
          stats[2].textContent = provider.failedRequests;
        }

        // 更新速率限制
        const rateLimitEl = card.querySelector('.rate-limit-value');
        if (rateLimitEl) {
          if (provider.rateLimit.isWhitelisted) {
            rateLimitEl.innerHTML = '<span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs font-medium">白名单</span>';
          } else {
            rateLimitEl.textContent = `${provider.rateLimit.availableTokens} tokens`;
          }
        }
      });
    }

    // 渲染 AI Provider 卡片（初次渲染）
    function renderAiProviderCards(providers) {
      const grid = document.getElementById('ai-provider-grid');
      grid.innerHTML = '';

    // AI 健康状态辅助函数
    function getAiStatusClass(status) {
      switch (status) {
        case 'healthy': return 'status-healthy';
        case 'warning': return 'status-warning';
        case 'critical': return 'status-critical';
        default: return 'border-gray-200';
      }
    }

    function getAiStatusBadgeClass(status) {
      switch (status) {
        case 'healthy': return 'bg-green-100 text-green-700';
        case 'warning': return 'bg-orange-100 text-orange-700';
        case 'critical': return 'bg-red-100 text-red-700';
        default: return 'bg-gray-100 text-gray-700';
      }
    }

    function getAiStatusText(status) {
      switch (status) {
        case 'healthy': return '✓ 健康';
        case 'warning': return '⚠ 警告';
        case 'critical': return '✗ 异常';
        default: return '未知';
      }
    }

    function getAiCircuitClass(state) {
      switch (state) {
        case 'CLOSED': return 'text-green-600';
        case 'HALF_OPEN': return 'text-orange-600';
        case 'OPEN': return 'text-red-600';
        default: return 'text-gray-600';
      }
    }

    function getAiCircuitText(state) {
      switch (state) {
        case 'CLOSED': return '正常';
        case 'HALF_OPEN': return '半开';
        case 'OPEN': return '熔断';
        default: return state;
      }
    }

    function getAiSuccessRateClass(rate) {
      if (rate >= 90) return 'text-green-600';
      if (rate >= 80) return 'text-orange-600';
      return 'text-red-600';
    }

    // 渲染表单
    function renderForm(group) {
      const container = document.getElementById('main-content-area');
      const data = configData[group];
      if (!data) {
        container.innerHTML = '<p class="text-red-500">该分组配置不存在</p>';
        return;
      }

      const labels = FIELD_LABELS[group] || {};
      let filteredData = data;
      
      // 特殊分组处理
      if (group === 'ai') {
        filteredData = { providerOrder: data.providerOrder || '', requestTimeout: data.requestTimeout || 30000, providers: data.providers };
      } else if (group === 'scheduler') {
        // 过滤掉 analysis 和 post 字段（发帖任务已移除，所有发帖由外部 autojs 脚本通过 API 触发）
        filteredData = Object.fromEntries(Object.entries(data).filter(([key]) => key !== 'analysis' && key !== 'post'));
      } else if (group === 'vehicleMonitor') {
        // 确保车辆监控的所有字段都显示（包括可能缺失的字段）
        filteredData = {
          enabled: data.enabled !== undefined ? data.enabled : true,
          intervalMinutes: data.intervalMinutes || 15,
          quickIntervalMinutes: data.quickIntervalMinutes || 5,
          safeDistanceMeters: data.safeDistanceMeters || 100,
          moveThresholdMeters: data.moveThresholdMeters || 50,
          minBatteryVolt: data.minBatteryVolt || 11.5,
          haBaseUrl: data.haBaseUrl || '',
          haToken: data.haToken || '',
          deviceTrackerEntity: data.deviceTrackerEntity || '',
          token: data.token || '',
        };
      }
      
      container.innerHTML = buildFormFields(filteredData, labels, group);
    }

    // 构建表单字段 HTML（支持嵌套对象）
    function buildFormFields(data, labels, prefix) {
      let html = '';
      for (const [key, value] of Object.entries(data)) {
        const fieldPath = prefix + '.' + key;
        const label = (typeof labels === 'object' && labels[key]) || key;

        if (Array.isArray(value)) {
          // 字符串数组（如 providerOrder）：以逗号分隔的输入框
          if (value.length === 0 || typeof value[0] === 'string') {
            html += buildSingleField(fieldPath, typeof label === 'string' ? label : key, value.join(', '), key, 'string-array');
          } else {
            // 对象数组（如 providers）：每个元素渲染为嵌套 fieldset
            html += `<fieldset class="border rounded-md p-4 mb-4"><legend class="text-sm font-semibold text-gray-600 px-2">${key}</legend>`;
            value.forEach((item, idx) => {
              if (item !== null && typeof item === 'object') {
                const itemLabel = item.name || (idx + 1);
                html += `<fieldset class="border border-dashed rounded-md p-3 mb-3"><legend class="text-xs font-medium text-gray-500 px-1">${itemLabel}</legend>`;
                html += buildFormFields(item, {}, fieldPath + '.' + idx);
                html += '</fieldset>';
              }
            });
            html += '</fieldset>';
          }
        } else if (value !== null && typeof value === 'object') {
          // 嵌套对象 - 创建子分组
          const subLabels = (typeof label === 'object') ? label : {};
          html += `<fieldset class="border rounded-md p-4 mb-4"><legend class="text-sm font-semibold text-gray-600 px-2">${typeof label === 'string' ? label : key}</legend>`;
          html += buildFormFields(value, subLabels, fieldPath);
          html += '</fieldset>';
        } else {
          const displayLabel = typeof label === 'string' ? label : key;
          html += buildSingleField(fieldPath, displayLabel, value, key);
        }
      }
      return html;
    }

    // 构建单个字段
    function buildSingleField(fieldPath, label, value, key, typeOverride) {
      const inputId = 'field-' + fieldPath.replace(/\./g, '-');
      let inputHtml = '';
      const effectiveType = typeOverride || (typeof value);

      // 获取提示词
      const tooltip = FIELD_TOOLTIPS[fieldPath] || '';
      const tooltipIcon = tooltip ? `<span class="ml-2 text-gray-400 cursor-help" title="${escapeHtml(tooltip)}">💡</span>` : '';

      if (effectiveType === 'string-array') {
        inputHtml = `<input id="${inputId}" data-path="${fieldPath}" data-type="string-array" type="text" value="${escapeHtml(String(value))}" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="逗号分隔，如: higpt, gpt" />`;
      } else if (effectiveType === 'boolean') {
        inputHtml = `<select id="${inputId}" data-path="${fieldPath}" data-type="boolean" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
          <option value="true" ${value ? 'selected' : ''}>启用</option>
          <option value="false" ${!value ? 'selected' : ''}>禁用</option>
        </select>`;
      } else if (typeof value === 'number') {
        // 检查是否是 intervalMinutes 字段
        const isIntervalField = fieldPath === 'scheduler.materialProcessing.intervalMinutes';
        let quickSelectHtml = '';
        if (isIntervalField) {
          quickSelectHtml = `
            <div class="flex gap-2 mt-2 flex-wrap">
              <span class="text-xs text-gray-500 self-center">快速选择：</span>
              <button type="button" onclick="setIntervalValue(5)" class="px-2 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded">5 分钟</button>
              <button type="button" onclick="setIntervalValue(10)" class="px-2 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded">10 分钟</button>
              <button type="button" onclick="setIntervalValue(15)" class="px-2 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded">15 分钟</button>
              <button type="button" onclick="setIntervalValue(30)" class="px-2 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded">30 分钟</button>
              <button type="button" onclick="setIntervalValue(60)" class="px-2 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded">60 分钟</button>
            </div>`;
        }
        inputHtml = `<input id="${inputId}" data-path="${fieldPath}" data-type="number" type="number" value="${value}" min="5" max="1440" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />${quickSelectHtml}`;

      } else if (key === 'level') {
        inputHtml = `<select id="${inputId}" data-path="${fieldPath}" data-type="string" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
          <option value="error" ${value === 'error' ? 'selected' : ''}>error</option>
          <option value="warn" ${value === 'warn' ? 'selected' : ''}>warn</option>
          <option value="info" ${value === 'info' ? 'selected' : ''}>info</option>
          <option value="debug" ${value === 'debug' ? 'selected' : ''}>debug</option>
        </select>`;
      } else if (key === 'apiKey' || key === 'password' || key === 'passwordHash') {
        // 敏感字段使用密码输入框（Token 字段需要明文显示）
        inputHtml = `<input id="${inputId}" data-path="${fieldPath}" data-type="string" type="password" value="${escapeHtml(String(value))}" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" autocomplete="off" />`;
      } else if (key === 'token' || key === 'haToken') {
        // Token 字段使用明文输入框
        inputHtml = `<input id="${inputId}" data-path="${fieldPath}" data-type="string" type="text" value="${escapeHtml(String(value))}" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />`;
      } else {
        inputHtml = `<input id="${inputId}" data-path="${fieldPath}" data-type="string" type="text" value="${escapeHtml(String(value))}" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />`;
      }

      return `<div class="mb-4">
        <label for="${inputId}" class="block text-sm font-medium text-gray-700 mb-1 flex items-center">
          ${label}
          ${tooltipIcon}
        </label>
        ${inputHtml}
      </div>`;
    }

    // 收集表单数据
    function collectFormData() {
      // 如果是日志分组，不需要收集数据
      if (currentGroup === 'comment-logs' || currentGroup === 'post-logs') {
        return {};
      }
      
      if (!configData[currentGroup]) {
        console.error('configData[' + currentGroup + '] is undefined');
        return {};
      }
      const data = JSON.parse(JSON.stringify(configData[currentGroup]));
      if (currentGroup === 'scheduler') {
        // 发帖任务已移除，不保存 post 配置
        delete data.analysis;
        delete data.post;
      }
      const inputs = document.querySelectorAll('[data-path]');

      inputs.forEach(input => {
        const path = input.dataset.path;
        const type = input.dataset.type;
        const parts = path.split('.').slice(1); // 去掉第一段（group名）

        let value;
        if (type === 'boolean') {
          value = input.value === 'true';
        } else if (type === 'number') {
          value = Number(input.value);
        } else if (type === 'string-array') {
          // 逗号分隔的字符串 → 数组
          value = input.value.split(',').map(s => s.trim()).filter(s => s.length > 0);
        } else {
          value = input.value;
        }

        // 设置嵌套值
        let obj = data;
        for (let i = 0; i < parts.length - 1; i++) {
          obj = obj[parts[i]];
        }
        obj[parts[parts.length - 1]] = value;
      });

      return data;
    }

    // 保存配置
    async function saveConfig() {
      const saveBtn = document.getElementById('save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = '保存中...';

      // 检查是否有 AI 模型管理页面的特征元素（比如拖拽排序的容器）
      const isAiPage = !!document.getElementById('ai-providers-list');

      // 如果是在 AI 模型管理页面，只保存 AI 配置
      if (isAiPage) {
        try {
          ensureAiConfigConsistency();
          const aiResp = await fetch('/api/config/ai', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(configData.ai),
          });
          const aiResult = await aiResp.json();
          if (aiResp.ok) {
            showToast('配置保存成功', 'success');
          } else {
            showToast('保存失败: ' + (aiResult.error || '未知错误'), 'error');
          }
        } catch (e) {
          showToast('保存失败: ' + e.message, 'error');
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = '保存配置';
        }
        return;
      }

      // 检查是否在网络发帖配置页面
      const isNetworkPostPage = !!document.getElementById('zhihu-access-secret');

      // 如果是在网络发帖页面，保存网络发帖配置
      if (isNetworkPostPage) {
        try {
          const config = {
            zhihuAccessSecret: document.getElementById('zhihu-access-secret').value.trim(),
            zhihuEnabled: document.getElementById('zhihu-enabled').checked,
            xiaohongshuCookie: document.getElementById('xiaohongshu-cookie').value.trim(),
            xiaohongshuEnabled: document.getElementById('xiaohongshu-enabled').checked,
            autohomeEnabled: document.getElementById('autohome-enabled')?.checked || false,
            maxResults: 10,
            enabled: true,
          };
          
          const resp = await fetch('/api/network-post-config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(config),
          });
          
          const data = await resp.json();
          
          if (data.success) {
            showToast('✅ 配置保存成功', 'success');
          } else {
            showToast('❌ 保存失败：' + (data.error || '未知错误'), 'error');
          }
        } catch (e) {
          showToast('保存失败：' + e.message, 'error');
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = '保存配置';
        }
        return;
      }

      // 保存其他配置
      try {
        const data = collectFormData();
        const resp = await fetch(`/api/config/${currentGroup}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        const result = await resp.json();
        if (resp.ok) {
          showToast('配置保存成功', 'success');
          // 刷新本地数据
          configData[currentGroup] = data;
        } else {
          showToast('保存失败: ' + (result.error || '未知错误'), 'error');
        }
      } catch (e) {
        showToast('保存失败: ' + e.message, 'error');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = '保存配置';
      }
    }

    // 显示提示
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      const bgColor = type === 'success' ? 'bg-green-500' : 'bg-red-500';
      toast.innerHTML = `<div class="toast ${bgColor} text-white px-6 py-3 rounded-lg shadow-lg">${escapeHtml(message)}</div>`;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 4000);
    }

    // 加载评论日志
    async function loadCommentLogs(page = 1) {
      const container = document.getElementById('comment-logs-container');
      const paginationContainer = document.getElementById('comment-logs-pagination');
      
      try {
        const resp = await fetch(`/api/comment/logs?page=${page}&pageSize=${commentLogsPageSize}`);
        const result = await resp.json();
        
        if (!result.success) {
          container.innerHTML = '<p class="text-red-500">加载失败</p>';
          return;
        }
        
        const { logs, total } = result.data;
        commentLogsTotal = total;
        
        if (logs.length === 0) {
          container.innerHTML = '<p class="text-gray-500 text-sm">暂无评论记录</p>';
          paginationContainer.innerHTML = '';
          return;
        }
        
        // 渲染评论记录
        let html = '<div class="space-y-3">';
        for (const log of logs) {
          // MySQL 返回 created_at，兼容旧的 timestamp 字段
          const timestamp = log.created_at ? new Date(log.created_at).toLocaleString('zh-CN') : (log.timestamp ? new Date(log.timestamp).toLocaleString('zh-CN') : 'Invalid Date');
          
          // 成功显示"成功"，失败显示"失败" + 模式
          let statusBadge = '';
          let modeBadge = '';
          let sourceBadge = '';
          
          if (log.success) {
            // 成功：只显示"成功"标签
            statusBadge = '<span class="px-2 py-0.5 text-xs bg-green-100 text-green-700 rounded">成功</span>';
          } else {
            // 失败：显示"失败"标签，只有兜底模式才显示"兜底"标签
            statusBadge = '<span class="px-2 py-0.5 text-xs bg-red-100 text-red-700 rounded">失败</span>';
            modeBadge = log.mode === 'fallback'
              ? '<span class="px-2 py-0.5 text-xs bg-orange-100 text-orange-700 rounded">兜底</span>'
              : '';  // 正常模式失败时不显示模式标签
          }
          
          // 显示来源标签
          sourceBadge = log.source === 'manual'
            ? '<span class="px-2 py-0.5 text-xs bg-purple-100 text-purple-700 rounded">手工</span>'
            : '<span class="px-2 py-0.5 text-xs bg-gray-100 text-gray-700 rounded">自动</span>';
          
          // MySQL 返回 post_title，兼容旧的 postTitle 字段
          const postTitle = log.post_title || log.postTitle || '未知帖子';
          
          html += `<div class="border rounded-md p-3 bg-white hover:shadow-sm transition-shadow">`;
          html += `<div class="flex items-start justify-between gap-2 mb-2">`;
          html += `<div class="flex items-center gap-2">`;
          html += statusBadge;
          if (modeBadge) html += modeBadge;
          html += sourceBadge;
          html += `<span class="text-xs text-gray-500">${timestamp}</span>`;
          html += `</div>`;
          html += `</div>`;
          html += `<div class="space-y-1 text-sm">`;
          html += `<div class="text-gray-800 font-medium">📌 ${escapeHtml(postTitle)}</div>`;
          if (log.comment_content && log.success) {
            html += `<div class="text-gray-600">💬 ${escapeHtml(log.comment_content.substring(0, 100))}${log.comment_content.length > 100 ? '...' : ''}</div>`;
          }
          if (log.error) {
            html += `<div class="text-red-500">❌ ${escapeHtml(log.error)}</div>`;
          }
          html += `</div>`;
          html += `</div>`;
        }
        html += '</div>';
        
        container.innerHTML = html;
        
        // 渲染分页
        const totalPages = Math.ceil(total / commentLogsPageSize);
        if (totalPages > 1) {
          let paginationHtml = '<div class="flex items-center gap-2">';
          paginationHtml += `<button onclick="loadCommentLogs(${page - 1})" ${page === 1 ? 'disabled class="px-3 py-1 text-gray-400 cursor-not-allowed"' : 'class="px-3 py-1 bg-gray-100 hover:bg-gray-200 rounded"'}>上一页</button>`;
          paginationHtml += `<span class="text-sm text-gray-600">第 ${page} / ${totalPages} 页</span>`;
          paginationHtml += `<button onclick="loadCommentLogs(${page + 1})" ${page === totalPages ? 'disabled class="px-3 py-1 text-gray-400 cursor-not-allowed"' : 'class="px-3 py-1 bg-gray-100 hover:bg-gray-200 rounded"'}>下一页</button>`;
          paginationHtml += '</div>';
          paginationContainer.innerHTML = paginationHtml;
        } else {
          paginationContainer.innerHTML = '';
        }
      } catch (e) {
        container.innerHTML = '<p class="text-red-500">加载失败：' + e.message + '</p>';
      }
    }

    // ========== 车辆位置地图功能 ==========
    
    let vehicleMapInstance = null;
    let vehicleMarker = null;
    let deviceMarker = null;

    // WGS-84 转 GCJ-02 坐标转换函数
    function wgs84ToGcj02(lat, lng) {
      const PI = 3.1415926535897932384626;
      const a = 6378245.0;
      const ee = 0.00669342162296594323;

      function transformLat(x, y) {
        let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
        ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
        ret += (20.0 * Math.sin(y * PI) + 40.0 * Math.sin(y / 3.0 * PI)) * 2.0 / 3.0;
        ret += (160.0 * Math.sin(y / 12.0 * PI) + 320 * Math.sin(y * PI / 30.0)) * 2.0 / 3.0;
        return ret;
      }

      function transformLon(x, y) {
        let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
        ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
        ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
        ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
        return ret;
      }

      const dLat = transformLat(lng - 105.0, lat - 35.0);
      const dLon = transformLon(lng - 105.0, lat - 35.0);
      const radLat = lat / 180.0 * PI;
      let magic = Math.sin(radLat);
      magic = 1 - ee * magic * magic;
      const sqrtMagic = Math.sqrt(magic);
      const dLatFinal = (dLat * 180.0) / ((a * (1 - ee)) / (magic * sqrtMagic) * PI);
      const dLonFinal = (dLon * 180.0) / (a / sqrtMagic * Math.cos(radLat) * PI);

      return {
        lat: lat + dLatFinal,
        lng: lng + dLonFinal
      };
    }

    // 计算两点之间的距离（Haversine 公式），单位：米
    function calculateDistance(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng/2) * Math.sin(dLng/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    // 初始化车辆地图
    function initVehicleMap() {
      if (!window.AMap) {
        console.error('高德地图 API 未加载');
        return;
      }

      if (!vehicleMapInstance) {
        vehicleMapInstance = new AMap.Map('vehicle-map', {
          zoom: 15,
          mapStyle: 'amap://styles/normal',
        });
        console.log('车辆地图实例创建成功');
      }
    }

    // 更新车辆位置地图
    async function updateVehicleMap(lng, lat) {
      if (!lng || !lat) {
        console.log('updateVehicleMap: 经纬度无效', lng, lat);
        return;
      }

      console.log('updateVehicleMap: 开始更新位置', lng, lat);

      // 确保地图已初始化
      if (!vehicleMapInstance) {
        initVehicleMap();
      }

      if (!vehicleMapInstance) {
        console.log('updateVehicleMap: 地图实例未初始化');
        return;
      }

      // 清除旧的标记
      if (vehicleMarker) {
        vehicleMapInstance.remove(vehicleMarker);
      }
      if (deviceMarker) {
        vehicleMapInstance.remove(deviceMarker);
      }

      // 创建新的车辆标记（红色标记）
      vehicleMarker = new AMap.Marker({
        position: [lng, lat],
        title: '车辆位置',
        map: vehicleMapInstance,
        icon: new AMap.Icon({
          size: new AMap.Size(25, 34),
          image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png',
          imageSize: new AMap.Size(25, 34),
        }),
      });
      console.log('车辆标记已创建，添加到地图');

      // 获取手机设备位置
      const deviceLocation = await getDeviceLocation();
      
      // 根据是否有手机位置，调整地图视野
      if (deviceLocation) {
        // 同时显示车辆和手机位置
        vehicleMapInstance.setFitView([vehicleMarker, deviceMarker]);
        console.log('地图已调整视野以显示车辆和手机');
        
        // 计算并显示车辆与手机之间的距离
        const distance = calculateDistance(deviceLocation.lat, deviceLocation.lng, lat, lng);
        console.log(`车辆与手机距离：${Math.round(distance)} 米`);
      } else {
        // 只显示车辆位置
        vehicleMapInstance.setCenter([lng, lat]);
        vehicleMapInstance.setZoom(15);
        console.log('地图已定位到车辆位置');
      }

      // 获取并显示地址
      await getAddressFromAMapForMap(lat, lng);
    }

    // 获取手机设备位置并显示在地图上（通过 Home Assistant API）
    async function getDeviceLocation() {
      try {
        const response = await fetch('/api/vehicle-monitor/device-location', { credentials: 'include' });
        const data = await response.json();
        
        if (data.code === 'SUCCESS' && data.data) {
          let { lat, lng } = data.data;
          
          // WGS-84 转 GCJ-02 坐标转换（高德地图使用 GCJ-02）
          const gcj02 = wgs84ToGcj02(lat, lng);
          lat = gcj02.lat;
          lng = gcj02.lng;
          
          console.log('获取到手机设备位置:', lat, lng);
          
          // 清除旧的设备标记
          if (deviceMarker) {
            vehicleMapInstance.remove(deviceMarker);
          }
          
          // 创建新的设备标记（蓝色标记）
          deviceMarker = new AMap.Marker({
            position: [lng, lat],
            title: '手机位置',
            map: vehicleMapInstance,
            icon: new AMap.Icon({
              size: new AMap.Size(25, 34),
              image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png',
              imageSize: new AMap.Size(25, 34),
            }),
          });
          console.log('手机设备标记已创建');
          
          return { lat, lng };
        } else {
          console.warn('获取手机设备位置失败:', data.message);
          return null;
        }
      } catch (error) {
        console.error('获取手机设备位置失败:', error);
        return null;
      }
    }

    // 通过高德地图 REST API 获取地址（用于地图页面）
    async function getAddressFromAMapForMap(lat, lng) {
      const mapAddressEl = document.getElementById('map-address');
      const AMAP_KEY = 'dacf436680aad0a1920cd1b95eb7ce2b';
      
      try {
        console.log('开始通过高德地图 REST API 获取地址...');
        const url = `https://restapi.amap.com/v3/geocode/regeo?location=${lng},${lat}&key=${AMAP_KEY}&radius=200&extensions=base`;
        
        const response = await fetch(url);
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        console.log('高德 REST API 响应:', data);
        
        if (data && data.status === '1' && data.regeocode && data.regeocode.formatted_address) {
          const address = data.regeocode.formatted_address;
          console.log('获取到地址:', address);
          
          if (mapAddressEl) {
            mapAddressEl.textContent = address;
            console.log('地图地址已显示');
          }
        } else {
          console.warn('高德 REST API 未返回有效地址:', data);
          if (mapAddressEl) {
            mapAddressEl.textContent = '地址获取失败';
          }
        }
      } catch (error) {
        console.error('高德 REST API 调用失败:', error);
        if (mapAddressEl) {
          mapAddressEl.textContent = '地址获取失败';
        }
      }
    }

        return;
      }

      tbody.innerHTML = history.map(record => {
        const date = new Date(record.timestamp);
        const timeStr = date.toLocaleString('zh-CN');
        const smsStatusColor = record.smsStatus === 'success' ? 'text-green-600' : 
                               record.smsStatus === 'timeout' ? 'text-yellow-600' : 'text-red-600';
        const callStatusColor = record.callStatus === 'success' ? 'text-green-600' : 
                                record.callStatus === 'timeout' ? 'text-yellow-600' : 'text-red-600';
        const notificationTypeText = record.notificationType === 'both' ? '短信 + 电话' : 
                                     record.notificationType === 'sms' ? '短信' : '电话';

        return `
          <tr>
            <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">${timeStr}</td>
            <td class="px-4 py-3 text-sm text-gray-900">${record.anomalies.join(', ')}</td>
            <td class="px-4 py-3 text-sm text-gray-900">${notificationTypeText}</td>
            <td class="px-4 py-3 text-sm ${smsStatusColor}">${record.smsStatus === 'success' ? '✓ 成功' : record.smsStatus === 'timeout' ? '⏱ 超时' : '✗ 失败'}</td>
            <td class="px-4 py-3 text-sm ${callStatusColor}">${record.callStatus === 'success' ? '✓ 成功' : record.callStatus === 'timeout' ? '⏱ 超时' : '✗ 失败'}</td>
            <td class="px-4 py-3 text-sm text-gray-900">${record.phone}</td>
          </tr>
        `;
      }).join('');
    }

    // 设置 Telecom 配置相关事件
    function setupTelecomConfigEvents() {
      // 保存配置按钮
      const saveBtn = document.getElementById('telecom-save-btn');
      if (saveBtn) {
        saveBtn.addEventListener('click', async () => {
          const enabled = document.getElementById('telecom-enabled').checked;
          const alertPhone = document.getElementById('telecom-alert-phone').value.trim();

          if (enabled && !alertPhone) {
            showToast('启用时必须填写告警手机号', 'error');
            return;

    // 发动机状态文本
    function getEngineText(obd) {
      if (!obd) return '--';
      return obd.engineOn ? '运行中' : '已熄火';
    }
    function getEngineColor(obd) {
      if (!obd) return 'text-gray-400';
      return obd.engineOn ? 'text-green-600' : 'text-gray-600';
    }
    
    // 里程文本
    function getMileageText(obd) {
      if (!obd || obd.currentMileage === null || obd.currentMileage === undefined) return '-- km';
      return `${obd.currentMileage} km`;
    }
    
    // 油量文本
    function getFuelText(obd) {
      if (!obd) return '-- L (--)';
      const fuelLiters = obd.oilLiters != null ? obd.oilLiters : 0;
      const fuelPercent = obd.oilPercent != null ? obd.oilPercent : 0;
      return `${fuelLiters}L (${fuelPercent}%)`;
    }
    function getFuelColor(obd) {
      if (!obd) return 'text-gray-400';
      const fuelPercent = obd.oilPercent != null ? obd.oilPercent : 0;
      return fuelPercent < 20 ? 'text-red-600' : 'text-gray-800';
    }
    
    // 温度文本
    function getTempText(obd) {
      if (!obd || obd.outsideTemp === null || obd.outsideTemp === undefined) return '-- ℃';
      return `${obd.outsideTemp} ℃`;
    }
    
    // 设防文本
    function getDefenceText(obd) {
      if (!obd) return '--';
      return obd.isDefence ? '已设防' : '未设防';
    }
    function getDefenceColor(obd) {
      if (!obd) return 'text-gray-400';
      return obd.isDefence ? 'text-green-600' : 'text-orange-600';
    }
    
    // OBD 在线文本
    function getOnlineText(obd) {
      if (!obd) return '--';
      return obd.isOnline ? '在线' : '离线';
    }
    function getOnlineColor(obd) {
      if (!obd) return 'text-gray-400';
      return obd.isOnline ? 'text-green-600' : 'text-red-600';
    }
    
    // 车门状态文本
    function getDoorsText(lastStatus) {
      if (!lastStatus || !lastStatus.obd || !lastStatus.carInfo) return '--';
      const openDoors = lastStatus.obd.doors.filter(d => d.open);
      if (openDoors.length === 0) return '全部关闭';
      return openDoors.map(d => d.label).join('、') + '未关';
    }
    function getDoorsColor(lastStatus) {
      if (!lastStatus || !lastStatus.obd || !lastStatus.carInfo) return 'text-gray-400';
      const openDoors = lastStatus.obd.doors.filter(d => d.open);
      return openDoors.length === 0 ? 'text-green-600' : 'text-red-600';
    }
    
    // 车窗状态文本
    function getWindowsText(obd) {
      if (!obd) return '--';
      const openWindows = obd.windows.filter(w => w.open);
      if (openWindows.length === 0) return '全部关闭';
      return openWindows.map(w => w.label).join('、') + '未关';
    }
    function getWindowsColor(obd) {
      if (!obd) return 'text-gray-400';
      const openWindows = obd.windows.filter(w => w.open);
      return openWindows.length === 0 ? 'text-green-600' : 'text-red-600';
    }

    // 加载发帖日志
    async function loadPostLogs(page = 1, filter = 'all') {
      const container = document.getElementById('post-logs-container');
      const paginationContainer = document.getElementById('post-logs-pagination');
      
      try {
        let url = `/api/posts/logs?page=${page}&limit=${postLogsPageSize}`;
        if (filter && filter !== 'all') {
          url += `&triggerType=${filter}`;
        }
        
        const resp = await fetch(url);
        const result = await resp.json();
        
        if (!result.success) {
          container.innerHTML = '<p class="text-red-500">加载失败</p>';
          return;
        }
        
        const { logs, total, totalPages } = result.data;
        postLogsTotal = total;
        
        if (logs.length === 0) {
          container.innerHTML = '<p class="text-gray-500 text-sm">暂无发帖记录</p>';
          paginationContainer.innerHTML = '';
          return;
        }
        
        // 渲染日志列表
        let html = '<div class="space-y-3">';
        logs.forEach(log => {
          const isManual = log.triggerType === 'manual';
          const hasTopic = !!log.topicName;  // 根据 topicName 是否存在判断
          const isSuccess = log.status === 'success';
          const timeStr = new Date(log.timestamp).toLocaleString('zh-CN');
          
          html += `<div class="border rounded-lg p-4 hover:shadow-md transition-shadow ${isSuccess ? 'bg-white' : 'bg-red-50'}">`;
          html += '<div class="flex items-start justify-between mb-2">';
          html += '<div class="flex items-center gap-2">';
          html += `<span class="px-2 py-1 text-xs rounded ${isManual ? 'bg-indigo-100 text-indigo-700' : 'bg-blue-100 text-blue-700'}">${isManual ? '手动' : '自动'}</span>`;
          html += `<span class="px-2 py-1 text-xs rounded ${hasTopic ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-700'}">${hasTopic ? '📝主题发帖' : '自由发帖'}</span>`;
          if (log.topicName) {
            html += `<span class="px-2 py-1 text-xs rounded bg-green-100 text-green-700">${escapeHtml(log.topicName)}</span>`;
          }
          html += '</div>';
          html += `<span class="text-xs text-gray-500">${timeStr}</span>`;
          html += '</div>';
          
          html += `<h4 class="font-semibold text-gray-800 mb-2">${escapeHtml(log.title)}</h4>`;
          
          // 显示发帖内容（折叠）
          if (log.content && log.content.trim()) {
            html += `<details class="mb-2">`;
            html += `<summary class="text-xs text-blue-600 cursor-pointer hover:text-blue-800">📄 查看内容（${log.content.length}字）</summary>`;
            html += `<p class="text-sm text-gray-700 mt-1 p-2 bg-gray-50 rounded">${escapeHtml(log.content)}</p>`;
            html += `</details>`;
          }
          
          if (log.status === 'pending') {
            html += `<p class="text-sm text-yellow-600 mb-2">⏳ 等待 AutoJS 脚本回调...</p>`;
          } else if (log.status === 'failed' && log.errorMessage) {
            html += `<p class="text-sm text-red-600 mb-2">❌ ${escapeHtml(log.errorMessage)}</p>`;
          } else if (log.status === 'success') {
            html += `<p class="text-sm text-green-600 mb-2">✅ 发布成功</p>`;
          } else {
            html += `<p class="text-sm text-gray-600 mb-2">未知状态：${log.status}</p>`;
          }
          
          // 图片预览
          if (log.imageUrls && log.imageUrls.length > 0) {
            html += '<div class="flex gap-2 mt-2 overflow-x-auto">';
            log.imageUrls.slice(0, 5).forEach((imgUrl, idx) => {
              html += `<div class="relative w-16 h-16">`;
              html += `<img src="${imgUrl}" class="w-16 h-16 object-cover rounded" loading="lazy" onerror="this.style.display='none';document.getElementById('img-placeholder-${idx}-${log.id}').style.display='flex';" />`;
              html += `<div id="img-placeholder-${idx}-${log.id}" class="absolute inset-0 bg-gray-100 rounded flex items-center justify-center text-xs text-gray-400" style="display:none;">图片</div>`;
              html += `</div>`;
            });
            if (log.imageUrls.length > 5) {
              html += `<span class="w-16 h-16 flex items-center justify-center bg-gray-100 rounded text-xs text-gray-500">+${log.imageUrls.length - 5}</span>`;
            }
            html += '</div>';
          }
          
          html += '</div>';
        });
        html += '</div>';
        
        container.innerHTML = html;
        
        // 渲染分页
        if (totalPages > 1) {
          let paginationHtml = '<div class="flex items-center gap-2">';
          
          if (page > 1) {
            paginationHtml += `<button onclick="loadPostLogs(${page - 1}, '${filter}')" class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">上一页</button>`;
          }
          
          paginationHtml += `<span class="text-sm text-gray-600">第 ${page} / ${totalPages} 页（共 ${total} 条）</span>`;
          
          if (page < totalPages) {
            paginationHtml += `<button onclick="loadPostLogs(${page + 1}, '${filter}')" class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">下一页</button>`;
          }
          
          paginationHtml += '</div>';
          paginationContainer.innerHTML = paginationHtml;
        } else {
          paginationContainer.innerHTML = '';
        }
      } catch (e) {
        container.innerHTML = '<p class="text-red-500">加载异常：' + e.message + '</p>';
      }
    }

    // 加载 AutoJS 配置
    async function loadAutoJsConfig() {
      try {
        const resp = await fetch('/api/posts/autojs/config');
        const result = await resp.json();
        
        if (result.success) {
          const enabledEl = document.getElementById('autojs-enabled');
          const baseUrlEl = document.getElementById('autojs-base-url');
          const postScriptEl = document.getElementById('autojs-post-script');
          
          if (enabledEl) enabledEl.checked = result.data.enabled;
          if (baseUrlEl) baseUrlEl.value = result.data.baseUrl || '';
          if (postScriptEl) postScriptEl.value = result.data.postScript || 'audi_post.js';
        } else {
          showToast('加载 AutoJS 配置失败：' + result.error, 'error');
        }
      } catch (error) {
        showToast('加载 AutoJS 配置失败：' + error.message, 'error');
      }
    }

    // 保存 AutoJS 配置
    async function saveAutoJsConfig() {
      const enabled = document.getElementById('autojs-enabled')?.checked || false;
      const baseUrl = document.getElementById('autojs-base-url')?.value.trim() || '';
      const postScript = document.getElementById('autojs-post-script')?.value.trim() || 'audi_post.js';

      if (enabled && !baseUrl) {
        showToast('启用 AutoJS API 时必须提供服务器地址', 'error');
        return false;
      }

      try {
        const resp = await fetch('/api/posts/autojs/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled, baseUrl, postScript }),
        });

        const result = await resp.json();
        
        if (result.success) {
          showToast('AutoJS 配置已保存', 'success');
          await loadAutoJsConfig();
          return true;
        } else {
          showToast('保存失败：' + result.error, 'error');
          return false;
        }
      } catch (error) {
        showToast('保存失败：' + error.message, 'error');
        return false;
      }
    }

    // 测试 AutoJS 连接
    async function testAutoJsConnection() {
      const baseUrl = document.getElementById('autojs-base-url')?.value.trim();
      const btn = document.getElementById('autojs-test-btn');

      if (!baseUrl) {
        showToast('请先填写服务器地址', 'error');
        return;
      }

      if (btn) {
        btn.disabled = true;
        btn.textContent = '测试中...';
      }

      try {
        const configResp = await fetch('/api/posts/autojs/config');
        const configResult = await configResp.json();
        
        if (!configResult.data.apiTokenConfigured) {
          showToast('请先在"🔑 Token 设置"中生成 API Token', 'error');
          return;
        }
        
        const resp = await fetch(baseUrl + '/api/health');

        if (resp.ok) {
          showToast('连接成功！AutoJS API 服务正常', 'success');
        } else {
          showToast('连接失败：' + resp.status + ' ' + resp.statusText, 'error');
        }
      } catch (error) {
        showToast('连接失败：' + error.message, 'error');
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.textContent = '测试连接';
        }
      }
    }

    // 加载 AutoJS 脚本列表
    async function loadAutoJsScripts() {
      const loadingEl = document.getElementById('autojs-scripts-loading');
      const containerEl = document.getElementById('autojs-scripts-container');
      const emptyEl = document.getElementById('autojs-scripts-empty');
      const errorEl = document.getElementById('autojs-scripts-error');
      const errorMsgEl = document.getElementById('autojs-scripts-error-msg');
      const refreshIcon = document.getElementById('autojs-refresh-icon');

      if (loadingEl) loadingEl.classList.remove('hidden');
      if (containerEl) containerEl.innerHTML = '';
      if (emptyEl) emptyEl.classList.add('hidden');
      if (errorEl) errorEl.classList.add('hidden');

      if (refreshIcon) {
        refreshIcon.classList.add('animate-spin');
      }

      try {
        const resp = await fetch('/api/posts/autojs/scripts');
        const result = await resp.json();

        if (result.success && result.data?.scripts) {
          const scripts = result.data.scripts;

          if (scripts.length === 0) {
            if (emptyEl) emptyEl.classList.remove('hidden');
          } else {
            if (containerEl) {
              containerEl.innerHTML = scripts.map(script => `
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-md border border-gray-200 hover:border-blue-300 transition-colors">
                  <div class="flex items-center gap-3">
                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <span class="text-sm font-medium text-gray-700">${escapeHtml(script)}</span>
                  </div>
                  <button type="button" data-script="${escapeHtml(script)}" class="autojs-execute-script-btn px-3 py-1.5 bg-green-600 text-white text-xs rounded-md hover:bg-green-700 transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    立即执行
                  </button>
                </div>
              `).join('');

              containerEl.querySelectorAll('.autojs-execute-script-btn').forEach(btn => {
                btn.addEventListener('click', handleAutoJsExecuteScript);
              });
            }
          }
        } else {
          if (errorEl) {
            errorEl.classList.remove('hidden');
            if (errorMsgEl) {
              errorMsgEl.textContent = result.error || '获取脚本列表失败';
            }
          }
        }
      } catch (error) {
        if (errorEl) {
          errorEl.classList.remove('hidden');
          if (errorMsgEl) {
            errorMsgEl.textContent = '加载失败：' + error.message;
          }
        }
      } finally {
        if (loadingEl) loadingEl.classList.add('hidden');
        if (refreshIcon) {
          refreshIcon.classList.remove('animate-spin');
        }
      }
    }

    // 执行 AutoJS 脚本
    async function handleAutoJsExecuteScript(e) {
      const btn = e.currentTarget;
      const script = btn.getAttribute('data-script');
      const originalText = btn.innerHTML;

      btn.disabled = true;
      btn.innerHTML = `
        <svg class="animate-spin h-3.5 w-3.5 text-white" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        执行中...
      `;

      try {
        const resp = await fetch('/api/posts/autojs/execute', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ script, sync: false }),
        });

        const result = await resp.json();

        if (result.success) {
          showToast(`脚本 "${script}" 已开始执行`, 'success');
        } else {
          showToast(`执行失败：${result.error || result.message}`, 'error');
        }
      } catch (error) {
        showToast(`执行失败：${error.message}`, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    }

    // ========== 素材库功能 ==========
    let materialsData = [];
    let materialsDirs = [];
    let currentMaterialsDir = '';
    
    // 分页状态
    let currentPage = 1;
    const pageSize = 24;
    let displayedCount = 0;
    let hasMore = false;
    
    // 图片懒加载 Observer
    let imageObserver = null;

    async function loadMaterials(dir) {
      try {
        currentMaterialsDir = dir || '';
        const url = dir ? `/api/materials?dir=${encodeURIComponent(dir)}` : '/api/materials';
        const resp = await fetch(url);
        const data = await resp.json();
        materialsData = data.items || [];
        materialsDirs = data.directories || [];
        // 重置分页状态
        currentPage = 1;
        displayedCount = Math.min(pageSize, materialsData.length);
        hasMore = displayedCount < materialsData.length;
      } catch (e) {
        showToast('加载素材失败：' + e.message, 'error');
      }
    }

    function renderMaterialCard(item) {
      const ext = (item.filename || '').split('.').pop().toLowerCase();
      const previewable = ['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext);
      const relPath = (item.relativePath || '').replace(/\\/g, '/');
      const relJson = JSON.stringify(relPath);
      const preview = previewable
        ? `<img data-src="/api/materials/file/${item.relativePath}" alt="${escapeHtml(item.filename)}" class="w-full h-24 object-cover bg-gray-100 lazy-image" loading="lazy" />`
        : `<a href="/api/materials/file/${item.relativePath}" target="_blank" class="w-full h-24 flex items-center justify-center bg-gray-100 text-xs text-gray-500 hover:bg-gray-200">打开文件</a>`;

      const delBtn = relPath
        ? `<button onclick="deleteMaterial(${relJson})" class="absolute top-1 right-1 px-2 py-1 bg-white/90 border rounded text-xs text-gray-600 hover:bg-white">🗑</button>`
        : '';

      return `<div class="relative border rounded-lg overflow-hidden hover:shadow-md transition-shadow">
        ${preview}
        ${delBtn}
        <div class="p-2">
          <p class="text-xs text-gray-700 truncate">${escapeHtml(item.filename)}</p>
          <p class="text-xs text-gray-400">${item.directory || '根目录'}</p>
        </div>
      </div>`;
    }

    function renderMaterials() {
      const container = document.getElementById('main-content-area');
      let html = `<div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <select id="materials-dir-filter" class="px-3 py-2 border rounded-md text-sm">
            <option value="" ${currentMaterialsDir === '' ? 'selected' : ''}>全部目录</option>
            ${materialsDirs.map(d => `<option value="${d}" ${d === currentMaterialsDir ? 'selected' : ''}>${d}</option>`).join('')}
          </select>
          <button onclick="processMaterials()" id="materials-process-btn" class="px-3 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">🧹 整理素材</button>
          <button onclick="rebuildIndex()" id="materials-rebuild-index-btn" class="px-3 py-2 bg-purple-600 text-white rounded-md text-sm hover:bg-purple-700 disabled:opacity-50 disabled:cursor-not-allowed">🧱 重建索引</button>
          <button onclick="refreshMaterials()" class="px-3 py-2 bg-gray-100 border rounded-md text-sm hover:bg-gray-200">🔄 刷新</button>
        </div>
        <span class="text-sm text-gray-500">已显示 ${displayedCount}/${materialsData.length} 个素材</span>
      </div>`;

      if (materialsData.length === 0) {
        html += '<p class="text-gray-500 text-center py-8">暂无素材。请将图片放入素材库路径中。</p>';
      } else {
        // 计算当前页应显示的素材
        const currentCount = Math.min(currentPage * pageSize, materialsData.length);
        const displayedItems = materialsData.slice(0, currentCount);
        
        if (currentMaterialsDir) {
          const sorted = displayedItems.slice().sort((a, b) => (a.filename || '').localeCompare(b.filename || ''));
          html += `<div class="mb-2 flex items-center justify-between">
            <h3 class="text-sm font-semibold text-gray-700">📁 ${escapeHtml(currentMaterialsDir)}</h3>
            <span class="text-xs text-gray-400">${sorted.length} 个</span>
          </div>`;
          html += '<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">';
          for (const item of sorted) {
            html += renderMaterialCard(item);
          }
          html += '</div>';
        } else {
          const grouped = new Map();
          for (const item of displayedItems) {
            const key = item.directory || '';
            if (!grouped.has(key)) grouped.set(key, []);
            grouped.get(key).push(item);
          }
          const orderedKeys = [];
          if (grouped.has('')) orderedKeys.push('');
          for (const d of materialsDirs) {
            if (grouped.has(d)) orderedKeys.push(d);
          }

          for (const dirKey of orderedKeys) {
            const items = grouped.get(dirKey) || [];
            items.sort((a, b) => (a.filename || '').localeCompare(b.filename || ''));
            const label = dirKey || '根目录';
            html += `<div class="mt-4 mb-2 flex items-center justify-between">
              <h3 class="text-sm font-semibold text-gray-700">📁 ${escapeHtml(label)}</h3>
              <span class="text-xs text-gray-400">${items.length} 个</span>
            </div>`;
            html += '<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">';
            for (const item of items) {
              html += renderMaterialCard(item);
            }
            html += '</div>';
          }
        }
        
        // 加载更多按钮
        if (hasMore) {
          html += `<div class="mt-4 text-center">
            <button onclick="loadMoreMaterials()" class="px-6 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700 transition-colors">
              加载更多
            </button>
          </div>`;
        }
      }
      container.innerHTML = html;

      // 初始化图片懒加载 Observer
      initImageObserver();

      // 绑定目录筛选
      const dirFilter = document.getElementById('materials-dir-filter');
      if (dirFilter) {
        dirFilter.addEventListener('change', async () => {
          await loadMaterials(dirFilter.value);
          renderMaterials();
        });
      }
    }

    async function refreshMaterials() {
      await fetch('/api/materials/refresh', { method: 'POST' });
      await loadMaterials('');
      renderMaterials();
      showToast('素材索引已刷新', 'success');
    }

    async function rebuildIndex() {
      const btn = document.getElementById('materials-rebuild-index-btn');
      try {
        if (btn) {
          btn.disabled = true;
          btn.textContent = '重建中...';
        }
        const resp = await fetch('/api/materials/rebuild-index', { method: 'POST' });
        const data = await resp.json();
        if (!resp.ok) {
          throw new Error(data.error || '重建索引失败');
        }
        await loadMaterials(currentMaterialsDir);
        renderMaterials();
        const r = data.result || {};
        showToast(`索引重建完成：移除记录 ${r.removedRecords || 0}，移除info ${r.removedInfoFiles || 0}，孤儿info ${r.removedOrphanInfoFiles || 0}，索引总数 ${r.total || 0}`, 'success');
      } catch (e) {
        showToast('重建索引失败: ' + e.message, 'error');
      } finally {
        const nextBtn = document.getElementById('materials-rebuild-index-btn');
        if (nextBtn) {
          nextBtn.disabled = false;
          nextBtn.textContent = '🧱 重建索引';

    async function deleteMaterial(relativePath) {
      if (!relativePath) return;
      const ok = confirm(`确认删除该素材？\n${relativePath}`);
      if (!ok) return;
      try {
        const resp = await fetch('/api/materials/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ relativePath })
        });
        const data = await resp.json();
        if (!resp.ok) {
          throw new Error(data.error || '删除失败');
        }
        await loadMaterials(currentMaterialsDir);
        renderMaterials();
        showToast('删除成功', 'success');
      } catch (e) {
        showToast('删除失败: ' + e.message, 'error');
      }
    }

    async function loadMoreMaterials() {
      currentPage++;
      displayedCount = Math.min(currentPage * pageSize, materialsData.length);
      hasMore = displayedCount < materialsData.length;
      renderMaterials();
    }

    function initImageObserver() {
      // 创建 Intersection Observer
      if (!imageObserver) {
        imageObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const img = entry.target;
              const dataSrc = img.dataset.src;
              if (dataSrc && !img.src) {
                img.src = dataSrc;
                // 图片加载完成后添加渐显效果
                img.onload = () => {
                  img.classList.add('loaded');
                };
              }
              imageObserver.unobserve(img);
            }
          });
        }, { rootMargin: '50px' });
      }

      // 观察所有懒加载图片
      document.querySelectorAll('.lazy-image').forEach(img => {
        const dataSrc = img.dataset.src;
        if (dataSrc && !img.src) {
          imageObserver.observe(img);
        } else if (dataSrc && img.src !== dataSrc) {
          // 如果已经有 src 但不是 data-src，更新
          img.src = dataSrc;
        } else if (!dataSrc && img.src) {
          // 已经有 src 的图片，直接标记为 loaded
          img.classList.add('loaded');
        }
      });
    }

    async function processMaterials() {
      const btn = document.getElementById('materials-process-btn');
      try {
        if (btn) {
          btn.disabled = true;
          btn.textContent = '整理中...';
        }
        const resp = await fetch('/api/materials/process', { method: 'POST' });
        const data = await resp.json();
        if (!resp.ok) {
          throw new Error(data.error || '素材整理失败');
        }
        await loadMaterials(currentMaterialsDir);
        renderMaterials();
        const r = data.result || {};
        const remaining = r.skipped || 0;
        const prefix = remaining > 0 ? `本次整理完成，仍有 ${remaining} 个待整理：` : '素材整理完成：';
        showToast(`${prefix}转换 ${r.processed || 0}，忽略非图片 ${r.ignored || 0}，失败 ${r.failed || 0}`, remaining > 0 || (r.failed || 0) > 0 ? 'error' : 'success');
      } catch (e) {
        showToast('素材整理失败: ' + e.message, 'error');
      } finally {
        const nextBtn = document.getElementById('materials-process-btn');
        if (nextBtn) {
          nextBtn.disabled = false;
          nextBtn.textContent = '🧹 整理素材';
        }
      }
    }

    function toggleGlobalPromptForm() {
      const form = document.getElementById('global-prompt-form');
      const btn = document.getElementById('global-prompt-toggle-btn');
      if (!form) return;

      const isHidden = form.classList.contains('hidden');
      form.classList.toggle('hidden');
      if (btn) btn.textContent = isHidden ? '收起' : '展开编辑';

      // 填充表单
      if (isHidden && globalPromptData) {
        const p = globalPromptData.personalInfo || {};
        document.getElementById('gp-carModel').value = p.carModel || '';

    // ========== 素材文件选择器 ==========

    /**

                选择整个目录

            </div>
          </div>
          <!-- 内容区 -->
          <div id="picker-body" class="flex-1 overflow-y-auto p-4">
            <p class="text-gray-400 text-sm text-center py-8">加载中...</p>
          </div>
          <!-- 底栏 -->
          <div class="px-5 py-3 border-t bg-gray-50 flex items-center justify-between flex-shrink-0">

              <button onclick="closeMaterialPicker()" class="px-4 py-1.5 text-sm bg-white border rounded-md hover:bg-gray-50">取消</button>

      document.body.appendChild(overlay);
