# 互联网搜索配置
internetSearch:
  enabled: true
  # 小红书 Cookie（从浏览器获取，不需要登录账号）
  xiaohongshuCookie: "${XIAOHONGSHU_COOKIE}"
  # 知乎 Access Secret（从知乎开放平台获取）
  zhihuAccessSecret: "${ZHIHU_ACCESS_SECRET}"
  # 汽车之家 Cookie（从浏览器获取，登录后获取）
  autohomeCookie: "${AUTOHOME_COOKIE}"
  # 平台优先级（1 最高，5 最低）
  platforms:
    - name: xiaohongshu
      enabled: true
      priority: 4
    - name: zhihu
      enabled: true
      priority: 3
    - name: autohome
      enabled: true
      priority: 5
