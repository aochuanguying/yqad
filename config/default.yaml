chromadb:
  test:
    baseUrl: "http://192.168.50.50:8000"
  production:
    baseUrl: "http://192.168.50.50:8000"
web:
  enabled: true
  port: 3000
  baseUrl: "https://yqad.hxfssc.com:8088"
  auth:
    sessionSecret: "random-secret-key-yqad-auto-tasks"
    sessionMaxAge: 86400000
    publicRoutes:
      - "/api/auth/login"
      - "/api/auth/status"
      - "/api/auth/token-status"
      - "/api/auth/verify"
      - "/api/member/info"
      - "/api/posts/token"
      - "/api/posts/token/*"
      - "/api/posts/generate"
      - "/api/posts/batch"
      - "/api/posts/confirm"
      - "/api/posts/tasks/*"
materials:
  basePath: "./data/materials/processed"
  rawPath: "./data/materials/raw"
  processedPath: "./data/materials/processed"
  processing:
    enabled: true
    outputFormat: "jpeg"
    jpegQuality: 82
    enableVision: true
    maxFilesPerRun: 1000
    heicFallback:
      enabled: true
      command: "auto"
      timeoutMs: 30000
logLevel: "info"

# 注意：业务配置（如车辆监控、互联网搜索、发帖配置等）已迁移到数据库
# 请在数据库中配置以下表：
# - vehicle_monitor_config: 车辆监控配置
# - internet_reference_config: 互联网参考配置
# - internet_reference_platforms: 互联网平台配置
# - post_config: 发帖配置
# - comment_config: 评论配置
# - 其他配置表查看 src/db/migrations/ 中的 *_config 表
