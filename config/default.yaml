      - "/api/posts/generate"
      - "/api/posts/batch"
      - "/api/posts/confirm"
      - "/api/posts/tasks/*"
materials:
  basePath: "./data/materials/processed"
  rawPath: "./data/materials/raw"
  processedPath: "./data/materials/processed"
  processing:
    enabled: true
    outputFormat: "jpeg"
    jpegQuality: 82
    enableVision: true
    maxFilesPerRun: 1000
    heicFallback:
      enabled: true
      command: "auto"
      timeoutMs: 30000
logLevel: "debug"
