<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一汽奥迪APP - 配置管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
    .toast { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    /* 图片懒加载渐显效果 */
    .lazy-image {
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }
    .lazy-image.loaded {
      opacity: 1;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Header -->

    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-4">

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5l5 5v6a2 2 0 01-2 2z"></path>
          </svg>
          车辆监控
        </a>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-sm text-gray-500" id="status-text">加载中...</span>
        <span id="user-info" class="text-sm text-gray-600 hidden"></span>
        <button id="logout-btn" class="hidden px-3 py-1 bg-red-600 text-white text-sm rounded-md hover:bg-red-700 transition-colors flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>

  </header>

  <!-- Toast notification -->
  <div id="toast" class="fixed top-4 right-4 z-50 hidden"></div>

  <!-- Main content -->
  <main class="max-w-6xl mx-auto px-6 py-6">
    <!-- Tabs -->
    <div class="bg-white rounded-lg shadow-sm border overflow-hidden">
      <nav class="flex overflow-x-auto border-b" id="tabs">
        <button class="tab-btn px-4 py-3 text-sm whitespace-nowrap hover:bg-gray-50" data-group="api">API 设置</button>
        <button class="tab-btn px-4 py-3 text-sm whitespace-nowrap hover:bg-gray-50 text-red-700 font-medium" data-group="login">🔐 登录</button>
        <button class="tab-btn px-4 py-3 text-sm whitespace-nowrap hover:bg-gray-50 text-blue-700 font-medium" data-group="api-token">🔑 API Token</button>
        <button class="tab-btn px-4 py-3 text-sm whitespace-nowrap hover:bg-gray-50" data-group="ai">AI 模型</button>
        <button class="tab-btn px-4 py-3 text-sm whitespace-nowrap hover:bg-gray-50" data-group="comment">评论</button>
        <button class="tab-btn px-4 py-3 text-sm whitespace-nowrap hover:bg-gray-50" data-group="post">发帖</button>
        <button class="tab-btn px-4 py-3 text-sm whitespace-nowrap hover:bg-gray-50" data-group="scheduler">调度</button>
        <button class="tab-btn px-4 py-3 text-sm whitespace-nowrap hover:bg-gray-50" data-group="contentLimits">内容长度</button>
        <button class="tab-btn px-4 py-3 text-sm whitespace-nowrap hover:bg-gray-50 text-green-700 font-medium" data-group="materials">📷 素材库</button>
        <button class="tab-btn px-4 py-3 text-sm whitespace-nowrap hover:bg-gray-50 text-purple-700 font-medium" data-group="topics">📝 发帖主题</button>
        <button class="tab-btn px-4 py-3 text-sm whitespace-nowrap hover:bg-gray-50 text-indigo-700 font-medium" data-group="post-logs">📝 发帖日志</button>
        <button class="tab-btn px-4 py-3 text-sm whitespace-nowrap hover:bg-gray-50 text-cyan-700 font-medium" onclick="window.open('/autojs-config.html', '_blank')">🤖 AutoJS 配置</button>

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>

        <button id="manual-comment-btn" class="hidden px-6 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">

    let currentGroup = 'api';
    let configData = {};

    // 初始化
    async function init() {
      await checkAuthStatus();
      await loadConfig();
      setupTabs();
      switchTab('api');
      setupLogout();
    }

    // 检查登录状态
    async function checkAuthStatus() {
      try {
        const resp = await fetch('/api/auth/status');
        const data = await resp.json();
        
        if (data.data && data.data.authenticated) {
          // 已登录，显示用户信息和登出按钮
          const userInfo = document.getElementById('user-info');
          const logoutBtn = document.getElementById('logout-btn');
          
          if (userInfo && logoutBtn) {
            userInfo.textContent = `欢迎，${data.data.username || '管理员'}`;
            userInfo.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');
          }
        } else {
          // 未登录，跳转到登录页
          window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
        }
      } catch (e) {
        console.error('检查登录状态失败:', e);
        window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
      }
    }

    // 设置登出功能
    function setupLogout() {
      const logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', async () => {
          try {
            const resp = await fetch('/api/auth/logout', { method: 'POST' });
            if (resp.ok) {
              showToast('已退出登录', 'success');
              setTimeout(() => {
                window.location.href = '/login.html';
              }, 500);
            } else {
              showToast('退出登录失败', 'error');
            }
          } catch (e) {
            console.error('退出登录失败:', e);
            showToast('退出登录失败', 'error');
          }
        });
      }
    }

    // 加载配置
    async function loadConfig() {
      try {
        const resp = await fetch('/api/config');
        if (!resp.ok) {
          if (resp.status === 401) {
            window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
            return;
          }
          throw new Error(`HTTP ${resp.status}`);
        }
        configData = await resp.json();
        document.getElementById('status-text').textContent = '已连接';
      } catch (e) {
        document.getElementById('status-text').textContent = '连接失败';
        showToast('无法加载配置：' + e.message, 'error');
      }
    }

    // 设置 Tab 点击事件
    function setupTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        // 只对有 data-group 的按钮绑定事件
        if (btn.dataset.group) {
          btn.addEventListener('click', () => switchTab(btn.dataset.group));
        }
      });
    }

    // 切换 Tab
    function switchTab(group) {
      currentGroup = group;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('tab-active', btn.dataset.group === group);
      });

      // 特殊 Tab 处理
      const saveBtn = document.getElementById('save-btn');
      const manualCommentBtn = document.getElementById('manual-comment-btn');
      const manualPostBtn = document.getElementById('manual-post-btn');
      
      // 评论 Tab 显示立即评论按钮和评论记录
      if (group === 'comment') {
        manualCommentBtn.style.display = 'flex';
        manualPostBtn.style.display = 'none';
        saveBtn.style.display = '';
        renderCommentTab();
      } else if (group === 'login') {
        manualCommentBtn.style.display = 'none';
        manualPostBtn.style.display = 'none';
        saveBtn.style.display = 'none';
        renderLoginTab();
      } else if (group === 'api-token') {
        manualCommentBtn.style.display = 'none';
        manualPostBtn.style.display = 'none';
        saveBtn.style.display = 'none';
        renderApiTokenTab();
      } else if (group === 'materials') {
        manualCommentBtn.style.display = 'none';
        manualPostBtn.style.display = 'none';
        saveBtn.style.display = 'none';
        loadMaterials('').then(() => renderMaterials());
      } else if (group === 'topics') {
        manualCommentBtn.style.display = 'none';
        manualPostBtn.style.display = 'none';
        saveBtn.style.display = 'none';
        loadTopics().then(() => renderTopics());
      } else if (group === 'post-logs') {
        manualCommentBtn.style.display = 'none';
        manualPostBtn.style.display = 'none';
        saveBtn.style.display = 'none';
        renderPostLogsTab();
      } else if (group === 'ai') {
        manualCommentBtn.style.display = 'none';
        manualPostBtn.style.display = 'none';
        saveBtn.style.display = 'none';
        renderAITab();
      } else if (group === 'post') {
        manualCommentBtn.style.display = 'none';
        manualPostBtn.style.display = 'flex';
        saveBtn.style.display = '';
        renderForm(group);
      } else {
        manualCommentBtn.style.display = 'none';
        manualPostBtn.style.display = 'none';
        saveBtn.style.display = '';
        renderForm(group);
      }
    }

    // 渲染表单
    function renderForm(group) {
      const container = document.getElementById('form-container');
      const data = configData[group];
      if (!data) {
        container.innerHTML = '<p class="text-red-500">该分组配置不存在</p>';
        return;
      }

      const labels = FIELD_LABELS[group] || {};
      let filteredData = data;
      
      // 特殊分组处理
      if (group === 'ai') {
        filteredData = { providerOrder: data.providerOrder || '', requestTimeout: data.requestTimeout || 30000, providers: data.providers };
      } else if (group === 'scheduler') {
        // 过滤掉 analysis 字段
        filteredData = Object.fromEntries(Object.entries(data).filter(([key]) => key !== 'analysis'));
      } else if (group === 'vehicleMonitor') {
        // 确保车辆监控的所有字段都显示（包括可能缺失的字段）
        filteredData = {
          enabled: data.enabled !== undefined ? data.enabled : true,
          intervalMinutes: data.intervalMinutes || 15,
          quickIntervalMinutes: data.quickIntervalMinutes || 5,
          safeDistanceMeters: data.safeDistanceMeters || 100,
          moveThresholdMeters: data.moveThresholdMeters || 50,
          minBatteryVolt: data.minBatteryVolt || 11.5,
          haBaseUrl: data.haBaseUrl || '',
          haToken: data.haToken || '',
          deviceTrackerEntity: data.deviceTrackerEntity || '',
          token: data.token || '',
        };
      }
      
      container.innerHTML = buildFormFields(filteredData, labels, group);
    }

    // 构建表单字段 HTML（支持嵌套对象）
    function buildFormFields(data, labels, prefix) {
      let html = '';
      for (const [key, value] of Object.entries(data)) {
        const fieldPath = prefix + '.' + key;
        const label = (typeof labels === 'object' && labels[key]) || key;

        if (Array.isArray(value)) {
          // 字符串数组（如 providerOrder）：以逗号分隔的输入框
          if (value.length === 0 || typeof value[0] === 'string') {
            html += buildSingleField(fieldPath, typeof label === 'string' ? label : key, value.join(', '), key, 'string-array');
          } else {
            // 对象数组（如 providers）：每个元素渲染为嵌套 fieldset
            html += `<fieldset class="border rounded-md p-4 mb-4"><legend class="text-sm font-semibold text-gray-600 px-2">${key}</legend>`;
            value.forEach((item, idx) => {
              if (item !== null && typeof item === 'object') {
                const itemLabel = item.name || (idx + 1);
                html += `<fieldset class="border border-dashed rounded-md p-3 mb-3"><legend class="text-xs font-medium text-gray-500 px-1">${itemLabel}</legend>`;
                html += buildFormFields(item, {}, fieldPath + '.' + idx);
                html += '</fieldset>';
              }
            });
            html += '</fieldset>';
          }
        } else if (value !== null && typeof value === 'object') {
          // 嵌套对象 - 创建子分组
          const subLabels = (typeof label === 'object') ? label : {};
          html += `<fieldset class="border rounded-md p-4 mb-4"><legend class="text-sm font-semibold text-gray-600 px-2">${typeof label === 'string' ? label : key}</legend>`;
          html += buildFormFields(value, subLabels, fieldPath);
          html += '</fieldset>';
        } else {
          const displayLabel = typeof label === 'string' ? label : key;
          html += buildSingleField(fieldPath, displayLabel, value, key);
        }
      }
      return html;
    }

    // 构建单个字段
    function buildSingleField(fieldPath, label, value, key, typeOverride) {
      const inputId = 'field-' + fieldPath.replace(/\./g, '-');
      let inputHtml = '';
      const effectiveType = typeOverride || (typeof value);

      // 获取提示词
      const tooltip = FIELD_TOOLTIPS[fieldPath] || '';
      const tooltipIcon = tooltip ? `<span class="ml-2 text-gray-400 cursor-help" title="${escapeHtml(tooltip)}">💡</span>` : '';

      if (effectiveType === 'string-array') {
        inputHtml = `<input id="${inputId}" data-path="${fieldPath}" data-type="string-array" type="text" value="${escapeHtml(String(value))}" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="逗号分隔，如: higpt, gpt" />`;
      } else if (effectiveType === 'boolean') {
        inputHtml = `<select id="${inputId}" data-path="${fieldPath}" data-type="boolean" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
          <option value="true" ${value ? 'selected' : ''}>启用</option>
          <option value="false" ${!value ? 'selected' : ''}>禁用</option>
        </select>`;
      } else if (typeof value === 'number') {
        // 检查是否是 intervalMinutes 字段
        const isIntervalField = fieldPath === 'scheduler.materialProcessing.intervalMinutes';
        let quickSelectHtml = '';
        if (isIntervalField) {
          quickSelectHtml = `
            <div class="flex gap-2 mt-2 flex-wrap">
              <span class="text-xs text-gray-500 self-center">快速选择：</span>
              <button type="button" onclick="setIntervalValue(5)" class="px-2 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded">5 分钟</button>
              <button type="button" onclick="setIntervalValue(10)" class="px-2 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded">10 分钟</button>
              <button type="button" onclick="setIntervalValue(15)" class="px-2 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded">15 分钟</button>
              <button type="button" onclick="setIntervalValue(30)" class="px-2 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded">30 分钟</button>
              <button type="button" onclick="setIntervalValue(60)" class="px-2 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded">60 分钟</button>
            </div>`;
        }
        inputHtml = `<input id="${inputId}" data-path="${fieldPath}" data-type="number" type="number" value="${value}" min="5" max="1440" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />${quickSelectHtml}`;
      } else if (key === 'mode') {
        inputHtml = `<select id="${inputId}" data-path="${fieldPath}" data-type="string" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
          <option value="mock" ${value === 'mock' ? 'selected' : ''}>mock</option>
          <option value="real" ${value === 'real' ? 'selected' : ''}>real</option>
        </select>`;
      } else if (key === 'level') {
        inputHtml = `<select id="${inputId}" data-path="${fieldPath}" data-type="string" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
          <option value="error" ${value === 'error' ? 'selected' : ''}>error</option>
          <option value="warn" ${value === 'warn' ? 'selected' : ''}>warn</option>
          <option value="info" ${value === 'info' ? 'selected' : ''}>info</option>
          <option value="debug" ${value === 'debug' ? 'selected' : ''}>debug</option>
        </select>`;
      } else if (key === 'apiKey' || key === 'password' || key === 'passwordHash') {
        // 敏感字段使用密码输入框（Token 字段需要明文显示）
        inputHtml = `<input id="${inputId}" data-path="${fieldPath}" data-type="string" type="password" value="${escapeHtml(String(value))}" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" autocomplete="off" />`;
      } else if (key === 'token' || key === 'haToken') {
        // Token 字段使用明文输入框
        inputHtml = `<input id="${inputId}" data-path="${fieldPath}" data-type="string" type="text" value="${escapeHtml(String(value))}" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />`;
      } else {
        inputHtml = `<input id="${inputId}" data-path="${fieldPath}" data-type="string" type="text" value="${escapeHtml(String(value))}" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />`;
      }

      return `<div class="mb-4">
        <label for="${inputId}" class="block text-sm font-medium text-gray-700 mb-1 flex items-center">
          ${label}
          ${tooltipIcon}
        </label>
        ${inputHtml}
      </div>`;
    }

    // 收集表单数据
    function collectFormData() {
      const data = JSON.parse(JSON.stringify(configData[currentGroup]));
      if (currentGroup === 'scheduler') {
        delete data.analysis;
      }
      const inputs = document.querySelectorAll('[data-path]');

      inputs.forEach(input => {
        const path = input.dataset.path;
        const type = input.dataset.type;
        const parts = path.split('.').slice(1); // 去掉第一段（group名）

        let value;
        if (type === 'boolean') {
          value = input.value === 'true';
        } else if (type === 'number') {
          value = Number(input.value);
        } else if (type === 'string-array') {
          // 逗号分隔的字符串 → 数组
          value = input.value.split(',').map(s => s.trim()).filter(s => s.length > 0);
        } else {
          value = input.value;
        }

        // 设置嵌套值
        let obj = data;
        for (let i = 0; i < parts.length - 1; i++) {
          obj = obj[parts[i]];
        }
        obj[parts[parts.length - 1]] = value;
      });

      return data;
    }

    // 保存配置
    async function saveConfig() {
      const saveBtn = document.getElementById('save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = '保存中...';

      try {
        const data = collectFormData();
        const resp = await fetch(`/api/config/${currentGroup}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        const result = await resp.json();
        if (resp.ok) {
          showToast('配置保存成功', 'success');
          // 刷新本地数据
          configData[currentGroup] = data;
        } else {
          showToast('保存失败: ' + (result.error || '未知错误'), 'error');
        }
      } catch (e) {
        showToast('保存失败: ' + e.message, 'error');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = '保存配置';
      }
    }

    // 设置间隔时间值
    function setIntervalValue(minutes) {
      const input = document.getElementById('field-scheduler-materialProcessing-intervalMinutes');
      if (input) {
        input.value = minutes;
        // 触发 input 事件以更新配置数据
        input.dispatchEvent(new Event('input', { bubbles: true }));
        showToast(`已设置间隔时间为 ${minutes} 分钟`, 'success');
      }
    }

    // 显示提示
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      const bgColor = type === 'success' ? 'bg-green-500' : 'bg-red-500';
      toast.innerHTML = `<div class="toast ${bgColor} text-white px-6 py-3 rounded-lg shadow-lg">${escapeHtml(message)}</div>`;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 4000);
    }

    // HTML 转义
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // 绑定保存按钮
    document.getElementById('save-btn').addEventListener('click', saveConfig);

      try {

          <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">

            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          执行中...
        `;

        showToast('开始执行评论任务...', 'success');

        const resp = await fetch('/api/comment/execute', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          credentials: 'include',  // 携带 Session Cookie
        });

        const result = await resp.json();

        if (resp.ok && result.success) {

          }

    // 获取 API Token（从配置中获取）
    async function getApiToken() {

        const resp = await fetch('/api/posts/token', {
          headers: { 'Content-Type': 'application/json' },
        });
        if (resp.ok) {
          const result = await resp.json();

    // 绑定立即评论按钮

    // 加载评论日志
    async function loadCommentLogs(page = 1) {
      const container = document.getElementById('comment-logs-container');
      const paginationContainer = document.getElementById('comment-logs-pagination');
      
      try {
        const resp = await fetch(`/api/comment/logs?page=${page}&pageSize=${commentLogsPageSize}`);
        const result = await resp.json();
        
        if (!result.success) {
          container.innerHTML = '<p class="text-red-500">加载失败</p>';
          return;
        }
        
        const { logs, total } = result.data;
        commentLogsTotal = total;
        
        if (logs.length === 0) {
          container.innerHTML = '<p class="text-gray-500 text-sm">暂无评论记录</p>';
          paginationContainer.innerHTML = '';
          return;
        }
        
        // 渲染评论记录
        let html = '<div class="space-y-3">';
        for (const log of logs) {
          // MySQL 返回 created_at，兼容旧的 timestamp 字段
          const timestamp = log.created_at ? new Date(log.created_at).toLocaleString('zh-CN') : (log.timestamp ? new Date(log.timestamp).toLocaleString('zh-CN') : 'Invalid Date');
          
          // 成功显示"成功"，失败显示"失败" + 模式
          let statusBadge = '';
          let modeBadge = '';
          let sourceBadge = '';
          
          if (log.success) {
            // 成功：只显示"成功"标签
            statusBadge = '<span class="px-2 py-0.5 text-xs bg-green-100 text-green-700 rounded">成功</span>';
          } else {
            // 失败：显示"失败"标签，只有兜底模式才显示"兜底"标签
            statusBadge = '<span class="px-2 py-0.5 text-xs bg-red-100 text-red-700 rounded">失败</span>';
            modeBadge = log.mode === 'fallback'
              ? '<span class="px-2 py-0.5 text-xs bg-orange-100 text-orange-700 rounded">兜底</span>'
              : '';  // 正常模式失败时不显示模式标签
          }
          
          // 显示来源标签
          sourceBadge = log.source === 'manual'
            ? '<span class="px-2 py-0.5 text-xs bg-purple-100 text-purple-700 rounded">手工</span>'
            : '<span class="px-2 py-0.5 text-xs bg-gray-100 text-gray-700 rounded">自动</span>';
          
          // MySQL 返回 post_title，兼容旧的 postTitle 字段
          const postTitle = log.post_title || log.postTitle || '未知帖子';
          
          html += `<div class="border rounded-md p-3 bg-white hover:shadow-sm transition-shadow">`;
          html += `<div class="flex items-start justify-between gap-2 mb-2">`;
          html += `<div class="flex items-center gap-2">`;
          html += statusBadge;
          if (modeBadge) html += modeBadge;
          html += sourceBadge;
          html += `<span class="text-xs text-gray-500">${timestamp}</span>`;
          html += `</div>`;
          html += `</div>`;
          html += `<div class="space-y-1 text-sm">`;
          html += `<div class="text-gray-800 font-medium">📌 ${escapeHtml(postTitle)}</div>`;
          if (log.comment_content && log.success) {
            html += `<div class="text-gray-600">💬 ${escapeHtml(log.comment_content.substring(0, 100))}${log.comment_content.length > 100 ? '...' : ''}</div>`;
          }
          if (log.error) {
            html += `<div class="text-red-500">❌ ${escapeHtml(log.error)}</div>`;
          }
          html += `</div>`;
          html += `</div>`;
        }
        html += '</div>';
        
        container.innerHTML = html;
        
        // 渲染分页
        const totalPages = Math.ceil(total / commentLogsPageSize);
        if (totalPages > 1) {
          let paginationHtml = '<div class="flex items-center gap-2">';
          paginationHtml += `<button onclick="loadCommentLogs(${page - 1})" ${page === 1 ? 'disabled class="px-3 py-1 text-gray-400 cursor-not-allowed"' : 'class="px-3 py-1 bg-gray-100 hover:bg-gray-200 rounded"'}>上一页</button>`;
          paginationHtml += `<span class="text-sm text-gray-600">第 ${page} / ${totalPages} 页</span>`;
          paginationHtml += `<button onclick="loadCommentLogs(${page + 1})" ${page === totalPages ? 'disabled class="px-3 py-1 text-gray-400 cursor-not-allowed"' : 'class="px-3 py-1 bg-gray-100 hover:bg-gray-200 rounded"'}>下一页</button>`;
          paginationHtml += '</div>';
          paginationContainer.innerHTML = paginationHtml;
        } else {
          paginationContainer.innerHTML = '';
        }
      } catch (e) {
        container.innerHTML = '<p class="text-red-500">加载失败：' + e.message + '</p>';
      }
    }

    // ========== 发帖日志 Tab 渲染 ==========
    let postLogsPage = 1;
    const postLogsPageSize = 20;
    let postLogsTotal = 0;
    let postLogsFilter = 'all'; // 'all', 'auto', 'manual'

    // 渲染发帖日志 Tab
    function renderPostLogsTab() {
      const container = document.getElementById('form-container');
      
      let html = '<div class="space-y-4">';

    // 加载发帖日志
    async function loadPostLogs(page = 1, filter = 'all') {
      const container = document.getElementById('post-logs-container');
      const paginationContainer = document.getElementById('post-logs-pagination');
      
      try {
        let url = `/api/posts/logs?page=${page}&limit=${postLogsPageSize}`;
        if (filter && filter !== 'all') {
          url += `&triggerType=${filter}`;
        }
        
        const resp = await fetch(url);
        const result = await resp.json();
        
        if (!result.success) {
          container.innerHTML = '<p class="text-red-500">加载失败</p>';
          return;
        }
        
        const { logs, total, totalPages } = result.data;
        postLogsTotal = total;
        
        if (logs.length === 0) {
          container.innerHTML = '<p class="text-gray-500 text-sm">暂无发帖记录</p>';
          paginationContainer.innerHTML = '';
          return;
        }
        
        // 渲染日志列表
        let html = '<div class="space-y-3">';
        logs.forEach(log => {
          const isManual = log.triggerType === 'manual';
          const hasTopic = !!log.topicName;  // 根据 topicName 是否存在判断
          const isSuccess = log.status === 'success';
          const timeStr = new Date(log.timestamp).toLocaleString('zh-CN');
          
          html += `<div class="border rounded-lg p-4 hover:shadow-md transition-shadow ${isSuccess ? 'bg-white' : 'bg-red-50'}">`;
          html += '<div class="flex items-start justify-between mb-2">';
          html += '<div class="flex items-center gap-2">';
          html += `<span class="px-2 py-1 text-xs rounded ${isManual ? 'bg-indigo-100 text-indigo-700' : 'bg-blue-100 text-blue-700'}">${isManual ? '手动' : '自动'}</span>`;
          html += `<span class="px-2 py-1 text-xs rounded ${hasTopic ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-700'}">${hasTopic ? '📝主题发帖' : '自由发帖'}</span>`;
          if (log.topicName) {
            html += `<span class="px-2 py-1 text-xs rounded bg-green-100 text-green-700">${escapeHtml(log.topicName)}</span>`;
          }
          html += '</div>';
          html += `<span class="text-xs text-gray-500">${timeStr}</span>`;
          html += '</div>';
          
          html += `<h4 class="font-semibold text-gray-800 mb-2">${escapeHtml(log.title)}</h4>`;
          
          // 显示发帖内容（折叠）
          if (log.content && log.content.trim()) {
            html += `<details class="mb-2">`;
            html += `<summary class="text-xs text-blue-600 cursor-pointer hover:text-blue-800">📄 查看内容（${log.content.length}字）</summary>`;
            html += `<p class="text-sm text-gray-700 mt-1 p-2 bg-gray-50 rounded">${escapeHtml(log.content)}</p>`;
            html += `</details>`;
          }
          
          if (log.status === 'pending') {
            html += `<p class="text-sm text-yellow-600 mb-2">⏳ 等待 AutoJS 脚本回调...</p>`;
          } else if (log.status === 'failed' && log.errorMessage) {
            html += `<p class="text-sm text-red-600 mb-2">❌ ${escapeHtml(log.errorMessage)}</p>`;
          } else if (log.status === 'success') {
            html += `<p class="text-sm text-green-600 mb-2">✅ 发布成功</p>`;
          } else {
            html += `<p class="text-sm text-gray-600 mb-2">未知状态：${log.status}</p>`;
          }
          
          // 图片预览
          if (log.imageUrls && log.imageUrls.length > 0) {
            html += '<div class="flex gap-2 mt-2 overflow-x-auto">';
            log.imageUrls.slice(0, 5).forEach((imgUrl, idx) => {
              html += `<div class="relative w-16 h-16">`;
              html += `<img src="${imgUrl}" class="w-16 h-16 object-cover rounded" loading="lazy" onerror="this.style.display='none';document.getElementById('img-placeholder-${idx}-${log.id}').style.display='flex';" />`;
              html += `<div id="img-placeholder-${idx}-${log.id}" class="absolute inset-0 bg-gray-100 rounded flex items-center justify-center text-xs text-gray-400" style="display:none;">图片</div>`;
              html += `</div>`;
            });
            if (log.imageUrls.length > 5) {
              html += `<span class="w-16 h-16 flex items-center justify-center bg-gray-100 rounded text-xs text-gray-500">+${log.imageUrls.length - 5}</span>`;
            }
            html += '</div>';
          }
          
          html += '</div>';
        });
        html += '</div>';
        
        container.innerHTML = html;
        
        // 渲染分页
        if (totalPages > 1) {
          let paginationHtml = '<div class="flex items-center gap-2">';
          
          if (page > 1) {
            paginationHtml += `<button onclick="loadPostLogs(${page - 1}, '${filter}')" class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">上一页</button>`;
          }
          
          paginationHtml += `<span class="text-sm text-gray-600">第 ${page} / ${totalPages} 页（共 ${total} 条）</span>`;
          
          if (page < totalPages) {
            paginationHtml += `<button onclick="loadPostLogs(${page + 1}, '${filter}')" class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">下一页</button>`;
          }
          
          paginationHtml += '</div>';
          paginationContainer.innerHTML = paginationHtml;
        } else {
          paginationContainer.innerHTML = '';
        }
      } catch (e) {
        container.innerHTML = '<p class="text-red-500">加载异常：' + e.message + '</p>';
      }
    }

    // ========== 素材库功能 ==========
    let materialsData = [];
    let materialsDirs = [];
    let currentMaterialsDir = '';
    
    // 分页状态
    let currentPage = 1;
    const pageSize = 24;
    let displayedCount = 0;
    let hasMore = false;
    
    // 图片懒加载 Observer
    let imageObserver = null;

    async function loadMaterials(dir) {
      try {
        currentMaterialsDir = dir || '';
        const url = dir ? `/api/materials?dir=${encodeURIComponent(dir)}` : '/api/materials';
        const resp = await fetch(url);
        const data = await resp.json();
        materialsData = data.items || [];
        materialsDirs = data.directories || [];
        // 重置分页状态
        currentPage = 1;
        displayedCount = Math.min(pageSize, materialsData.length);
        hasMore = displayedCount < materialsData.length;
      } catch (e) {
        showToast('加载素材失败：' + e.message, 'error');
      }
    }

    function renderMaterialCard(item) {
      const ext = (item.filename || '').split('.').pop().toLowerCase();
      const previewable = ['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext);
      const relPath = (item.relativePath || '').replace(/\\/g, '/');
      const relJson = JSON.stringify(relPath);
      const preview = previewable
        ? `<img data-src="/api/materials/file/${item.relativePath}" alt="${escapeHtml(item.filename)}" class="w-full h-24 object-cover bg-gray-100 lazy-image" loading="lazy" />`
        : `<a href="/api/materials/file/${item.relativePath}" target="_blank" class="w-full h-24 flex items-center justify-center bg-gray-100 text-xs text-gray-500 hover:bg-gray-200">打开文件</a>`;

      const delBtn = relPath
        ? `<button onclick="deleteMaterial(${relJson})" class="absolute top-1 right-1 px-2 py-1 bg-white/90 border rounded text-xs text-gray-600 hover:bg-white">🗑</button>`
        : '';

      return `<div class="relative border rounded-lg overflow-hidden hover:shadow-md transition-shadow">
        ${preview}
        ${delBtn}
        <div class="p-2">
          <p class="text-xs text-gray-700 truncate">${escapeHtml(item.filename)}</p>
          <p class="text-xs text-gray-400">${item.directory || '根目录'}</p>
        </div>
      </div>`;
    }

    function renderMaterials() {
      const container = document.getElementById('form-container');
      let html = `<div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <select id="materials-dir-filter" class="px-3 py-2 border rounded-md text-sm">
            <option value="" ${currentMaterialsDir === '' ? 'selected' : ''}>全部目录</option>
            ${materialsDirs.map(d => `<option value="${d}" ${d === currentMaterialsDir ? 'selected' : ''}>${d}</option>`).join('')}
          </select>
          <button onclick="processMaterials()" id="materials-process-btn" class="px-3 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">🧹 整理素材</button>
          <button onclick="rebuildIndex()" id="materials-rebuild-index-btn" class="px-3 py-2 bg-purple-600 text-white rounded-md text-sm hover:bg-purple-700 disabled:opacity-50 disabled:cursor-not-allowed">🧱 重建索引</button>
          <button onclick="refreshMaterials()" class="px-3 py-2 bg-gray-100 border rounded-md text-sm hover:bg-gray-200">🔄 刷新</button>
        </div>
        <span class="text-sm text-gray-500">已显示 ${displayedCount}/${materialsData.length} 个素材</span>
      </div>`;

      if (materialsData.length === 0) {
        html += '<p class="text-gray-500 text-center py-8">暂无素材。请将图片放入素材库路径中。</p>';
      } else {
        // 计算当前页应显示的素材
        const currentCount = Math.min(currentPage * pageSize, materialsData.length);
        const displayedItems = materialsData.slice(0, currentCount);
        
        if (currentMaterialsDir) {
          const sorted = displayedItems.slice().sort((a, b) => (a.filename || '').localeCompare(b.filename || ''));
          html += `<div class="mb-2 flex items-center justify-between">
            <h3 class="text-sm font-semibold text-gray-700">📁 ${escapeHtml(currentMaterialsDir)}</h3>
            <span class="text-xs text-gray-400">${sorted.length} 个</span>
          </div>`;
          html += '<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">';
          for (const item of sorted) {
            html += renderMaterialCard(item);
          }
          html += '</div>';
        } else {
          const grouped = new Map();
          for (const item of displayedItems) {
            const key = item.directory || '';
            if (!grouped.has(key)) grouped.set(key, []);
            grouped.get(key).push(item);
          }
          const orderedKeys = [];
          if (grouped.has('')) orderedKeys.push('');
          for (const d of materialsDirs) {
            if (grouped.has(d)) orderedKeys.push(d);
          }

          for (const dirKey of orderedKeys) {
            const items = grouped.get(dirKey) || [];
            items.sort((a, b) => (a.filename || '').localeCompare(b.filename || ''));
            const label = dirKey || '根目录';
            html += `<div class="mt-4 mb-2 flex items-center justify-between">
              <h3 class="text-sm font-semibold text-gray-700">📁 ${escapeHtml(label)}</h3>
              <span class="text-xs text-gray-400">${items.length} 个</span>
            </div>`;
            html += '<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">';
            for (const item of items) {
              html += renderMaterialCard(item);
            }
            html += '</div>';
          }
        }
        
        // 加载更多按钮
        if (hasMore) {
          html += `<div class="mt-4 text-center">
            <button onclick="loadMoreMaterials()" class="px-6 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700 transition-colors">
              加载更多
            </button>
          </div>`;
        }
      }
      container.innerHTML = html;

      // 初始化图片懒加载 Observer
      initImageObserver();

      // 绑定目录筛选
      const dirFilter = document.getElementById('materials-dir-filter');
      if (dirFilter) {
        dirFilter.addEventListener('change', async () => {
          await loadMaterials(dirFilter.value);
          renderMaterials();
        });
      }
    }

    async function refreshMaterials() {
      await fetch('/api/materials/refresh', { method: 'POST' });
      await loadMaterials('');
      renderMaterials();
      showToast('素材索引已刷新', 'success');
    }

    async function rebuildIndex() {
      const btn = document.getElementById('materials-rebuild-index-btn');
      try {
        if (btn) {
          btn.disabled = true;
          btn.textContent = '重建中...';
        }
        const resp = await fetch('/api/materials/rebuild-index', { method: 'POST' });
        const data = await resp.json();
        if (!resp.ok) {
          throw new Error(data.error || '重建索引失败');
        }
        await loadMaterials(currentMaterialsDir);
        renderMaterials();
        const r = data.result || {};
        showToast(`索引重建完成：移除记录 ${r.removedRecords || 0}，移除info ${r.removedInfoFiles || 0}，孤儿info ${r.removedOrphanInfoFiles || 0}，索引总数 ${r.total || 0}`, 'success');
      } catch (e) {
        showToast('重建索引失败: ' + e.message, 'error');
      } finally {
        const nextBtn = document.getElementById('materials-rebuild-index-btn');
        if (nextBtn) {
          nextBtn.disabled = false;
          nextBtn.textContent = '🧱 重建索引';
        }
      }
    }

    async function deleteMaterial(relativePath) {
      if (!relativePath) return;
      const ok = confirm(`确认删除该素材？\n${relativePath}`);
      if (!ok) return;
      try {
        const resp = await fetch('/api/materials/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ relativePath })
        });
        const data = await resp.json();
        if (!resp.ok) {
          throw new Error(data.error || '删除失败');
        }
        await loadMaterials(currentMaterialsDir);
        renderMaterials();
        showToast('删除成功', 'success');
      } catch (e) {
        showToast('删除失败: ' + e.message, 'error');
      }
    }

    async function loadMoreMaterials() {
      currentPage++;
      displayedCount = Math.min(currentPage * pageSize, materialsData.length);
      hasMore = displayedCount < materialsData.length;
      renderMaterials();
    }

    function initImageObserver() {
      // 创建 Intersection Observer
      if (!imageObserver) {
        imageObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const img = entry.target;
              const dataSrc = img.dataset.src;
              if (dataSrc && !img.src) {
                img.src = dataSrc;
                // 图片加载完成后添加渐显效果
                img.onload = () => {
                  img.classList.add('loaded');
                };
              }
              imageObserver.unobserve(img);
            }
          });
        }, { rootMargin: '50px' });
      }

      // 观察所有懒加载图片
      document.querySelectorAll('.lazy-image').forEach(img => {
        const dataSrc = img.dataset.src;
        if (dataSrc && !img.src) {
          imageObserver.observe(img);
        } else if (dataSrc && img.src !== dataSrc) {
          // 如果已经有 src 但不是 data-src，更新
          img.src = dataSrc;
        } else if (!dataSrc && img.src) {
          // 已经有 src 的图片，直接标记为 loaded
          img.classList.add('loaded');
        }
      });
    }

    async function processMaterials() {
      const btn = document.getElementById('materials-process-btn');
      try {
        if (btn) {
          btn.disabled = true;
          btn.textContent = '整理中...';
        }
        const resp = await fetch('/api/materials/process', { method: 'POST' });
        const data = await resp.json();
        if (!resp.ok) {
          throw new Error(data.error || '素材整理失败');
        }
        await loadMaterials(currentMaterialsDir);
        renderMaterials();
        const r = data.result || {};
        const remaining = r.skipped || 0;
        const prefix = remaining > 0 ? `本次整理完成，仍有 ${remaining} 个待整理：` : '素材整理完成：';
        showToast(`${prefix}转换 ${r.processed || 0}，忽略非图片 ${r.ignored || 0}，失败 ${r.failed || 0}`, remaining > 0 || (r.failed || 0) > 0 ? 'error' : 'success');
      } catch (e) {
        showToast('素材整理失败: ' + e.message, 'error');
      } finally {
        const nextBtn = document.getElementById('materials-process-btn');
        if (nextBtn) {
          nextBtn.disabled = false;
          nextBtn.textContent = '🧹 整理素材';
        }
      }
    }

    function toggleGlobalPromptForm() {
      const form = document.getElementById('global-prompt-form');

      form.classList.toggle('hidden');

      if (isHidden && globalPromptData) {

          ageGroup: document.getElementById('gp-ageGroup').value.trim(),

    async function updateMaxUseCount(topicId) {
      const input = document.getElementById('max-use-input-' + topicId);
      if (!input) return;
      const value = parseInt(input.value, 10);

      if (isNaN(value) || value < 1 || value > 100) {
        showToast('复用次数必须是 1-100 之间的整数', 'error');
        return;
      }

      try {
        const resp = await fetch(`/api/topics/${topicId}/max-use-count`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ maxUseCount: value }),

          showToast('复用次数已更新', 'success');
          await loadTopics();
          renderTopics();
        } else {
          const err = await resp.json();
          showToast('更新失败: ' + (err.error || '未知错误'), 'error');

    // ========== 素材文件选择器 ==========

    /**

                选择整个目录

            </div>
          </div>
          <!-- 内容区 -->
          <div id="picker-body" class="flex-1 overflow-y-auto p-4">
            <p class="text-gray-400 text-sm text-center py-8">加载中...</p>
          </div>
          <!-- 底栏 -->
          <div class="px-5 py-3 border-t bg-gray-50 flex items-center justify-between flex-shrink-0">

    /**
     * 加载指定目录内容
     */
    async function pickerLoadDir(dir) {
      pickerCurrentDir = dir;
      const body = document.getElementById('picker-body');
      const backBtn = document.getElementById('picker-back-btn');
      const dirLabel = document.getElementById('picker-dir-label');
      const breadcrumb = document.getElementById('picker-breadcrumb');
      const selectDirCheckbox = document.getElementById('picker-select-dir');

      if (body) body.innerHTML = '<p class="text-gray-400 text-sm text-center py-8">加载中...</p>';

      // 更新导航状态
      if (backBtn) backBtn.classList.toggle('hidden', !dir);
      if (dirLabel) dirLabel.textContent = dir ? dir : '根目录';
      if (breadcrumb) breadcrumb.textContent = dir ? `/ ${dir}` : '';

      // 目录整选复选框：反映当前目录是否已被整选
      if (selectDirCheckbox) {
        selectDirCheckbox.checked = dir ? pickerChecked.has(dir) : false;
        selectDirCheckbox.disabled = !dir; // 根目录不支持整选
      }

      try {
        const url = dir ? `/api/materials/browser?dir=${encodeURIComponent(dir)}` : '/api/materials/browser';
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('请求失败 ' + resp.status);
        const data = await resp.json();
        renderPickerBody(data.entries || []);
      } catch (e) {
        if (body) body.innerHTML =
          `<p class="text-red-500 text-sm text-center py-6">加载失败：${escapeHtml(e.message)}</p>`;
      }

      updatePickerCount();
    }

    /**
     * 返回上级目录
     */
    function pickerGoUp() {
      const parts = pickerCurrentDir.split('/').filter(Boolean);
      parts.pop();
      pickerLoadDir(parts.join('/'));
    }

    /**
     * 渲染浏览器内容（文件+目录网格）
     */
    function renderPickerBody(entries) {
      const body = document.getElementById('picker-body');
      if (!body) return;

      if (entries.length === 0) {
        body.innerHTML = `<p class="text-gray-400 text-sm text-center py-8">
          ${pickerCurrentDir ? '此目录下暂无图片文件' : '素材库为空，请将图片放入宿主机映射目录中'}
        </p>`;
        return;
      }

      const dirs = entries.filter(e => e.type === 'dir');
      const files = entries.filter(e => e.type === 'file');

      let html = '';

      // 目录列表
      if (dirs.length > 0) {
        html += '<div class="mb-4">';
        html += '<p class="text-xs text-gray-400 mb-2 font-medium">📁 目录</p>';
        html += '<div class="grid grid-cols-3 gap-2">';
        for (const dir of dirs) {
          const isChecked = pickerChecked.has(dir.path);
          html += `<div class="relative border rounded-lg p-3 hover:border-blue-300 hover:bg-blue-50 cursor-pointer transition-colors ${isChecked ? 'border-blue-400 bg-blue-50' : 'border-gray-200 bg-white'}">
            <div class="flex items-start gap-2">
              <input type="checkbox" value="${escapeHtml(dir.path)}" data-type="dir" ${isChecked ? 'checked' : ''}
                onchange="togglePickerEntry(this.value, 'dir', this.checked)"
                onclick="event.stopPropagation()"
                class="w-4 h-4 mt-0.5 flex-shrink-0 text-blue-600" />
              <div class="min-w-0 flex-1" onclick="pickerLoadDir('${escapeHtml(dir.path)}')" title="进入 ${escapeHtml(dir.name)}">
                <span class="text-2xl block mb-1">📁</span>
                <p class="text-xs text-gray-700 truncate font-medium">${escapeHtml(dir.name)}</p>
                <p class="text-xs text-blue-500 hover:underline">点击进入</p>
              </div>
            </div>
          </div>`;
        }
        html += '</div></div>';
      }

      // 图片文件网格
      if (files.length > 0) {
        html += '<div>';
        html += `<p class="text-xs text-gray-400 mb-2 font-medium">🖼 图片文件（${files.length} 张）</p>`;
        html += '<div class="grid grid-cols-4 gap-2">';
        for (const file of files) {
          const isChecked = pickerChecked.has(file.path);
          const sizeKb = ((file.size || 0) / 1024).toFixed(0);
          html += `<label class="relative border rounded-lg overflow-hidden cursor-pointer hover:border-blue-400 transition-colors ${isChecked ? 'border-blue-500 ring-2 ring-blue-200' : 'border-gray-200'}">
            <input type="checkbox" value="${escapeHtml(file.path)}" data-type="file" ${isChecked ? 'checked' : ''}
              onchange="togglePickerEntry(this.value, 'file', this.checked)"
              class="sr-only" />
            <div class="relative">
              <img src="/api/materials/file/${file.path}" alt="${escapeHtml(file.name)}"
                class="w-full h-20 object-cover bg-gray-100"
                loading="lazy"
                onerror="this.parentNode.innerHTML='<div class=\\'w-full h-20 bg-gray-100 flex items-center justify-center text-2xl\\'>🖼</div>'" />
              ${isChecked ? '<div class="absolute inset-0 bg-blue-500 bg-opacity-20 flex items-center justify-center"><span class="w-6 h-6 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs">✓</span></div>' : ''}
            </div>
            <div class="p-1.5">
              <p class="text-xs text-gray-700 truncate" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</p>
              <p class="text-xs text-gray-400">${sizeKb} KB</p>
            </div>
          </label>`;
        }
        html += '</div></div>';
      }

      body.innerHTML = html;
    }

    /**
     * 勾选/取消文件或目录
     */
    function togglePickerEntry(entryPath, type, checked) {
      if (checked) {
        pickerChecked.add(entryPath);
      } else {
        pickerChecked.delete(entryPath);
      }
      // 同步刷新当前格子的选中样式（避免整页重绘）
      const input = document.querySelector(`input[value="${CSS.escape(entryPath)}"]`);
      if (input) {
        const card = input.closest('label, div.relative');
        if (card) {
          if (type === 'file') {
            card.classList.toggle('border-blue-500', checked);
            card.classList.toggle('ring-2', checked);
            card.classList.toggle('ring-blue-200', checked);
            card.classList.toggle('border-gray-200', !checked);
            // 更新打勾浮层
            const imgWrap = card.querySelector('.relative');
            if (imgWrap) {
              const mark = imgWrap.querySelector('.bg-blue-500.bg-opacity-20');
              if (checked && !mark) {
                imgWrap.insertAdjacentHTML('beforeend', '<div class="absolute inset-0 bg-blue-500 bg-opacity-20 flex items-center justify-center"><span class="w-6 h-6 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs">✓</span></div>');
              } else if (!checked && mark) {
                mark.remove();
              }
            }
          } else {
            card.classList.toggle('border-blue-400', checked);
            card.classList.toggle('bg-blue-50', checked);
            card.classList.toggle('border-gray-200', !checked);
          }
        }
      }
      updatePickerCount();
    }

    /**
     * 整选/取消整选当前目录
     */
    function toggleSelectDir(checked) {
      if (!pickerCurrentDir) return;
      if (checked) {
        pickerChecked.add(pickerCurrentDir);
      } else {
        pickerChecked.delete(pickerCurrentDir);
      }
      updatePickerCount();
    }

    /**
     * 更新底栏计数
     */
    function updatePickerCount() {
      const el = document.getElementById('picker-selected-count');
      if (el) el.textContent = `已选 ${pickerChecked.size} 项`;
    }

    /**
     * 确认选择
     */
    function confirmMaterialPicker() {
      selectedMaterialPaths = Array.from(pickerChecked);
      closeMaterialPicker();
      updateSelectedMaterialsDisplay();
    }

    /**
     * 关闭弹窗
     */
    function closeMaterialPicker() {
      const overlay = document.getElementById('material-picker-overlay');
      if (overlay) overlay.remove();
    }

    /**
     * 更新已选素材展示区（缩略图网格，包括展开文件夹内的图片）
     */
    async function updateSelectedMaterialsDisplay() {
      const display = document.getElementById('selected-materials-display');
      if (!display) return;

      if (selectedMaterialPaths.length === 0) {
        display.innerHTML = '<span class="text-xs text-gray-400">未选择素材</span>';
        return;
      }

      // 先渲染加载中状态
      display.innerHTML = '<span class="text-xs text-gray-400">加载缩略图...</span>';

      // 收集所有需要展示的图片（文件直接展示，目录展开直属图片）
      const previewItems = []; // { path, name, isFromDir, dirName }

      for (const p of selectedMaterialPaths) {
        const name = p.split('/').pop() || p;
        const hasExt = /\.\w+$/.test(name);

        if (hasExt) {
          // 单文件
          previewItems.push({ path: p, name, isFromDir: false, dirName: '' });
        } else {
          // 目录：请求其直属图片
          try {
            const resp = await fetch(`/api/materials/browser?dir=${encodeURIComponent(p)}`);
            if (resp.ok) {
              const data = await resp.json();
              const files = (data.entries || []).filter(e => e.type === 'file');
              if (files.length === 0) {
                previewItems.push({ path: null, name, isFromDir: true, dirName: name, placeholder: true });
              } else {
                for (const f of files) {
                  previewItems.push({ path: f.path, name: f.name, isFromDir: true, dirName: name });
                }
              }
            }
          } catch {
            previewItems.push({ path: null, name, isFromDir: true, dirName: name, placeholder: true });
          }
        }
      }

      if (previewItems.length === 0) {
        display.innerHTML = '<span class="text-xs text-gray-400">选中的目录下暂无图片</span>';
        return;
      }

      // 分组渲染：先展示单文件，再按目录分组
      const singles = previewItems.filter(i => !i.isFromDir);
      const dirGroups = {};
      for (const item of previewItems.filter(i => i.isFromDir)) {
        if (!dirGroups[item.dirName]) dirGroups[item.dirName] = [];
        dirGroups[item.dirName].push(item);
      }

      let html = '<div class="w-full">';

      // 单文件
      if (singles.length > 0) {
        html += '<div class="grid grid-cols-5 gap-2 mb-2">';
        for (const item of singles) {
          html += renderPreviewThumb(item);
        }
        html += '</div>';
      }

      // 目录分组
      for (const [dirName, items] of Object.entries(dirGroups)) {
        const dirPath = selectedMaterialPaths.find(p => (p.split('/').pop() || p) === dirName && !/\.\w+$/.test(p.split('/').pop() || p));
        html += `<div class="mb-2">
          <div class="flex items-center gap-1 mb-1">
            <span class="text-xs text-gray-500 font-medium">📁 ${escapeHtml(dirName)}</span>
            <span class="text-xs text-gray-400">(${items.length} 张)</span>
            <button type="button" onclick="removeMaterialPath('${escapeHtml(dirPath || dirName)}')" class="text-xs text-red-400 hover:text-red-600 ml-1">移除</button>
          </div>`;
        html += '<div class="grid grid-cols-5 gap-2">';
        for (const item of items) {
          html += renderPreviewThumb(item);
        }
        html += '</div></div>';
      }

      // 单文件移除按钮在每张图上
      html += '</div>';
      display.innerHTML = html;
    }

    /**
     * 渲染单张缩略图
     */
    function renderPreviewThumb(item) {
      if (item.placeholder) {
        return `<div class="w-full h-14 rounded border border-dashed border-gray-300 flex items-center justify-center text-xs text-gray-400">空目录</div>`;
      }

      const removeBtn = !item.isFromDir
        ? `<button type="button" onclick="event.stopPropagation();removeMaterialPath('${escapeHtml(item.path)}')"
             class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white rounded-full text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity leading-none">&times;</button>`
        : '';

      return `<div class="relative group">
        <img src="/api/materials/file/${item.path}" alt="${escapeHtml(item.name)}"
          class="w-full h-14 object-cover rounded border border-gray-200 bg-gray-100"
          loading="lazy"
          onerror="this.src='';this.className='w-full h-14 rounded border border-gray-200 bg-gray-100 flex items-center justify-center';this.outerHTML='<div class=\\'w-full h-14 rounded border border-gray-200 bg-gray-100 flex items-center justify-center text-lg\\'>🖼</div>'" />
        ${removeBtn}
        <p class="text-xs text-gray-500 truncate mt-0.5 text-center" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</p>
      </div>`;
    }

    /**
     * 从已选列表移除单项
     */
    function removeMaterialPath(filePath) {
      selectedMaterialPaths = selectedMaterialPaths.filter(p => p !== filePath);
      updateSelectedMaterialsDisplay();
    }

    // ========== 登录功能 ==========

    /**
     * 格式化时间戳为 YYYY-MM-DD HH:mm:ss
     */
    function formatTokenExpiresAt(timestamp) {
      if (!timestamp) return '--';
      const d = new Date(timestamp);
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    /**
     * 确定 Token 状态颜色编码
     * green: valid=true, remainingHours > 24
     * yellow: valid=true, 6 <= remainingHours < 24
     * red: valid=true, remainingHours < 6 OR valid=false
     */
    function getTokenColorConfig(tokenStatus) {
      if (!tokenStatus || !tokenStatus.valid) {
        return { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-800', subtext: 'text-red-600', indicator: 'bg-red-500', icon: '❌' };
      }
      const hours = tokenStatus.remainingHours || 0;
      if (hours > 24) {
        return { bg: 'bg-green-50', border: 'border-green-200', text: 'text-green-800', subtext: 'text-green-600', indicator: 'bg-green-500', icon: '✅' };
      }
      if (hours >= 6) {
        return { bg: 'bg-yellow-50', border: 'border-yellow-200', text: 'text-yellow-800', subtext: 'text-yellow-600', indicator: 'bg-yellow-500', icon: '⚠️' };
      }
      return { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-800', subtext: 'text-red-600', indicator: 'bg-red-500', icon: '🔴' };
    }

    /**
     * 构建 Token 状态区 HTML
     */
    function buildTokenStatusSection(tokenStatus, error) {
      // Error state with retry button
      if (error) {
        return `<div id="token-status-section" class="mb-6 p-4 bg-gray-50 border border-gray-300 rounded-lg">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="text-lg">⚠️</span>
              <p class="font-medium text-gray-700">Token 状态获取失败</p>
            </div>
            <button onclick="refreshTokenStatus()" class="px-3 py-1.5 bg-gray-600 text-white text-sm rounded-md hover:bg-gray-700">🔄 重试</button>
          </div>
          <p class="text-sm text-gray-500 mt-1">${escapeHtml(error)}</p>
        </div>`;
      }

      // Loading state
      if (!tokenStatus) {
        return `<div id="token-status-section" class="mb-6 p-4 bg-gray-50 border border-gray-200 rounded-lg">
          <div class="flex items-center gap-2">
            <span class="text-lg">⏳</span>
            <p class="font-medium text-gray-500">加载 Token 状态...</p>
          </div>
        </div>`;
      }

      const c = getTokenColorConfig(tokenStatus);

      // Valid token state
      if (tokenStatus.valid) {
        const expiresAtStr = formatTokenExpiresAt(tokenStatus.expiresAt);
        const remainingHours = tokenStatus.remainingHours || 0;
        return `<div id="token-status-section" class="mb-6 p-4 ${c.bg} border ${c.border} rounded-lg">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 rounded-full ${c.indicator} inline-block"></span>
              <span class="text-lg">${c.icon}</span>
              <p class="font-medium ${c.text}">Token 有效</p>
            </div>
            <div class="flex gap-2">
              <button onclick="refreshTokenStatus()" class="px-3 py-1.5 bg-white border border-gray-300 text-gray-700 text-sm rounded-md hover:bg-gray-100">🔄 刷新</button>
              <button onclick="verifyTokenOnline()" id="verify-online-btn" class="px-3 py-1.5 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700">在线验证</button>
            </div>
          </div>
          <div class="mt-2 grid grid-cols-1 sm:grid-cols-3 gap-2 text-sm">
            <div>
              <span class="text-gray-500">状态：</span>
              <span class="${c.text} font-medium">有效</span>
            </div>
            <div>
              <span class="text-gray-500">剩余：</span>
              <span class="${c.text} font-medium">${remainingHours} 小时</span>
            </div>
            <div>
              <span class="text-gray-500">过期时间：</span>
              <span class="${c.subtext}">${expiresAtStr}</span>
            </div>
          </div>
          <div id="verify-result" class="mt-2 hidden"></div>
        </div>`;
      }

      // Invalid/expired token state
      return `<div id="token-status-section" class="mb-6 p-4 ${c.bg} border ${c.border} rounded-lg">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full ${c.indicator} inline-block"></span>
            <span class="text-lg">${c.icon}</span>
            <p class="font-medium ${c.text}">Token 已过期或不存在，请重新登录</p>
          </div>
          <div class="flex gap-2">
            <button onclick="refreshTokenStatus()" class="px-3 py-1.5 bg-white border border-gray-300 text-gray-700 text-sm rounded-md hover:bg-gray-100">🔄 刷新</button>
            <button onclick="verifyTokenOnline()" id="verify-online-btn" class="px-3 py-1.5 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700">在线验证</button>
          </div>
        </div>
        <div id="verify-result" class="mt-2 hidden"></div>
      </div>`;
    }

    /**
     * 刷新 Token 状态区（不重渲染整个 Login Tab）
     */
    async function refreshTokenStatus() {
      const container = document.getElementById('token-status-section');
      if (container) {
        container.outerHTML = buildTokenStatusSection(null, null);
      }

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        // 获取 APP Token 状态（用于调用一汽奥迪 API）
        const resp = await fetch('/api/auth/token-status', {
          signal: controller.signal,
          credentials: 'include',  // 携带 Cookie
        });
        clearTimeout(timeoutId);
        const result = await resp.json();
        
        // 转换为 buildTokenStatusSection 期望的格式
        let tokenStatus = null;
        if (result.code === 'SUCCESS' && result.data) {
          const tokenData = result.data;
          tokenStatus = {
            valid: tokenData.valid,
            expiresAt: tokenData.expiresAt || null,
            remainingHours: tokenData.remainingHours || 0,
          };
        } else {
          tokenStatus = { valid: false };
        }
        
        const el = document.getElementById('token-status-section');
        if (el) el.outerHTML = buildTokenStatusSection(tokenStatus, null);
      } catch (e) {
        const errMsg = e.name === 'AbortError' ? '请求超时' : (e.message || '网络错误');
        const el = document.getElementById('token-status-section');
        if (el) el.outerHTML = buildTokenStatusSection(null, errMsg);
      }
    }

    // ========== AI 模型管理 ==========
    let aiFallbackFollowsProviderOrder;

    function arrayEquals(a, b) {
      if (a === b) return true;
      if (!Array.isArray(a) || !Array.isArray(b)) return false;
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) {
        if (a[i] !== b[i]) return false;
      }
      return true;
    }

    function dedupeArray(arr) {
      const seen = new Set();
      const out = [];
      for (const x of (arr || [])) {
        if (!seen.has(x)) {
          seen.add(x);
          out.push(x);
        }
      }
      return out;
    }

    function normalizeOrder(order, providerNames) {
      const names = providerNames || [];
      const nameSet = new Set(names);
      const out = [];
      const seen = new Set();
      for (const n of (order || [])) {
        if (nameSet.has(n) && !seen.has(n)) {
          seen.add(n);
          out.push(n);
        }
      }
      for (const n of names) {
        if (!seen.has(n)) {
          seen.add(n);
          out.push(n);
        }
      }
      return out;
    }

    function filterOrder(order, providerNames) {
      const names = providerNames || [];
      const nameSet = new Set(names);
      const out = [];
      const seen = new Set();
      for (const n of (order || [])) {
        if (nameSet.has(n) && !seen.has(n)) {
          seen.add(n);
          out.push(n);
        }
      }
      return out;
    }

    function ensureAiFallbackObject() {
      if (!configData.ai) configData.ai = {};
      if (!configData.ai.fallback) configData.ai.fallback = {};
    }

    function getAiProviderNames() {
      const providers = (configData.ai && configData.ai.providers) ? configData.ai.providers : [];
      return providers.map(p => p.name);
    }

    function computeAiFallbackFollowsProviderOrder(providerOrder, providerNames) {
      const fp = configData.ai && configData.ai.fallback ? configData.ai.fallback.providerOrder : undefined;
      if (!fp || fp.length === 0) return true;
      const nameSet = new Set(providerNames || []);
      for (const n of fp) {
        if (!nameSet.has(n)) return true;
      }
      return arrayEquals(dedupeArray(fp), dedupeArray(providerOrder));
    }

    function syncFallbackOrderIfFollowing() {
      if (!aiFallbackFollowsProviderOrder) return;
      ensureAiFallbackObject();
      const order = configData.ai.providerOrder || getAiProviderNames();
      configData.ai.fallback.providerOrder = [...order];
    }

    function ensureAiConfigConsistency() {
      if (!configData.ai) configData.ai = {};
      const providerNames = getAiProviderNames();
      configData.ai.providerOrder = normalizeOrder(configData.ai.providerOrder || [], providerNames);
      aiFallbackFollowsProviderOrder = computeAiFallbackFollowsProviderOrder(configData.ai.providerOrder, providerNames);
      if (aiFallbackFollowsProviderOrder) {
        syncFallbackOrderIfFollowing();
      } else if (configData.ai.fallback && Array.isArray(configData.ai.fallback.providerOrder)) {
        configData.ai.fallback.providerOrder = filterOrder(configData.ai.fallback.providerOrder, providerNames);
      }
    }

    function renderAITab() {
      const container = document.getElementById('form-container');
      const aiConfig = configData.ai || {};
      const providers = aiConfig.providers || [];
      const providerOrder = normalizeOrder(aiConfig.providerOrder || [], providers.map(p => p.name));
      if (!configData.ai) configData.ai = {};
      configData.ai.providerOrder = providerOrder;
      aiFallbackFollowsProviderOrder = computeAiFallbackFollowsProviderOrder(providerOrder, providers.map(p => p.name));
      syncFallbackOrderIfFollowing();

      let html = '';

      // 说明
      html += `<div class="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-4 text-sm text-blue-700">
        💡 拖拽模型卡片可调整调用优先级（从上到下依次尝试）。每个模型可独立配置超时时间。
      </div>`;

      // 模型列表
      html += `<div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold text-gray-800">🤖 模型列表 <span class="text-xs text-gray-400 font-normal">（拖拽排序）</span></h3>
        <button onclick="addAIProvider()" class="px-3 py-1.5 bg-blue-600 text-white rounded text-sm hover:bg-blue-700">+ 添加模型</button>
      </div>`;

      html += '<div id="ai-provider-form-area"></div>';

      if (providers.length === 0) {
        html += '<p class="text-gray-500 text-center py-8">暂无模型配置，请点击"添加模型"。</p>';
      } else {
        // 按 providerOrder 排序显示
        const sortedProviders = sortProvidersByOrder(providers, providerOrder);

        html += '<div class="space-y-2" id="ai-providers-list">';
        sortedProviders.forEach((provider, displayIdx) => {
          const originalIdx = providers.indexOf(provider);
          const timeout = provider.requestTimeout || aiConfig.requestTimeout || 30000;

          html += `<div class="border rounded-lg p-4 bg-white cursor-move ai-provider-card" draggable="true" data-provider-name="${escapeHtml(provider.name)}" data-idx="${originalIdx}">
            <div class="flex items-start justify-between mb-2">
              <div class="flex items-center gap-2">
                <span class="text-gray-400 cursor-grab text-lg" title="拖拽排序">⠿</span>
                <h4 class="font-medium text-gray-800">${escapeHtml(provider.name)}</h4>
                <span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded text-xs">#${displayIdx + 1}</span>
              </div>
              <div class="flex gap-1">
                <button onclick="editAIProvider(${originalIdx})" class="px-2 py-1 text-xs bg-white border rounded hover:bg-gray-50">编辑</button>
                <button onclick="deleteAIProvider(${originalIdx})" class="px-2 py-1 text-xs bg-white border border-red-200 text-red-600 rounded hover:bg-red-50">删除</button>
              </div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-x-4 gap-y-1 text-sm text-gray-600">
              <p>模型: <span class="text-gray-800">${escapeHtml(provider.model)}</span></p>
              <p>温度: <span class="text-gray-800">${provider.temperature ?? 0.7}</span></p>
              <p>Max Tokens: <span class="text-gray-800">${provider.maxTokens || '默认'}</span></p>
              <p>超时: <span class="text-gray-800">${(timeout / 1000).toFixed(0)}s</span></p>
            </div>
            <p class="text-xs text-gray-400 mt-1">URL: ${escapeHtml(provider.baseUrl)}</p>
            <div id="ai-edit-form-${originalIdx}" class="hidden mt-3 border-t pt-3"></div>
          </div>`;
        });
        html += '</div>';
      }

      // 保存按钮
      html += `<div class="mt-4 flex justify-end">
        <button onclick="saveAIConfig()" class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">保存 AI 配置</button>
      </div>`;

      container.innerHTML = html;

      // 绑定拖拽事件
      initDragSort();
    }

    function sortProvidersByOrder(providers, order) {
      if (!order || order.length === 0) return [...providers];
      const sorted = [];
      for (const name of order) {
        const found = providers.find(p => p.name === name);
        if (found) sorted.push(found);
      }
      // 未在 order 中的追加末尾
      for (const p of providers) {
        if (!sorted.includes(p)) sorted.push(p);
      }
      return sorted;
    }

    // ========== 拖拽排序 ==========
    let dragSrcEl = null;

    function initDragSort() {
      const list = document.getElementById('ai-providers-list');
      if (!list) return;

      const cards = list.querySelectorAll('.ai-provider-card');
      cards.forEach(card => {
        card.addEventListener('dragstart', handleDragStart);
        card.addEventListener('dragover', handleDragOver);
        card.addEventListener('dragenter', handleDragEnter);
        card.addEventListener('dragleave', handleDragLeave);
        card.addEventListener('drop', handleDrop);
        card.addEventListener('dragend', handleDragEnd);
      });
    }

    function handleDragStart(e) {
      dragSrcEl = this;
      this.style.opacity = '0.4';
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', this.dataset.providerName);
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      return false;
    }

    function handleDragEnter(e) {
      this.classList.add('border-blue-400', 'bg-blue-50');
    }

    function handleDragLeave(e) {
      this.classList.remove('border-blue-400', 'bg-blue-50');
    }

    function handleDrop(e) {
      e.stopPropagation();
      e.preventDefault();

      this.classList.remove('border-blue-400', 'bg-blue-50');

      if (dragSrcEl === this) return;

      const srcName = dragSrcEl.dataset.providerName;
      const targetName = this.dataset.providerName;

      // 更新 providerOrder
      const order = configData.ai.providerOrder || configData.ai.providers.map(p => p.name);
      const srcIdx = order.indexOf(srcName);
      const targetIdx = order.indexOf(targetName);

      if (srcIdx >= 0 && targetIdx >= 0) {
        order.splice(srcIdx, 1);
        const newTargetIdx = order.indexOf(targetName);
        order.splice(newTargetIdx, 0, srcName);
        configData.ai.providerOrder = order;
        syncFallbackOrderIfFollowing();
      }

      renderAITab();
      showToast('调用顺序已更新（记得保存）', 'success');

      return false;
    }

    function handleDragEnd(e) {
      this.style.opacity = '1';
      document.querySelectorAll('.ai-provider-card').forEach(card => {
        card.classList.remove('border-blue-400', 'bg-blue-50');
      });
    }

    function addAIProvider() {
      const area = document.getElementById('ai-provider-form-area');
      if (!area) return;
      area.innerHTML = `<div class="border rounded-lg p-4 mb-3 bg-white">
        <h4 class="font-medium mb-3">添加新模型</h4>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-600 mb-1">名称 *</label>
            <input id="new-ai-name" type="text" class="w-full px-2 py-1.5 border rounded text-sm" placeholder="如: claude" />
          </div>

    function submitNewAIProvider() {
      const name = document.getElementById('new-ai-name').value.trim();
      const model = document.getElementById('new-ai-model').value.trim();
      const baseUrl = document.getElementById('new-ai-baseUrl').value.trim();
      const apiKey = document.getElementById('new-ai-apiKey').value.trim();
      const temperature = parseFloat(document.getElementById('new-ai-temperature').value) || 0.7;
      const maxTokens = parseInt(document.getElementById('new-ai-maxTokens').value) || 4000;
      const requestTimeout = parseInt(document.getElementById('new-ai-requestTimeout').value) || 30000;

      if (!name || !model || !baseUrl || !apiKey) {
        showToast('名称、模型、Base URL、API Key 为必填', 'error');
        return;
      }

      if (!configData.ai) configData.ai = {};
      if (!configData.ai.providers) configData.ai.providers = [];

      configData.ai.providers.push({ name, model, baseUrl, apiKey, temperature, maxTokens, requestTimeout });

      // 自动加入调用顺序末尾
      if (!configData.ai.providerOrder) configData.ai.providerOrder = [];
      if (!configData.ai.providerOrder.includes(name)) {
        configData.ai.providerOrder.push(name);
      }
      syncFallbackOrderIfFollowing();

      cancelNewAIProvider();
      renderAITab();
      showToast(`模型 "${name}" 已添加（记得保存）`, 'success');
    }

    function deleteAIProvider(idx) {
      const providers = configData.ai.providers || [];
      if (idx < 0 || idx >= providers.length) return;
      const name = providers[idx].name;
      if (!confirm(`确定要删除模型 "${name}" 吗？`)) return;

      providers.splice(idx, 1);

      // 从调用顺序中移除
      if (configData.ai.providerOrder) {
        configData.ai.providerOrder = configData.ai.providerOrder.filter(n => n !== name);
      }
      if (configData.ai.fallback && Array.isArray(configData.ai.fallback.providerOrder)) {
        configData.ai.fallback.providerOrder = configData.ai.fallback.providerOrder.filter(n => n !== name);
      }
      syncFallbackOrderIfFollowing();

      renderAITab();
      showToast(`模型 "${name}" 已移除（记得保存）`, 'success');
    }

    function saveEditAIProvider(idx) {
      const providers = configData.ai.providers || [];
      const oldName = providers[idx].name;

      const name = document.getElementById('edit-ai-name-' + idx).value.trim();
      const model = document.getElementById('edit-ai-model-' + idx).value.trim();
      const baseUrl = document.getElementById('edit-ai-baseUrl-' + idx).value.trim();
      const apiKey = document.getElementById('edit-ai-apiKey-' + idx).value.trim();
      const temperature = parseFloat(document.getElementById('edit-ai-temperature-' + idx).value) || 0.7;
      const maxTokens = parseInt(document.getElementById('edit-ai-maxTokens-' + idx).value) || 4000;
      const requestTimeout = parseInt(document.getElementById('edit-ai-requestTimeout-' + idx).value) || 30000;

      if (!name || !model || !baseUrl || !apiKey) {
        showToast('名称、模型、Base URL、API Key 为必填', 'error');
        return;
      }

      providers[idx] = { name, model, baseUrl, apiKey, temperature, maxTokens, requestTimeout };

      // 更新调用顺序中的名称
      if (configData.ai.providerOrder && oldName !== name) {
        const orderIdx = configData.ai.providerOrder.indexOf(oldName);
        if (orderIdx >= 0) configData.ai.providerOrder[orderIdx] = name;
      }
      if (configData.ai.fallback && Array.isArray(configData.ai.fallback.providerOrder) && oldName !== name) {
        configData.ai.fallback.providerOrder = configData.ai.fallback.providerOrder.map(n => n === oldName ? name : n);
      }
      syncFallbackOrderIfFollowing();

      renderAITab();
      showToast(`模型 "${name}" 已更新（记得保存）`, 'success');
    }
