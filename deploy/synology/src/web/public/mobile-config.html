<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手机配置 - 一汽奥迪 APP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
    .toast { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Header -->
  <header class="bg-white shadow-sm border-b">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="/" class="text-sm text-gray-600 hover:text-gray-900">← 返回首页</a>
        <h1 class="text-xl font-bold text-gray-800">📱 手机配置</h1>
      </div>
    </div>
  </header>

  <!-- Toast notification -->
  <div id="toast" class="fixed top-4 right-4 z-50 hidden"></div>

  <!-- Main content -->
  <main class="max-w-6xl mx-auto px-6 py-6">
    <!-- Sub-tabs -->
    <div class="bg-white rounded-lg shadow-sm border overflow-hidden">
      <nav class="flex overflow-x-auto border-b">
        <button class="sub-tab-btn px-4 py-3 text-sm whitespace-nowrap hover:bg-gray-50 tab-active" data-subtab="sms">📨 手机短信</button>
        <button class="sub-tab-btn px-4 py-3 text-sm whitespace-nowrap hover:bg-gray-50" data-subtab="missed-calls">📞 未接电话</button>
        <button class="sub-tab-btn px-4 py-3 text-sm whitespace-nowrap hover:bg-gray-50" data-subtab="autojs">🤖 AutoJS 配置</button>
      </nav>

      <!-- Content area -->
      <div class="p-6" id="subtab-content">
        <!-- 手机短信内容 -->
        <div id="sms-content" class="subtab-panel">
          <h2 class="text-lg font-semibold mb-4">📨 手机短信记录</h2>
          
          <!-- 添加短信表单 -->
          <div class="mb-6 p-4 bg-gray-50 rounded-lg">
            <h3 class="text-md font-medium mb-3">添加短信记录</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">电话号码 *</label>
                <input type="text" id="sms-phone" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入电话号码">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">接收时间</label>
                <input type="datetime-local" id="sms-time" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>
            </div>
            <div class="mt-4">
              <label class="block text-sm font-medium text-gray-700 mb-1">短信内容 *</label>
              <textarea id="sms-content" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入短信内容"></textarea>
            </div>
            <button id="add-sms-btn" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors">
              添加记录
            </button>
          </div>

          <!-- 短信列表 -->
          <div>
            <h3 class="text-md font-medium mb-3">短信记录列表</h3>
            <div class="overflow-x-auto">
              <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                  <tr>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">电话号码</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">短信内容</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">接收时间</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">创建时间</th>
                  </tr>
                </thead>
                <tbody id="sms-list" class="bg-white divide-y divide-gray-200">
                  <tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">加载中...</td></tr>
                </tbody>
              </table>
            </div>
            <div class="mt-4 flex justify-between items-center">
              <button id="refresh-sms-btn" class="px-4 py-2 text-sm text-blue-600 hover:text-blue-800">🔄 刷新列表</button>
              <div class="text-sm text-gray-600">
                显示 <span id="sms-count">0</span> 条记录
              </div>
            </div>
          </div>
        </div>

        <!-- 未接电话内容 -->
        <div id="missed-calls-content" class="subtab-panel hidden">
          <h2 class="text-lg font-semibold mb-4">📞 未接电话记录</h2>
          
          <!-- 添加未接电话表单 -->
          <div class="mb-6 p-4 bg-gray-50 rounded-lg">
            <h3 class="text-md font-medium mb-3">添加未接电话记录</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">电话号码 *</label>
                <input type="text" id="call-phone" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入电话号码">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">接收时间</label>
                <input type="datetime-local" id="call-time" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>
            </div>
            <button id="add-call-btn" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors">
              添加记录
            </button>
          </div>

          <!-- 未接电话列表 -->
          <div>
            <h3 class="text-md font-medium mb-3">未接电话记录列表</h3>
            <div class="overflow-x-auto">
              <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                  <tr>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">电话号码</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">接收时间</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">创建时间</th>
                  </tr>
                </thead>
                <tbody id="call-list" class="bg-white divide-y divide-gray-200">
                  <tr><td colspan="4" class="px-4 py-8 text-center text-gray-500">加载中...</td></tr>
                </tbody>
              </table>
            </div>
            <div class="mt-4 flex justify-between items-center">
              <button id="refresh-call-btn" class="px-4 py-2 text-sm text-blue-600 hover:text-blue-800">🔄 刷新列表</button>
              <div class="text-sm text-gray-600">
                显示 <span id="call-count">0</span> 条记录
              </div>
            </div>
          </div>
        </div>

        <!-- AutoJS 配置内容 (iframe 嵌入) -->
        <div id="autojs-content" class="subtab-panel hidden">
          <iframe src="/autojs-config.html" class="w-full" style="height: calc(100vh - 250px); border: none;"></iframe>
        </div>
      </div>
    </div>
  </main>

  <script>
    // API Token 管理
    let API_TOKEN = localStorage.getItem('mobile_api_token') || '';

    // Toast 提示
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const bgColor = type === 'success' ? 'bg-green-600' : 'bg-red-600';
      toast.innerHTML = `<div class="${bgColor} text-white px-6 py-3 rounded-md shadow-lg toast">${message}</div>`;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // 获取 API Token
    function getApiToken() {
      const token = prompt('请输入 API Token:', API_TOKEN);
      if (token) {
        API_TOKEN = token;
        localStorage.setItem('mobile_api_token', token);
      }
      return token;
    }

    // 子页签切换
    document.querySelectorAll('.sub-tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        // 更新按钮样式
        document.querySelectorAll('.sub-tab-btn').forEach(b => {
          b.classList.remove('tab-active');
        });
        btn.classList.add('tab-active');

        // 切换内容
        const subtab = btn.dataset.subtab;
        document.querySelectorAll('.subtab-panel').forEach(panel => {
          panel.classList.add('hidden');
        });
        document.getElementById(`${subtab}-content`).classList.remove('hidden');

        // 加载对应数据
        if (subtab === 'sms') {
          loadSmsList();
        } else if (subtab === 'missed-calls') {
          loadMissedCallsList();
        }
      });
    });

    // ==================== 手机短信 API ====================

    // 加载短信列表
    async function loadSmsList() {
      const token = API_TOKEN || getApiToken();
      if (!token) return;

      try {
        const response = await fetch('/api/posts/mobile/sms?limit=50', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!response.ok) {
          if (response.status === 401) {
            localStorage.removeItem('mobile_api_token');
            API_TOKEN = '';
            showToast('Token 无效，请重新登录', 'error');
            return;
          }
          throw new Error('加载失败');
        }

        const result = await response.json();
        const tbody = document.getElementById('sms-list');
        
        if (result.data && result.data.length > 0) {
          tbody.innerHTML = result.data.map(sms => `
            <tr>
              <td class="px-4 py-3 text-sm text-gray-900">${sms.id}</td>
              <td class="px-4 py-3 text-sm text-gray-900">${sms.phoneNumber}</td>
              <td class="px-4 py-3 text-sm text-gray-900 max-w-md truncate">${sms.content}</td>
              <td class="px-4 py-3 text-sm text-gray-500">${new Date(sms.receivedAt).toLocaleString('zh-CN')}</td>
              <td class="px-4 py-3 text-sm text-gray-500">${new Date(sms.createdAt).toLocaleString('zh-CN')}</td>
            </tr>
          `).join('');
          document.getElementById('sms-count').textContent = result.data.length;
        } else {
          tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">暂无记录</td></tr>';
          document.getElementById('sms-count').textContent = '0';
        }
      } catch (error) {
        console.error('加载短信列表失败:', error);
        showToast('加载失败', 'error');
      }
    }

    // 添加短信记录
    document.getElementById('add-sms-btn')?.addEventListener('click', async () => {
      const token = API_TOKEN || getApiToken();
      if (!token) return;

      const phoneNumber = document.getElementById('sms-phone').value.trim();
      const content = document.getElementById('sms-content').value.trim();
      const receivedAt = document.getElementById('sms-time').value;

      if (!phoneNumber || !content) {
        showToast('请填写电话号码和短信内容', 'error');
        return;
      }

      try {
        const response = await fetch('/api/posts/mobile/sms', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            phone_number: phoneNumber,
            content: content,
            received_at: receivedAt || new Date().toISOString()
          })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || '添加失败');
        }

        const result = await response.json();
        if (result.success) {
          showToast('添加成功');
          document.getElementById('sms-phone').value = '';
          document.getElementById('sms-content').value = '';
          document.getElementById('sms-time').value = '';
          loadSmsList();
        }
      } catch (error) {
        console.error('添加短信失败:', error);
        showToast(error.message || '添加失败', 'error');
      }
    });

    // 刷新短信列表
    document.getElementById('refresh-sms-btn')?.addEventListener('click', loadSmsList);

    // ==================== 未接电话 API ====================

    // 加载未接电话列表
    async function loadMissedCallsList() {
      const token = API_TOKEN || getApiToken();
      if (!token) return;

      try {
        const response = await fetch('/api/posts/mobile/calls/missed?limit=50', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!response.ok) {
          if (response.status === 401) {
            localStorage.removeItem('mobile_api_token');
            API_TOKEN = '';
            showToast('Token 无效，请重新登录', 'error');
            return;
          }
          throw new Error('加载失败');
        }

        const result = await response.json();
        const tbody = document.getElementById('call-list');
        
        if (result.data && result.data.length > 0) {
          tbody.innerHTML = result.data.map(call => `
            <tr>
              <td class="px-4 py-3 text-sm text-gray-900">${call.id}</td>
              <td class="px-4 py-3 text-sm text-gray-900">${call.phoneNumber}</td>
              <td class="px-4 py-3 text-sm text-gray-500">${new Date(call.receivedAt).toLocaleString('zh-CN')}</td>
              <td class="px-4 py-3 text-sm text-gray-500">${new Date(call.createdAt).toLocaleString('zh-CN')}</td>
            </tr>
          `).join('');
          document.getElementById('call-count').textContent = result.data.length;
        } else {
          tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-8 text-center text-gray-500">暂无记录</td></tr>';
          document.getElementById('call-count').textContent = '0';
        }
      } catch (error) {
        console.error('加载未接电话列表失败:', error);
        showToast('加载失败', 'error');
      }
    }

    // 添加未接电话记录
    document.getElementById('add-call-btn')?.addEventListener('click', async () => {
      const token = API_TOKEN || getApiToken();
      if (!token) return;

      const phoneNumber = document.getElementById('call-phone').value.trim();
      const receivedAt = document.getElementById('call-time').value;

      if (!phoneNumber) {
        showToast('请填写电话号码', 'error');
        return;
      }

      try {
        const response = await fetch('/api/posts/mobile/calls/missed', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            phone_number: phoneNumber,
            received_at: receivedAt || new Date().toISOString()
          })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || '添加失败');
        }

        const result = await response.json();
        if (result.success) {
          showToast('添加成功');
          document.getElementById('call-phone').value = '';
          document.getElementById('call-time').value = '';
          loadMissedCallsList();
        }
      } catch (error) {
        console.error('添加未接电话失败:', error);
        showToast(error.message || '添加失败', 'error');
      }
    });

    // 刷新未接电话列表
    document.getElementById('refresh-call-btn')?.addEventListener('click', loadMissedCallsList);

    // 页面加载时默认加载短信列表
    loadSmsList();
  </script>
</body>
</html>
