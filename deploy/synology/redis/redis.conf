# Redis 配置文件
# 用于 Redis 持久化和性能优化

# ================================
# 网络配置
# ================================
bind 0.0.0.0
port 6379
protected-mode no

# ================================
# 持久化 - RDB 快照
# ================================
save 900 1        # 900 秒内至少 1 个键变化
save 300 10       # 300 秒内至少 10 个键变化
save 60 10000     # 60 秒内至少 10000 个键变化

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ================================
# 持久化 - AOF 日志
# ================================
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec    # 每秒同步一次（性能和安全性平衡）

no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ================================
# 内存管理
# ================================
maxmemory 512mb              # 最大内存限制 512MB
maxmemory-policy allkeys-lru # LRU 淘汰策略

# ================================
# 慢查询日志
# ================================
slowlog-log-slower-than 10000  # 10ms 以上的命令
slowlog-max-len 128            # 最多保留 128 条

# ================================
# 客户端连接
# ================================
timeout 0
tcp-keepalive 300
maxclients 10000

# ================================
# 日志
# ================================
loglevel notice
logfile ""

# ================================
# 高级配置
# ================================
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
activerehashing yes
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ================================
# 通知
# ================================
notify-keyspace-events ""

# ================================
# 其他
# ================================
daemonize no
pidfile /var/run/redis_6379.pid
