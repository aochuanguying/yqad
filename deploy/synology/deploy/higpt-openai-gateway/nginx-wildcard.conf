# HiGPT 网关 - ai.fssc.top
server {
    listen 80;
    server_name ai.fssc.top;

    # 重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ai.fssc.top;

    # 通配符证书
    ssl_certificate /usr/local/nginx/conf/ssl/fssc.top.crt;
    ssl_certificate_key /usr/local/nginx/conf/ssl/fssc.top.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HiGPT 网关
    location / {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时配置（匹配网关 timeoutMs: 120s）
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        
        # 请求体大小限制（与网关代码一致：10MB）
        client_max_body_size 10m;
        
        # 流式输出需要关闭缓冲，避免 SSE 延迟
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
    }
}

# v2ray WebSocket - ws.fssc.top
server {
    listen 80;
    server_name ws.fssc.top;

    # 重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ws.fssc.top;

    # 通配符证书
    ssl_certificate /usr/local/nginx/conf/ssl/fssc.top.crt;
    ssl_certificate_key /usr/local/nginx/conf/ssl/fssc.top.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # v2ray WebSocket
    location / {
        proxy_pass http://127.0.0.1:10000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
