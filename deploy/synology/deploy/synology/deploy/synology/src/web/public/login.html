<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 一汽奥迪 APP 配置管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .login-card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      max-width: 28rem;
      width: 100%;
      margin: 1rem;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card p-8">
      <!-- Logo 和标题 -->
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">⚙️ 一汽奥迪 APP 配置管理</h1>
        <p class="text-gray-500 text-sm">请登录以继续访问</p>
      </div>

      <!-- 错误提示 -->
      <div id="error-alert" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-lg">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <p id="error-message" class="text-sm text-red-700"></p>
        </div>
      </div>

      <!-- 登录表单 -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="mb-4">
          <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
            用户名
          </label>
          <input
            type="text"
            id="username"
            name="username"
            required
            autocomplete="username"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            placeholder="请输入用户名"
          />
        </div>

        <div class="mb-6">
          <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
            密码
          </label>
          <input
            type="password"
            id="password"
            name="password"
            required
            autocomplete="current-password"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            placeholder="请输入密码"
          />
        </div>

        <button
          type="submit"
          id="submit-btn"
          class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        >
          登录
        </button>
      </form>

      <!-- 底部提示 -->
      <div class="mt-6 text-center">
        <p class="text-xs text-gray-400">
          首次使用请联系管理员配置账号
        </p>
      </div>
    </div>
  </div>

  <script>
    // 页面加载时检查是否已登录
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const resp = await fetch('/api/auth/status', {
          credentials: 'include',  // 携带 Cookie
        });
        const data = await resp.json();
        
        if (data.data && data.data.authenticated) {
          // 已登录，跳转到首页
          const urlParams = new URLSearchParams(window.location.search);
          const redirect = urlParams.get('redirect');
          if (redirect) {
            window.location.href = decodeURIComponent(redirect);
          } else {
            window.location.href = '/index.html';
          }
        }
      } catch (error) {
        console.error('检查登录状态失败:', error);
      }
    });

    // 处理登录表单提交
    async function handleLogin(event) {
      event.preventDefault();
      
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('submit-btn');
      const errorAlert = document.getElementById('error-alert');
      const errorMessage = document.getElementById('error-message');
      
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      
      // 前端验证
      if (!username || !password) {
        showError('用户名和密码不能为空');
        return;
      }
      
      // 禁用提交按钮
      submitBtn.disabled = true;
      submitBtn.textContent = '登录中...';
      hideError();
      
      try {
        const resp = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          credentials: 'include',  // 携带 Cookie
          body: JSON.stringify({ username, password }),
        });
        
        const data = await resp.json();
        
        if (resp.ok && data.code === 'SUCCESS') {
          // 登录成功，等待一小段时间确保 Cookie 已写入再跳转
          const urlParams = new URLSearchParams(window.location.search);
          const redirect = urlParams.get('redirect');
          
          // 等待 100ms 确保 Session Cookie 已保存
          await new Promise(resolve => setTimeout(resolve, 100));
          
          if (redirect) {
            window.location.href = decodeURIComponent(redirect);
          } else {
            window.location.href = '/index.html';
          }
        } else {
          // 登录失败
          showError(data.message || '用户名或密码错误');
        }
      } catch (error) {
        console.error('登录请求失败:', error);
        showError('网络错误，请稍后重试');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '登录';
      }
    }
    
    // 显示错误提示
    function showError(message) {
      const errorAlert = document.getElementById('error-alert');
      const errorMessage = document.getElementById('error-message');
      
      errorMessage.textContent = message;
      errorAlert.classList.remove('hidden');
    }
    
    // 隐藏错误提示
    function hideError() {
      const errorAlert = document.getElementById('error-alert');
      errorAlert.classList.add('hidden');
    }
  </script>
</body>
</html>
