<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一汽奥迪 API 验证仪表盘</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1b1c21;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 24px;
}
h1 { font-size: 22px; font-weight: 600; color: #fff; }
.header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 24px; padding-bottom: 16px;
  border-bottom: 1px solid #333;
}
.header .logo { font-size: 28px; }
.header .subtitle { font-size: 13px; color: #888; margin-top: 2px; }

/* 配置区 */
.config-section {
  background: #25262b; border-radius: 10px; padding: 20px;
  margin-bottom: 20px;
}
.config-section h2 { font-size: 15px; color: #aaa; margin-bottom: 12px; font-weight: 500; }
.input-row { display: flex; gap: 10px; margin-bottom: 10px; }
.input-row input {
  flex: 1; background: #1b1c21; border: 1px solid #444; border-radius: 6px;
  padding: 10px 14px; color: #fff; font-size: 14px; font-family: monospace;
}
.input-row input:focus { outline: none; border-color: #c8102e; }
.input-row input::placeholder { color: #666; }
.btn {
  padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px;
  cursor: pointer; font-weight: 500; transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: #c8102e; color: #fff; }
.btn-secondary { background: #333; color: #ccc; }
.btn-small { padding: 6px 12px; font-size: 12px; }
.token-preview {
  font-size: 12px; color: #888; margin-top: 6px; font-family: monospace;
}
.token-info {
  background: #1b1c21; border-radius: 6px; padding: 12px; margin-top: 10px;
  font-size: 13px; display: none;
}
.token-info.show { display: block; }
.token-info .field { display: flex; justify-content: space-between; padding: 4px 0; }
.token-info .label { color: #888; }
.token-info .value { color: #fff; font-family: monospace; }
.token-info .expired { color: #f44336; }
.token-info .valid { color: #4caf50; }

/* 代理配置 */
.proxy-section {
  background: #25262b; border-radius: 10px; padding: 16px 20px;
  margin-bottom: 20px;
}
.proxy-section summary {
  cursor: pointer; font-size: 14px; color: #aaa;
  list-style: none; display: flex; align-items: center; gap: 8px;
}
.proxy-section summary::before { content: "⚙️"; }
.proxy-section .proxy-content { margin-top: 12px; }
.proxy-hint {
  font-size: 12px; color: #666; margin-top: 8px; line-height: 1.6;
}
.proxy-hint code {
  background: #1b1c21; padding: 2px 6px; border-radius: 3px; color: #aaa;
}

/* 验证卡片区 */
.cards-section { margin-bottom: 20px; }
.cards-section h2 { font-size: 15px; color: #aaa; margin-bottom: 12px; font-weight: 500; }
.card {
  background: #25262b; border-radius: 8px; padding: 16px 20px;
  margin-bottom: 10px; display: flex; align-items: center; gap: 14px;
  transition: border-color 0.3s;
  border: 1px solid transparent;
}
.card.pending { opacity: 0.5; }
.card.running { border-color: #555; }
.card.running .card-icon { animation: pulse 1s infinite; }
.card.pass { border-color: #4caf50; }
.card.fail { border-color: #f44336; }
.card.skip { opacity: 0.4; border-color: #555; }
.card-icon { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 14px; font-weight: 500; color: #fff; }
.card-detail { font-size: 12px; color: #888; margin-top: 4px; word-break: break-all; }
.card-ms { font-size: 12px; color: #666; flex-shrink: 0; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* 汇总区 */
.summary-section {
  background: #25262b; border-radius: 10px; padding: 20px;
  display: none;
}
.summary-section.show { display: block; }
.summary-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.summary-header .icon { font-size: 24px; }
.summary-header .text { font-size: 16px; font-weight: 600; }
.summary-stats { display: flex; gap: 20px; font-size: 14px; margin-bottom: 12px; }
.summary-stats .stat { display: flex; align-items: center; gap: 6px; }
.summary-conclusion { font-size: 13px; color: #aaa; line-height: 1.5; }
.summary-actions { margin-top: 14px; display: flex; gap: 10px; }
.all-pass .summary-header .text { color: #4caf50; }
.has-fail .summary-header .text { color: #f44336; }

/* 错误提示 */
.error-banner {
  background: #3d1f1f; border: 1px solid #f44336; border-radius: 8px;
  padding: 14px 18px; margin-bottom: 16px; display: none;
  font-size: 13px; color: #ffcdd2;
}
.error-banner.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">🔍</span>
  <div>
    <h1>一汽奥迪 API 验证仪表盘</h1>
    <div class="subtitle">系统化验证 Token、vrfCode、跨通道兼容性</div>
  </div>
</div>

<!-- 登录区块 -->
<div class="config-section" id="loginSection">
  <h2>🔐 登录获取 Token</h2>
  <div id="loginStep1">
    <div class="input-row">
      <input type="tel" id="phoneInput" placeholder="手机号（11位）" maxlength="11" />
      <button class="btn btn-primary" id="sendCodeBtn">发送验证码</button>
    </div>
    <div class="proxy-hint" style="margin-top:8px">完成腾讯滑块验证后自动发送短信验证码</div>
  </div>
  <div id="loginStep2" style="display:none">
    <div class="input-row">
      <input type="text" id="smsCodeInput" placeholder="6位短信验证码" maxlength="6" />
      <button class="btn btn-primary" id="loginBtn">登录</button>
    </div>
    <div class="token-preview" id="loginStatus"></div>
  </div>
  <div id="loginStep3" style="display:none">
    <div style="color:#4caf50;font-size:14px;padding:8px 0">✅ 登录成功！Token 已保存。</div>
  </div>
</div>

<!-- Token 配置区 -->
<div class="config-section" id="tokenSection">
  <h2>🔑 Token 配置</h2>
  <div class="input-row">
    <input type="password" id="tokenInput" placeholder="粘贴 accessToken (eyJ...)" />
    <button class="btn btn-secondary btn-small" id="toggleTokenBtn" title="显示/隐藏">👁</button>
    <button class="btn btn-primary" id="startBtn">开始验证</button>
  </div>
  <div class="token-preview" id="tokenPreview"></div>
  <div class="token-info" id="tokenInfo"></div>
</div>

<!-- CORS 代理配置（可选） -->
<details class="proxy-section">
  <summary>CORS 代理配置（通常不需要）</summary>
  <div class="proxy-content">
    <div class="input-row">
      <input type="text" id="proxyInput" placeholder="代理前缀 URL，如 http://localhost:9090/" />
      <button class="btn btn-secondary btn-small" id="saveProxyBtn">保存</button>
    </div>
    <div class="proxy-hint">
      一般情况下无需代理，API 服务端已支持跨域。仅当遇到网络错误时可尝试配置本地代理：<br>
      <code>npx local-cors-proxy --proxyUrl https://audi2c.faw-vw.com --port 9090</code><br>
      然后填入 <code>http://localhost:9090/</code>
    </div>
  </div>
</details>

<!-- 错误提示 -->
<div class="error-banner" id="errorBanner"></div>

<!-- 验证卡片区 -->
<div class="cards-section">
  <h2>📋 验证项目</h2>
  <div id="cardsContainer"></div>
</div>

<!-- 汇总区 -->
<div class="summary-section" id="summarySection"></div>

<!-- 评论工具区 -->
<div class="config-section" id="commentSection">
  <h2>💬 评论工具</h2>
  <div class="input-row">
    <button class="btn btn-secondary" id="loadFeedBtn">加载帖子列表</button>
    <select id="feedSelect" style="flex:1;background:#1b1c21;border:1px solid #444;border-radius:6px;padding:10px;color:#fff;font-size:13px">
      <option value="">-- 先点击加载帖子 --</option>
    </select>
  </div>
  <div class="input-row" style="margin-top:10px">
    <input type="text" id="commentInput" placeholder="评论内容" />
    <button class="btn btn-primary" id="postCommentBtn" disabled>发评论</button>
  </div>
  <div class="token-preview" id="commentStatus"></div>
</div>

<script>
// ========== 常量 ==========
const BASE_URL = "https://audi2c.faw-vw.com";
const DEFAULT_DID = "AUDI_APP_iPhone_71A0E430-DB97-448F-868A-A6352E31FC13_26.5_6.1.1";
const LS_TOKEN = "faw_verify_token";
const LS_PROXY = "faw_verify_proxy";

// ========== DOM 引用 ==========
const tokenInput = document.getElementById("tokenInput");
const tokenPreview = document.getElementById("tokenPreview");
const tokenInfo = document.getElementById("tokenInfo");
const toggleTokenBtn = document.getElementById("toggleTokenBtn");
const startBtn = document.getElementById("startBtn");
const proxyInput = document.getElementById("proxyInput");
const saveProxyBtn = document.getElementById("saveProxyBtn");
const cardsContainer = document.getElementById("cardsContainer");
const summarySection = document.getElementById("summarySection");
const errorBanner = document.getElementById("errorBanner");

// ========== 1.2 Token 输入与缓存 ==========
(function initToken() {
  const saved = localStorage.getItem(LS_TOKEN) || "";
  if (saved) {
    tokenInput.value = saved;
    updateTokenPreview(saved);
    parseAndShowToken(saved);
  }
})();

tokenInput.addEventListener("input", () => {
  const val = tokenInput.value.trim();
  localStorage.setItem(LS_TOKEN, val);
  updateTokenPreview(val);
  parseAndShowToken(val);
});

toggleTokenBtn.addEventListener("click", () => {
  tokenInput.type = tokenInput.type === "password" ? "text" : "password";
});

function updateTokenPreview(token) {
  if (token.length > 20) {
    tokenPreview.textContent = token.slice(0, 8) + "..." + token.slice(-8) + ` (${token.length} chars)`;
  } else {
    tokenPreview.textContent = "";
  }
}

// ========== CORS 代理 ==========
(function initProxy() {
  const saved = localStorage.getItem(LS_PROXY) || "";
  if (saved) proxyInput.value = saved;
})();

saveProxyBtn.addEventListener("click", () => {
  localStorage.setItem(LS_PROXY, proxyInput.value.trim());
  showError(""); // clear
});

function getProxyUrl() {
  return (proxyInput.value.trim() || localStorage.getItem(LS_PROXY) || "").replace(/\/$/, "");
}

// ========== 2.1 JWT 解析 ==========
function base64urlDecode(str) {
  let b64 = str.replace(/-/g, "+").replace(/_/g, "/");
  while (b64.length % 4) b64 += "=";
  return decodeURIComponent(
    atob(b64).split("").map(c => "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2)).join("")
  );
}

function parseJWT(token) {
  if (!token || !token.startsWith("eyJ")) return null;
  try {
    const parts = token.split(".");
    if (parts.length !== 3) return null;
    return JSON.parse(base64urlDecode(parts[1]));
  } catch (e) { return null; }
}

function parseAndShowToken(token) {
  const payload = parseJWT(token);
  if (!payload) {
    if (token && token.length > 10) {
      tokenInfo.innerHTML = '<div style="color:#f44336">⚠️ 无效的 JWT 格式（需以 eyJ 开头且含三段）</div>';
      tokenInfo.classList.add("show");
    } else {
      tokenInfo.classList.remove("show");
    }
    return;
  }
  const now = Math.floor(Date.now() / 1000);
  const exp = payload.exp || 0;
  const remainSec = exp - now;
  const remainH = (remainSec / 3600).toFixed(1);
  const isValid = remainSec > 0;

  tokenInfo.innerHTML = `
    <div class="field"><span class="label">过期时间</span><span class="value">${new Date(exp * 1000).toLocaleString()}</span></div>
    <div class="field"><span class="label">剩余时间</span><span class="value ${isValid ? 'valid' : 'expired'}">${isValid ? remainH + ' 小时' : '已过期 ' + (-remainH) + ' 小时'}</span></div>
    <div class="field"><span class="label">cch</span><span class="value">${payload.cch || '-'}</span></div>
    <div class="field"><span class="label">azp</span><span class="value">${payload.azp || '-'}</span></div>
    <div class="field"><span class="label">sub</span><span class="value">${payload.sub || '-'}</span></div>
    <div class="field"><span class="label">状态</span><span class="value ${isValid ? 'valid' : 'expired'}">${isValid ? '✅ 有效' : '❌ 已过期'}</span></div>
  `;
  tokenInfo.classList.add("show");
}

// ========== 2.2 vrfCode 生成 ==========
function generateVrfCode(deviceId) {
  const ts = String(Date.now());
  const fakeSigBytes = new Uint8Array(256);
  crypto.getRandomValues(fakeSigBytes);
  const fakeSig = bytesToBase64(fakeSigBytes);

  function encodeVarint(v) {
    const r = [];
    while (v > 0x7f) { r.push((v & 0x7f) | 0x80); v >>>= 7; }
    r.push(v); return r;
  }
  function encodeStr(fieldNum, str) {
    const buf = new TextEncoder().encode(str);
    return [(fieldNum << 3) | 2, ...encodeVarint(buf.length), ...buf];
  }
  const proto = new Uint8Array([
    ...encodeStr(1, deviceId),
    ...encodeStr(2, ts),
    ...encodeStr(3, fakeSig),
    ...encodeStr(4, "1")
  ]);
  return bytesToBase64(proto);
}

function bytesToBase64(bytes) {
  let binary = "";
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

function uuid() {
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// ========== 2.4 Fetch 封装 ==========
async function apiFetch(path, options = {}) {
  const proxy = getProxyUrl();
  const url = proxy ? `${proxy}/${path}` : `${BASE_URL}/${path}`;
  const start = Date.now();

  try {
    const resp = await fetch(url, {
      method: options.method || "GET",
      headers: options.headers || {},
      body: options.body ? JSON.stringify(options.body) : undefined,
      signal: AbortSignal.timeout(15000)
    });
    const ms = Date.now() - start;
    const text = await resp.text();
    try {
      return { ok: true, data: JSON.parse(text), ms, status: resp.status };
    } catch (e) {
      return { ok: false, error: `JSON解析失败: ${text.slice(0, 100)}`, ms, status: resp.status };
    }
  } catch (e) {
    const ms = Date.now() - start;
    const isCors = e.message && (e.message.includes("Failed to fetch") || e.message.includes("NetworkError"));
    if (isCors && !proxy) {
      return { ok: false, error: "CORS错误 — 请配置代理", ms, status: 0, cors: true };
    }
    return { ok: false, error: String(e.message || e), ms, status: 0 };
  }
}

function appHeaders(token) {
  return {
    "x-access-token": token,
    "x-audi-did": DEFAULT_DID,
    "x-channel": "iOS",
    "x-audi-entry": "app",
    "x-microservice-name": "api-gateway",
    "x-namespace-code": "production",
    "sv": "6.1.1",
    "user-agent": "AudiApp/506.1.1 (com.fawvw.audisuper; build:33; iOS 26.5.0) Alamofire/5.11.1",
    "accept": "application/json",
    "content-type": "application/json",
    "x-lang": "zh-CN"
  };
}

function mapiHeaders(token) {
  return {
    "content-type": "application/x-www-form-urlencoded",
    "x-channel": "MINI_PROGRAM",
    "x-microservice-name": "audi-app-gateway-c",
    "x-namespace-code": "faw-audi-dev",
    "x-timestamp": String(Date.now()),
    "x-access-token": token
  };
}

// ========== 3.1 验证卡片 ==========
const CHECKS = [
  { id: "token-local", name: "Token 本地解析", icon: "🔐" },
  { id: "token-remote", name: "Token 远程验证 (会员信息)", icon: "🌐" },
  { id: "vrfcode", name: "vrfCode 机制验证 (任务列表)", icon: "🛡️" },
  { id: "feed", name: "跨通道: 帖子列表 (cnapi/v2/feed)", icon: "📰" },
  { id: "comments", name: "跨通道: 评论列表 (comment/list)", icon: "💬" }
];

function renderCards() {
  cardsContainer.innerHTML = CHECKS.map(c => `
    <div class="card pending" id="card-${c.id}">
      <div class="card-icon">${c.icon}</div>
      <div class="card-body">
        <div class="card-title">${c.name}</div>
        <div class="card-detail" id="detail-${c.id}">等待验证...</div>
      </div>
      <div class="card-ms" id="ms-${c.id}"></div>
    </div>
  `).join("");
}
renderCards();

function setCardState(id, state, detail, ms) {
  const card = document.getElementById(`card-${id}`);
  const detailEl = document.getElementById(`detail-${id}`);
  const msEl = document.getElementById(`ms-${id}`);
  card.className = `card ${state}`;
  if (detail) detailEl.textContent = detail;
  if (ms !== undefined) msEl.textContent = ms + "ms";
}

// ========== 3.2 + 3.3 验证流程 ==========
const results = [];

startBtn.addEventListener("click", runVerification);

async function runVerification() {
  const token = tokenInput.value.trim();
  if (!token) { showError("请输入 Token"); return; }
  if (!token.startsWith("eyJ")) { showError("Token 格式无效（需以 eyJ 开头）"); return; }

  showError("");
  results.length = 0;
  summarySection.classList.remove("show");
  renderCards();
  startBtn.disabled = true;

  try {
    // 1. Token 本地解析
    setCardState("token-local", "running", "解析中...");
    const payload = parseJWT(token);
    if (!payload) {
      setCardState("token-local", "fail", "无法解析 JWT payload");
      results.push({ name: "Token本地解析", status: "fail", ms: 0, detail: "无法解析" });
      skipRemaining(1);
      return;
    }
    const now = Math.floor(Date.now() / 1000);
    const remainSec = (payload.exp || 0) - now;
    const remainH = (remainSec / 3600).toFixed(1);
    if (remainSec <= 0) {
      setCardState("token-local", "fail", `已过期 ${(-remainH)} 小时`, 0);
      results.push({ name: "Token本地解析", status: "fail", ms: 0, detail: `已过期 ${(-remainH)}h` });
      skipRemaining(1);
      return;
    }
    setCardState("token-local", "pass", `剩余 ${remainH}h | cch=${payload.cch || '-'} | azp=${payload.azp || '-'}`, 0);
    results.push({ name: "Token本地解析", status: "pass", ms: 0, detail: `剩余${remainH}h` });

    await sleep(300);

    // 2. Token 远程验证
    setCardState("token-remote", "running", "验证中...");
    const memberResp = await apiFetch("mapi/member/v1/member/info", { headers: mapiHeaders(token) });
    if (memberResp.ok && memberResp.data && memberResp.data.code === 0) {
      const d = memberResp.data.data || {};
      const detail = `会员等级: ${d.memberLevel || '未知'} | 积分: ${d.memberScore || 0}`;
      setCardState("token-remote", "pass", detail, memberResp.ms);
      results.push({ name: "Token远程验证", status: "pass", ms: memberResp.ms, detail });
    } else {
      const detail = memberResp.cors ? "CORS错误 — 请配置代理"
        : memberResp.data ? `code=${memberResp.data.code} ${memberResp.data.message || ''}`
        : memberResp.error;
      setCardState("token-remote", "fail", detail, memberResp.ms);
      results.push({ name: "Token远程验证", status: "fail", ms: memberResp.ms, detail });
      if (memberResp.cors) showError("检测到 CORS 错误。请展开上方的代理配置，填入本地代理地址后重试。");
      skipRemaining(2);
      return;
    }

    await sleep(300);

    // 3. vrfCode 验证
    setCardState("vrfcode", "running", "生成 vrfCode 并验证...");
    const vrfCode = generateVrfCode(DEFAULT_DID);
    const nonce = uuid();
    const ts = Date.now();
    const taskResp = await apiFetch(
      `cnapi/v2/mine/task_list?autoSignIn=false&nonce=${nonce}&timestamp=${ts}&vrfCode=${encodeURIComponent(vrfCode)}`,
      { headers: appHeaders(token) }
    );
    if (taskResp.ok && taskResp.data && taskResp.data.code === 0) {
      const d = taskResp.data.data || {};
      const signStatus = d.signInInfo ? d.signInInfo.signInStatus : "?";
      const detail = `签到状态=${signStatus} | vrfCode自构造有效`;
      setCardState("vrfcode", "pass", detail, taskResp.ms);
      results.push({ name: "vrfCode机制验证", status: "pass", ms: taskResp.ms, detail });
    } else {
      const detail = taskResp.data ? `code=${taskResp.data.code} ${taskResp.data.message || ''}` : taskResp.error;
      setCardState("vrfcode", "fail", detail, taskResp.ms);
      results.push({ name: "vrfCode机制验证", status: "fail", ms: taskResp.ms, detail });
    }

    await sleep(300);

    // 4. Feed 帖子列表
    setCardState("feed", "running", "验证中...");
    const feedResp = await apiFetch(
      `cnapi/v2/feed?current=1&size=5&nonce=${uuid()}&timestamp=${Date.now()}`,
      { headers: appHeaders(token) }
    );
    if (feedResp.ok && feedResp.data && feedResp.data.code === 0) {
      const records = feedResp.data.data && feedResp.data.data.records ? feedResp.data.data.records : [];
      const detail = `返回 ${records.length} 条帖子 | 跨通道有效`;
      setCardState("feed", "pass", detail, feedResp.ms);
      results.push({ name: "跨通道(帖子列表)", status: "pass", ms: feedResp.ms, detail });
    } else {
      const detail = feedResp.data ? `code=${feedResp.data.code} ${feedResp.data.message || ''}` : feedResp.error;
      setCardState("feed", "fail", detail, feedResp.ms);
      results.push({ name: "跨通道(帖子列表)", status: "fail", ms: feedResp.ms, detail });
    }

    await sleep(300);

    // 5. 评论列表
    setCardState("comments", "running", "验证中...");
    const commResp = await apiFetch(
      `cnapi/v1/comment_center/comment/list?nonce=${uuid()}&timestamp=${Date.now()}`,
      { method: "POST", headers: appHeaders(token), body: { subjectId: "", current: 1, size: 5 } }
    );
    if (commResp.ok && commResp.data && commResp.data.code === 0) {
      setCardState("comments", "pass", "接口可达，跨通道兼容", commResp.ms);
      results.push({ name: "跨通道(评论列表)", status: "pass", ms: commResp.ms, detail: "接口可达" });
    } else if (commResp.ok && commResp.data && commResp.status !== 401 && commResp.data.code !== 401) {
      // 非认证错误 = Token 通过了
      const detail = `接口可达(参数错误不影响) code=${commResp.data.code}`;
      setCardState("comments", "pass", detail, commResp.ms);
      results.push({ name: "跨通道(评论列表)", status: "pass", ms: commResp.ms, detail });
    } else {
      const detail = commResp.data ? `code=${commResp.data.code} ${commResp.data.message || ''}` : commResp.error;
      setCardState("comments", "fail", detail, commResp.ms);
      results.push({ name: "跨通道(评论列表)", status: "fail", ms: commResp.ms, detail });
    }

  } finally {
    startBtn.disabled = false;
    showSummary();
  }
}

function skipRemaining(fromIdx) {
  const ids = CHECKS.map(c => c.id);
  for (let i = fromIdx; i < ids.length; i++) {
    setCardState(ids[i], "skip", "已跳过（Token 无效）");
    results.push({ name: CHECKS[i].name, status: "skip", ms: 0, detail: "已跳过" });
  }
  startBtn.disabled = false;
  showSummary();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ========== 4.1 汇总报告 ==========
function showSummary() {
  const pass = results.filter(r => r.status === "pass").length;
  const fail = results.filter(r => r.status === "fail").length;
  const skip = results.filter(r => r.status === "skip").length;
  const allPass = fail === 0 && skip === 0;
  const conclusion = allPass
    ? "所有验证项通过，API 行为未变更，可继续构建自动化脚本。"
    : `${fail} 项失败，${skip} 项跳过。部分 API 行为可能已变更，需要进一步调查。`;

  summarySection.className = `summary-section show ${allPass ? 'all-pass' : 'has-fail'}`;
  summarySection.innerHTML = `
    <div class="summary-header">
      <span class="icon">${allPass ? '✅' : '⚠️'}</span>
      <span class="text">${allPass ? '全部通过' : '部分失败'}</span>
    </div>
    <div class="summary-stats">
      <div class="stat"><span>✅</span> ${pass} 通过</div>
      <div class="stat"><span>❌</span> ${fail} 失败</div>
      <div class="stat"><span>⏭️</span> ${skip} 跳过</div>
    </div>
    <div class="summary-conclusion">${conclusion}</div>
    <div class="summary-actions">
      <button class="btn btn-secondary btn-small" onclick="copyReport()">📋 复制报告 JSON</button>
    </div>
  `;
}

// ========== 4.2 复制报告 ==========
function copyReport() {
  const report = {
    timestamp: new Date().toISOString(),
    total: results.length,
    pass: results.filter(r => r.status === "pass").length,
    fail: results.filter(r => r.status === "fail").length,
    skip: results.filter(r => r.status === "skip").length,
    results: results
  };
  navigator.clipboard.writeText(JSON.stringify(report, null, 2)).then(() => {
    const btn = summarySection.querySelector("button");
    btn.textContent = "✅ 已复制";
    setTimeout(() => btn.textContent = "📋 复制报告 JSON", 2000);
  });
}

// ========== 错误提示 ==========
function showError(msg) {
  if (msg) {
    errorBanner.textContent = msg;
    errorBanner.classList.add("show");
  } else {
    errorBanner.classList.remove("show");
  }
}

// ========== 登录流程 ==========
const CAPTCHA_APP_ID = "198705236";
const phoneInput = document.getElementById("phoneInput");
const sendCodeBtn = document.getElementById("sendCodeBtn");
const smsCodeInput = document.getElementById("smsCodeInput");
const loginBtn = document.getElementById("loginBtn");
const loginStatus = document.getElementById("loginStatus");
const loginStep1 = document.getElementById("loginStep1");
const loginStep2 = document.getElementById("loginStep2");
const loginStep3 = document.getElementById("loginStep3");

// 缓存手机号
(function initPhone() {
  const saved = localStorage.getItem("faw_phone") || "";
  if (saved) phoneInput.value = saved;
})();

let captchaTicket = "";

sendCodeBtn.addEventListener("click", async () => {
  const phone = phoneInput.value.trim();
  if (!phone || phone.length !== 11) {
    showError("请输入11位手机号"); return;
  }
  localStorage.setItem("faw_phone", phone);
  showError("");

  // 触发腾讯滑块验证
  if (typeof TencentCaptcha === "undefined") {
    showError("腾讯验证码 SDK 未加载。请确保页面可访问外网（turing.captcha.qcloud.com）。");
    return;
  }

  sendCodeBtn.disabled = true;
  sendCodeBtn.textContent = "验证中...";

  try {
    const ticket = await new Promise((resolve, reject) => {
      const captcha = new TencentCaptcha(CAPTCHA_APP_ID, (res) => {
        if (res.ret === 0) resolve(res.ticket);
        else reject(new Error("滑块验证未完成"));
      }, { needFeedBack: false });
      captcha.show();
    });

    captchaTicket = ticket;

    // 发送短信验证码
    sendCodeBtn.textContent = "发送中...";
    const resp = await apiFetch("mapi/user/v1/vrcode/send2", {
      method: "POST",
      headers: {
        "content-type": "application/json",
        "x-channel": "MINI_PROGRAM",
        "x-microservice-name": "audi-app-gateway-c",
        "x-namespace-code": "faw-audi-dev",
        "x-timestamp": String(Date.now())
      },
      body: {
        describeCaptchaMiniResultReqDto: {
          captchaAppId: CAPTCHA_APP_ID,
          ticket: ticket
        },
        sendVerificationCodeDto: {
          account: phone,
          verificationCodeTypeEnum: "LOGIN_BY_VERIFICATION_CODE"
        }
      }
    });

    if (resp.ok && resp.data && resp.data.code === 0) {
      loginStep1.style.display = "none";
      loginStep2.style.display = "block";
      loginStatus.textContent = `验证码已发送到 ${phone}`;
    } else {
      const msg = resp.cors ? "CORS错误 — 请配置代理" :
        resp.data ? `发送失败: ${resp.data.message || 'code=' + resp.data.code}` : resp.error;
      showError(msg);
    }
  } catch (e) {
    showError(e.message || "滑块验证取消");
  } finally {
    sendCodeBtn.disabled = false;
    sendCodeBtn.textContent = "发送验证码";
  }
});

loginBtn.addEventListener("click", async () => {
  const phone = phoneInput.value.trim();
  const code = smsCodeInput.value.trim();
  if (!code || code.length !== 6) { showError("请输入6位验证码"); return; }

  showError("");
  loginBtn.disabled = true;
  loginBtn.textContent = "登录中...";

  const resp = await apiFetch("mapi/user/v1/account/login", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-channel": "MINI_PROGRAM",
      "x-microservice-name": "audi-app-gateway-c",
      "x-namespace-code": "faw-audi-dev",
      "x-timestamp": String(Date.now())
    },
    body: {
      accountLoginDto: {
        account: phone,
        headImage: "",
        loginTypeEnum: "MOBILE_VERIFICATION_CODE",
        loginChannelEnum: "WECHAT_MINI_PROGRAM",
        password: "",
        verificationCode: code,
        code: ""
      }
    }
  });

  if (resp.ok && resp.data && resp.data.code === 0 && resp.data.data && resp.data.data.accessToken) {
    const newToken = resp.data.data.accessToken;
    // 保存 Token
    localStorage.setItem(LS_TOKEN, newToken);
    tokenInput.value = newToken;
    updateTokenPreview(newToken);
    parseAndShowToken(newToken);

    // 保存用户信息
    if (resp.data.data.userInfo) {
      localStorage.setItem("faw_user_info", JSON.stringify(resp.data.data.userInfo));
    }

    loginStep2.style.display = "none";
    loginStep3.style.display = "block";
  } else {
    const msg = resp.cors ? "CORS错误 — 请配置代理" :
      resp.data ? `登录失败: ${resp.data.message || 'code=' + resp.data.code}` : resp.error;
    showError(msg);
  }

  loginBtn.disabled = false;
  loginBtn.textContent = "登录";
});

// ========== 评论工具 ==========
const loadFeedBtn = document.getElementById("loadFeedBtn");
const feedSelect = document.getElementById("feedSelect");
const commentInput = document.getElementById("commentInput");
const postCommentBtn = document.getElementById("postCommentBtn");
const commentStatus = document.getElementById("commentStatus");

// 帖子类型到嵌套字段的映射
const FEED_TYPE_MAP = {
  'INFORMATION': 'information',
  'DYNAMIC': 'subject',
  'ARTICLE': 'subject',
  'NOTES': 'nous',
  'ACTIVITY': 'activity'
};

// 可评论的类型（ACTIVITY 没有 commentCount，可能不支持）
const COMMENTABLE_TYPES = ['INFORMATION', 'DYNAMIC', 'ARTICLE', 'NOTES'];

let feedData = []; // 缓存加载的帖子

loadFeedBtn.addEventListener("click", async () => {
  const token = tokenInput.value.trim();
  if (!token) { showError("请先输入 Token"); return; }

  loadFeedBtn.disabled = true;
  loadFeedBtn.textContent = "加载中...";
  showError("");
  feedData = [];

  try {
    // 加载3页共60条
    for (let page = 1; page <= 3; page++) {
      const resp = await apiFetch(
        `cnapi/v2/feed?current=${page}&size=20&nonce=${uuid()}&timestamp=${Date.now()}`,
        { headers: appHeaders(token) }
      );
      if (resp.ok && resp.data && resp.data.code === 0) {
        feedData.push(...resp.data.data.records);
      }
      if (page < 3) await sleep(300);
    }

    // 填充 select
    feedSelect.innerHTML = '<option value="">-- 选择帖子 --</option>';
    let count = 0;
    for (let i = 0; i < feedData.length && count < 50; i++) {
      const r = feedData[i];
      const ct = r.contentType || '';
      if (!COMMENTABLE_TYPES.includes(ct)) continue;

      const objKey = FEED_TYPE_MAP[ct];
      const obj = r[objKey];
      if (!obj || !obj.id) continue;

      const title = (obj.title || obj.content || '').replace(/<[^>]+>/g, '').slice(0, 40) || '(无标题)';
      const comments = obj.commentCount || 0;
      const opt = document.createElement("option");
      opt.value = JSON.stringify({ id: String(obj.id), type: ct });
      opt.textContent = `[${ct}] ${title} (${comments}评论)`;
      feedSelect.appendChild(opt);
      count++;
    }

    commentStatus.textContent = `已加载 ${count} 条可评论帖子（共 ${feedData.length} 条）`;
    postCommentBtn.disabled = false;
  } catch (e) {
    showError("加载失败: " + e.message);
  } finally {
    loadFeedBtn.disabled = false;
    loadFeedBtn.textContent = "加载帖子列表";
  }
});

postCommentBtn.addEventListener("click", async () => {
  const token = tokenInput.value.trim();
  if (!token) { showError("请先输入 Token"); return; }

  const selected = feedSelect.value;
  if (!selected) { showError("请选择一个帖子"); return; }

  const content = commentInput.value.trim();
  if (!content) { showError("请输入评论内容"); return; }

  const { id, type } = JSON.parse(selected);

  postCommentBtn.disabled = true;
  postCommentBtn.textContent = "发送中...";
  showError("");

  const resp = await apiFetch(
    `cnapi/v1/comment_center/comment/save?nonce=${uuid()}&timestamp=${Date.now()}`,
    {
      method: "POST",
      headers: appHeaders(token),
      body: {
        content: content,
        subjectId: id,
        subjectContentTypeEnum: type,
        nickName: "王大锤",
        avatarUrl: "",
        ipRegion: "山东省"
      }
    }
  );

  if (resp.ok && resp.data && resp.data.code === 0) {
    commentStatus.textContent = `✅ 评论成功！(${new Date().toLocaleTimeString()})`;
    commentInput.value = "";
  } else {
    const msg = resp.data ? `code=${resp.data.code} ${resp.data.message || ''}` : resp.error;
    commentStatus.textContent = `❌ 评论失败: ${msg}`;
  }

  postCommentBtn.disabled = false;
  postCommentBtn.textContent = "发评论";
});
</script>
