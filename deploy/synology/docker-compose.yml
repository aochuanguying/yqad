version: '3.8'

services:
  # ============================================================
  # YQAD 应用服务
  # ============================================================
  yqad:
    image: yqad:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yqad
    restart: unless-stopped
    platform: linux/amd64
    environment:
      TZ: Asia/Shanghai
      # Web 配置
      PORT: 3000
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "${YQAD_PORT:-3000}:3000"
    network_mode: bridge

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


