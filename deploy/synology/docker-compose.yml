services:
  yqad:
    container_name: yqad
    image: yqad:latest
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    restart: unless-stopped
    network_mode: bridge
    environment:
      NODE_ENV: production
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${YQAD_PORT:-3000}:3000"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
